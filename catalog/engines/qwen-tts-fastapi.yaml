kind: engine_asset
metadata:
  name: qwen-tts-fastapi
  type: qwen-tts-fastapi
  version: "1.0"
  supported_model_types: [tts]
image:
  # gb10 本地构建的 ARM64 CPU-only TTS 镜像 (FastAPI + qwen-tts)
  # 已有 /v1/audio/speech (OpenAI compat) + /v1/tts + /health 端点
  name: qujing-qwen3-tts-real
  tag: "latest"
  size_approx_mb: 2500
  platforms: [linux/arm64]
  distribution: local
patterns:
  - "^qwen-tts-fastapi$"
  - "qwen3-tts"
  - "qwen-tts"
  - "tts-fastapi"
hardware:
  gpu_arch: "*"
  vram_min_mib: 0
startup:
  command: ["python", "main.py", "--model", "{{.ModelPath}}", "--device", "cpu"]
  ports:
    - name: http
      flag: --port
      config_key: port
      primary: true
  env:
    # Chinese female reference audio for voice cloning (Edge TTS 晓晓)
    REFERENCE_TEXT: "其实我真的有发现，我是一个特别善于观察别人情绪的人。比如说你现在开心不开心，我一眼就能看出来。"
    REFERENCE_AUDIO: "/tmp/ref_zh.wav"
  init_commands:
    - "rm -rf /model && ln -s /models /model"
    - "pip install -q edge-tts && edge-tts --voice zh-CN-XiaoxiaoNeural --text \"$REFERENCE_TEXT\" --write-media /tmp/ref_zh.mp3 && ffmpeg -y -i /tmp/ref_zh.mp3 -ar 24000 -ac 1 -f wav /tmp/ref_zh.wav || true"
  default_args:
    port: 8002
  # No health_check: TTS server is single-threaded; liveness probe
  # kills the pod during long inference requests (2-5 min).
  # health_check:
  warmup:
    enabled: false
  log_patterns:
    phases:
      - name: loading_model
        pattern: "Loading model|loading model"
        progress: 50
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "ImportError|ModuleNotFoundError"
        message: "Missing Python dependency"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - cpu_inference
    - openai_compatible_tts
  performance_gain: "CPU-only TTS, RTF ~0.87"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 1.0
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 0
  recommended_gpu_cores_percent: 0
time_constraints:
  cold_start_s: [10, 30]
  model_switch_s: [10, 30]
power_constraints:
  typical_draw_watts: [15, 40]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
    linux/amd64: "container"
