kind: engine_asset
_profile: sglang
metadata:
  name: sglang-kt-ada
  type: sglang-kt
  version: "0.5.9-kt0.5.2"
  supported_model_types: [llm, vlm, embedding]
hardware:
  gpu_arch: Ada
  vram_min_mib: 4096
image:
  # KTransformers + SGLang: CPU-GPU hybrid MoE inference
  # kt-kernel 0.5.2 (AMX/AVX-512/AVX2 CPU expert offloading, GPTQ_INT4 support)
  # Built from lmsysorg/sglang + kt-kernel + transformers 5
  name: aima/sglang-kt
  tag: "v0.5.9-kt0.5.2"
  size_approx_mb: 42000
  platforms: [linux/amd64]
  registries:
    - registry.cn-hangzhou.aliyuncs.com/aima/sglang-kt
patterns:
  - "^sglang-kt"
  - "sglang-kt"
  - "ktransformers"
startup:
  # Native AppImage: self-contained binary, same CLI as sglang
  command: ["sglang-kt", "--model-path", "{{.ModelPath}}", "--host", "0.0.0.0"]
  env:
    # AppImage runtime needs FUSE on many Linux hosts; extract-and-run keeps
    # native startup working on WSL and non-FUSE setups without extra steps.
    APPIMAGE_EXTRACT_AND_RUN: "1"
    KT_AVAILABLE: "1"
    OMP_NUM_THREADS: "1"
    SGLANG_DISABLE_CUDNN_CHECK: "1"
    PYTORCH_ALLOC_CONF: "expandable_segments:True"
    # WSL toolchain for SM89 JIT (AppImage only ships SM100 pre-compiled ops):
    #   conda install -y -c nvidia/label/cuda-12.6.3 cuda-toolkit libcurand-dev ninja gcc_linux-64
    #   Symlink cuda.h + curand.h from conda/targets/x86_64-linux/include/ to conda/include/
    #   Symlink libcuda.so from /usr/lib/wsl/lib/ to conda/lib64/
    #   Set CPLUS_INCLUDE_PATH, LIBRARY_PATH, LD_LIBRARY_PATH
    # Key tuning findings (i9-13980HX, RTX 4060 8GB, 2026-04-02):
    #   cpuinfer MUST match physical cores (24), NOT logical (32=5× regression)
    #   threadpool_count=2 gives 3-6% boost
    #   gpu_experts=4 marginally better than 2; gpu=6 OOMs on 8GB
  default_args:
    trust_remote_code: true
    # KTransformers-specific args
    kt_weight_path: "{{.ModelPath}}"
    kt_cpuinfer: 40
    kt_threadpool_count: 2
    kt_num_gpu_experts: 6
    kt_method: BF16
    # SGLang standard args
    mem_fraction_static: 0.85
    tp_size: 2
    disable_shared_experts_fusion: true
    enable_p2p_check: true
    chunked_prefill_size: 32768
    max_running_requests: 16
    watchdog_timeout: 3000
  # Parameters that are engine-internal and should not leak into model overlay YAML.
  internal_args: [port, watchdog_timeout, kt_weight_path, enable_p2p_check, disable_shared_experts_fusion]
  health_check:
    timeout_s: 600
  warmup:
    timeout_s: 120
amplifier:
  features:
    - cpu_gpu_hybrid_moe
    - amx_avx512_offload
    - radix_attention
  performance_gain: "KTransformers CPU-GPU hybrid MoE: offloads inactive experts to CPU via AMX/AVX-512, enabling large MoE models on limited GPU VRAM"
  resource_expansion:
    cpu_offload: true
  performance_multiplier: 1.5
  extends_resource_boundary: true
  effective_vram_multiplier: 4.0
  offload_config_key: n_gpu_layers
partition_hints:
  recommended_gpu_cores_percent: 100
time_constraints:
  cold_start_s: [120, 600]
  model_switch_s: [120, 600]
power_constraints:
  typical_draw_watts: [200, 700]
source:
  # SGLang-KT AppImage: 4.4GB self-contained ELF binary
  # Embeds Python 3.12 + SGLang + KTransformers + CUDA runtime
  # FUSE-mounts at runtime, same CLI as python3 -m sglang.launch_server
  binary: "sglang-kt"
  platforms: [linux/amd64]
  download:
    linux/amd64: "https://r2delivery.haoup.net/sglang-appimage/SGLang-a53cb6d-kt9e6484a-x86_64.AppImage"
runtime:
  default: "native"
  platform_recommendations:
    linux/amd64: "native"
