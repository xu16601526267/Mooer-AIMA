kind: engine_asset
metadata:
  name: z-image-diffusers-rocm
  type: z-image-diffusers
  version: "1.0"
  supported_model_types: [image_gen]
image:
  # AMD RDNA3 (W7900D) diffusers+FastAPI 推理镜像 (ROCm + bitsandbytes)
  # OpenAI 兼容 /v1/images/generations 端点
  name: z-image-rocm
  tag: "latest"
  size_approx_mb: 25000
  platforms: [linux/amd64]
  distribution: local
patterns:
  - "^z-image-diffusers-rocm$"
  - "z-image.*rocm"
hardware:
  gpu_arch: RDNA3
  vram_min_mib: 36864
startup:
  command: ["python3", "server.py"]
  env:
    MODEL_PATH: "{{.ModelPath}}"
    HSA_OVERRIDE_GFX_VERSION: "11.0.0"
  default_args:
    port: 8188
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: false
  log_patterns:
    phases:
      - name: loading_model
        pattern: "Loading Z-Image|Loading pipeline"
        progress: 50
      - name: ready
        pattern: "Z-Image loaded and ready|Uvicorn running"
        progress: 100
    errors:
      - pattern: "ImportError|ModuleNotFoundError|HIP error"
        message: "Missing dependency or HIP/ROCm error"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - gpu_inference
    - openai_compatible_image_gen
    - diffusion_model
    - nf4_quantization
  performance_gain: "GPU diffusion inference with NF4 quantization and optional TeaCache DiT caching"
  resource_expansion:
    cpu_offload: true
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 1.0
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 36864
  recommended_gpu_cores_percent: 100
time_constraints:
  cold_start_s: [60, 600]
  model_switch_s: [60, 600]
power_constraints:
  typical_draw_watts: [200, 300]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
