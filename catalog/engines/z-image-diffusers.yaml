kind: engine_asset
metadata:
  name: z-image-diffusers
  type: z-image-diffusers
  version: "1.0"
  supported_model_types: [image_gen]
image:
  # ARM64 GPU diffusers+FastAPI 推理镜像 (基于 sglang:dev-arm64-cu13)
  # OpenAI 兼容 /v1/images/generations 端点
  name: qujing-z-image
  tag: "latest"
  size_approx_mb: 39000
  platforms: [linux/arm64]
  distribution: local
patterns:
  - "^z-image-diffusers$"
  - "z-image"
  - "diffusers-image"
hardware:
  gpu_arch: "*"
  vram_min_mib: 16384
startup:
  command: ["python3", "server.py"]
  env:
    MODEL_PATH: "{{.ModelPath}}"
  default_args:
    port: 8188
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: false
  log_patterns:
    phases:
      - name: loading_model
        pattern: "Loading Z-Image|Loading pipeline"
        progress: 50
      - name: ready
        pattern: "Z-Image loaded and ready|Uvicorn running"
        progress: 100
    errors:
      - pattern: "ImportError|ModuleNotFoundError|CUDA error"
        message: "Missing dependency or CUDA error"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - gpu_inference
    - openai_compatible_image_gen
    - diffusion_model
  performance_gain: "GPU diffusion inference with optional TeaCache DiT caching (~2x speedup)"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 1.0
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 16384
  recommended_gpu_cores_percent: 20
time_constraints:
  cold_start_s: [60, 600]
  model_switch_s: [60, 600]
power_constraints:
  typical_draw_watts: [20, 60]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
    linux/amd64: "container"
