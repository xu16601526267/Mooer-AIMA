kind: engine_asset
_profile: llamacpp
metadata:
  name: llamacpp-universal
  type: llamacpp
  version: "b8157"
  default: true
  supported_model_types: [llm, vlm, embedding]
image:
  name: ghcr.io/ggml-org/llama.cpp
  tag: "server"
  size_approx_mb: 500
  platforms: [linux/amd64]
  registries:
    - ghcr.io/ggml-org/llama.cpp
    - registry.cn-hangzhou.aliyuncs.com/aima/llama-cpp-server
patterns:
  - "^llama\\.cpp$"
  - "^llama\\.cpp-server$"
  - "^llama-cpp-server$"
  - "-llama-"
  - "-llamacpp"
  - "llama.cpp"
  - "llamacpp"
  - "llama-server"
  - "llama-box"
hardware:
  gpu_arch: "*"
  vram_min_mib: 0
amplifier:
  performance_gain: "fast startup, low memory, CPU offload"
time_constraints:
  cold_start_s: [3, 10]
  model_switch_s: [3, 10]
power_constraints:
  typical_draw_watts: [20, 60]
runtime:
  default: "auto"
  platform_recommendations:
    windows/amd64: "native"
    darwin/arm64: "native"
    darwin/amd64: "native"
    linux/amd64: "container"
source:
  binary: "llama-server"
  # Native binary only for 3 platforms; linux/arm64 has no prebuilt — use container
  platforms: [windows/amd64, darwin/arm64, linux/amd64]
  url_template: "https://github.com/ggml-org/llama.cpp/releases/download/{version}/llama-{version}-bin-{platform_file}"
  platform_files:
    windows/amd64: "win-cuda-12.4-x64.zip"
    darwin/arm64: "macos-arm64.tar.gz"
    linux/amd64: "ubuntu-x64.tar.gz"
  mirror_templates:
    - "https://ghfast.top/{url}"
    - "https://cf.ghproxy.cc/{url}"
    - "https://gh-proxy.com/{url}"
