kind: engine_asset
_profile: sglang
metadata:
  name: sglang-universal
  type: sglang
  version: "0.5.9"
  supported_model_types: [llm, vlm, embedding]
hardware:
  gpu_arch: "*"
  vram_min_mib: 4096
image:
  name: lmsysorg/sglang
  tag: "v0.5.9"
  size_approx_mb: 6000
  platforms: [linux/amd64, linux/arm64]
  registries:
    - docker.io/lmsysorg/sglang
    - registry.cn-hangzhou.aliyuncs.com/aima/sglang
patterns:
  - "^sglang$"
  - "^sglang-"
  - "^sglang/"
  - "-sglang"
  - "sglang"
  - "sglang/"
  - ":sglang"
startup:
  env:
    SGLANG_DISABLE_CUDNN_CHECK: "1"
  default_args:
    mem_fraction_static: 0.80
amplifier:
  features:
    - flash_infer
    - radix_attention
  performance_gain: "1.5-3x throughput, low-latency streaming, RadixAttention cache reuse"
time_constraints:
  cold_start_s: [30, 90]
  model_switch_s: [30, 90]
power_constraints:
  typical_draw_watts: [60, 350]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
    linux/arm64: "container"
