kind: engine_profile
metadata:
  name: llamacpp
  version_default: "b8157"
  supported_formats: [gguf]
startup:
  command: ["llama-server", "--model", "{{.ModelPath}}", "--host", "0.0.0.0"]
  default_args:
    port: 8080
    n_gpu_layers: 999
    ctx_size: 4096
  internal_args: [port]
  health_check:
    path: /health
    timeout_s: 60
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 30
  log_patterns:
    phases:
      - name: loading_model
        pattern: "llm_load_print_meta|loading model"
        progress: 50
      - name: ready
        pattern: "HTTP server listening|server listening"
        progress: 100
    errors:
      - pattern: "failed to load model|unable to load model"
        message: "Model load failed"
      - pattern: "couldn't bind HTTP server socket|address already in use|bind.*address already in use"
        message: "Port is already in use"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - flash_attention
    - quantization_gguf
  resource_expansion:
    cpu_offload: true
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 1.0
  extends_resource_boundary: true
  effective_vram_multiplier: 4.0
  offload_config_key: n_gpu_layers
partition_hints:
  min_gpu_memory_mib: 0
  recommended_gpu_cores_percent: 30
