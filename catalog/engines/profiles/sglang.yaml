kind: engine_profile
metadata:
  name: sglang
  version_default: "0.5.9"
  supported_formats: [safetensors]
startup:
  command: ["python3", "-m", "sglang.launch_server", "--model-path", "{{.ModelPath}}", "--host", "0.0.0.0"]
  compatibility_probe: transformers_autoconfig
  default_args:
    port: 30000
  internal_args: [port]
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: loading_weights
        pattern: "Loading model weights|loading weights"
        progress: 40
      - name: server_starting
        pattern: "The server is fired up"
        progress: 80
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - continuous_batching
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 2.5
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
