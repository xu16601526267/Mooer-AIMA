kind: engine_profile
metadata:
  name: vllm
  version_default: "0.8.5"
  supported_formats: [safetensors]
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  compatibility_probe: transformers_autoconfig
  default_args:
    port: 8000
    served_model_name: "{{.ModelName}}"
  internal_args: [port]
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: model_init
        pattern: "Starting to load model"
        progress: 5
      - name: loading_shards
        pattern: "Loading safetensors checkpoint shards:\\s+(\\d+)%"
        progress_regex_group: 1
        progress_base: 5
        progress_range: 35
      - name: weights_loaded
        pattern: "Loading weights took|Loading model weights"
        progress: 40
      - name: torch_compile
        pattern: "torch\\.compile takes"
        progress: 50
      - name: cuda_piecewise
        pattern: "Capturing CUDA graphs \\(mixed.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 5
      - name: cuda_full
        pattern: "Capturing CUDA graphs \\(decode.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 55
        progress_range: 35
      - name: cuda_graphs
        pattern: "Capturing CUDA graph[^s].*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 40
      - name: graph_done
        pattern: "Graph capturing finished"
        progress: 92
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
      - pattern: "torch.cuda.OutOfMemoryError"
        message: "GPU memory insufficient"
      - pattern: "couldn't bind HTTP server socket|address already in use|bind.*address already in use"
        message: "Port is already in use"
      - pattern: "can only be loaded from a local folder or remote repo|must contain config.json"
        message: "Model path is invalid for vLLM"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 2.5
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
