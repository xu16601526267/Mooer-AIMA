kind: engine_asset
metadata:
  name: litetts
  type: litetts
  version: "0.4d"
  supported_formats: [mnn]
  supported_model_types: [tts]
hardware:
  gpu_arch: "*"
  vram_min_mib: 0
source:
  binary: integrated_server
  install_type: preinstalled
  probe:
    paths:
      - /opt/mt-ai/tts/start_server.sh
      - /opt/mt-ai/tts/integrated_server
    version_command: ["./integrated_server", "--version"]
    version_pattern: "([\\d.]+[a-z]?)"
    fallback_version: "unknown"
startup:
  # start_server.sh uses parse_options.sh which expects --flag_name (underscores).
  # Port flags therefore live in startup.ports so AIMA can inject exact flags
  # without hardcoding literal port values in the command.
  command: ["./start_server.sh", "--target_voices", "AIBC006_lite"]
  ports:
    - name: grpc-v1beta1
      flag: --grpc_port_v1beta1
      config_key: grpc_port_v1beta1
    - name: grpc
      flag: --grpc_port
      config_key: grpc_port
    - name: http
      flag: --http_port
      config_key: port
      primary: true
  work_dir: /opt/mt-ai/tts  # AIBook factory image path -- override via ~/.aima/catalog/
  env:
    TARGET_DEVICE: cpu
    PROSODY_MODEL_TARGET_DEVICE: cpu
    PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
    ONNX_INTRA_OP_NUM_THREADS: "2"
    ONNX_INTER_OP_NUM_THREADS: "2"
    TORCH_NUM_THREADS: "2"
    OMP_NUM_THREADS: "2"
    MKL_NUM_THREADS: "2"
    NUM_FFMPEG_THREADS: "2"
    TOKENIZERS_PARALLELISM: "true"
    TOS_ACCESS_KEY: XXX  # dummy -- start.sh reads these but TOS upload is unused in offline mode
    TOS_SECRET_KEY: XXX  # dummy -- same as above
    LOG_DIR: /tmp
    POD_NAME: latest_lite
    TZ: Asia/Shanghai
  default_args:
    grpc_port_v1beta1: 32108
    grpc_port: 32109
    port: 32110  # AIMA uses this for health check URL; actual flag is --http_port in command
  health_check:
    path: /tts/api/v1/voices  # GET / and /health both 404 on factory image; voices is the stable 200 probe
    timeout_s: 60
  log_patterns:
    phases:
      - name: loading_models
        pattern: "Loading model from cache|use runtime"
        progress: 30
      - name: loading_mnn
        pattern: "MNNLiteTtsService.*streaming"
        progress: 80
      - name: ready
        pattern: "Running on all addresses|Start TTS gRPC service"
        progress: 100
    errors:
      - pattern: "Device string must not be empty"
        message: "Missing TARGET_DEVICE=cpu env var -- prosody predictor defaults to GPU"
      - pattern: "RuntimeError"
        message: "Runtime error during TTS initialization"
api:
  protocol: http
  base_path: /tts/api/v1
time_constraints:
  cold_start_s: [15, 30]
power_constraints:
  typical_draw_watts: [5, 30]
runtime:
  default: "native"
  platform_recommendations:
    linux/arm64: "native"
