kind: engine_asset
metadata:
  name: glm-asr-fastapi
  type: glm-asr-fastapi
  version: "1.0"
  supported_model_types: [asr]
image:
  # gb10 本地构建的 ARM64 CPU-only ASR 镜像 (FastAPI + GLM-ASR-Nano)
  # OpenAI 兼容 /v1/audio/transcriptions 端点
  name: qujing-glm-asr-nano
  tag: "latest"
  size_approx_mb: 3000
  platforms: [linux/arm64]
  distribution: local
patterns:
  - "^glm-asr-fastapi$"
  - "glm-asr"
  - "asr-nano"
hardware:
  gpu_arch: "*"
  vram_min_mib: 0
startup:
  command: ["python", "main.py", "--model", "{{.ModelPath}}", "--device", "cpu"]
  ports:
    - name: http
      flag: --port
      config_key: port
      primary: true
  default_args:
    port: 8003
  health_check:
    path: /health
    timeout_s: 120
  warmup:
    enabled: false
  log_patterns:
    phases:
      - name: loading_model
        pattern: "Loading model|loading model"
        progress: 50
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "ImportError|ModuleNotFoundError"
        message: "Missing Python dependency"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - cpu_inference
    - openai_compatible_asr
  performance_gain: "CPU-only ASR, low-latency transcription"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 1.0
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 0
  recommended_gpu_cores_percent: 0
time_constraints:
  cold_start_s: [10, 30]
  model_switch_s: [10, 30]
power_constraints:
  typical_draw_watts: [15, 40]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
    linux/amd64: "container"
