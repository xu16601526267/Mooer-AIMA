kind: engine_asset
_profile: llamacpp
metadata:
  name: llamacpp-vulkan
  type: llamacpp
  version: "b8157"
  supported_model_types: [llm, vlm, embedding]
image:
  name: ghcr.io/ggml-org/llama.cpp
  tag: "server"
  size_approx_mb: 500
  platforms: [linux/amd64]
  registries:
    - ghcr.io/ggml-org/llama.cpp
    - registry.cn-hangzhou.aliyuncs.com/aima/llama-cpp-server
patterns:
  - "^llama\\.cpp$"
  - "^llama\\.cpp-server$"
  - "^llama-cpp-server$"
  - "-llama-"
  - "-llamacpp"
  - "llama.cpp"
  - "llamacpp"
  - "llama-server"
  - "llama-box"
hardware:
  # gpu_arch: RDNA3.5 -- exact match for amd395 Radeon 8060S (Strix Halo iGPU, RDNA3.5)
  # resolver prefers exact gpu_arch, so RDNA3.5 devices won't fallback to llamacpp-universal
  gpu_arch: RDNA3.5
  vram_min_mib: 0
amplifier:
  features:
    - vulkan_compute
  performance_gain: "Vulkan GPU acceleration for AMD RDNA3.5, fast startup, CPU offload"
time_constraints:
  cold_start_s: [3, 10]
  model_switch_s: [3, 10]
power_constraints:
  typical_draw_watts: [20, 80]
runtime:
  default: "native"
  platform_recommendations:
    linux/amd64: "native"
source:
  binary: "llama-server"
  platforms: [linux/amd64]
  url_template: "https://github.com/ggml-org/llama.cpp/releases/download/{version}/llama-{version}-bin-{platform_file}"
  platform_files:
    linux/amd64: "ubuntu-vulkan-x64.tar.gz"
  mirror_templates:
    - "https://ghfast.top/{url}"
    - "https://cf.ghproxy.cc/{url}"
    - "https://gh-proxy.com/{url}"
