kind: engine_asset
_profile: vllm
metadata:
  name: vllm-nightly-audio-ada
  type: vllm-nightly-audio
  version: "nightly"
  supported_model_types: [llm, vlm, embedding, asr]
  status: blocked
  status_reason: "image vllm/vllm-openai:qwen3_5-cu130 does not exist in any registry"
hardware:
  gpu_arch: Ada
  vram_min_mib: 4096
image:
  name: vllm/vllm-openai
  tag: "qwen3_5-cu130"
  size_approx_mb: 8000
  platforms: [linux/amd64]
  registries:
    - docker.io/vllm/vllm-openai
    - registry.cn-hangzhou.aliyuncs.com/aima/vllm-openai
patterns:
  - "^vllm-nightly-audio$"
  - "vllm-nightly-audio"
startup:
  command: ["qwen-asr-serve", "{{.ModelPath}}"]
  compatibility_probe: qwen_asr_autoconfig
  init_commands:
    - "pip install librosa soundfile --quiet --no-cache-dir -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn"
  default_args:
    gpu_memory_utilization: 0.85
    max_model_len: 8192
  health_check:
    timeout_s: 600
amplifier:
  features:
    - flash_attention
    - audio_input
  performance_gain: "vLLM nightly + audio support (librosa/soundfile)"
partition_hints:
  recommended_gpu_cores_percent: 13
time_constraints:
  cold_start_s: [90, 240]
  model_switch_s: [90, 240]
power_constraints:
  typical_draw_watts: [80, 200]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
