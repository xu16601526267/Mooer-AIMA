kind: model_asset
metadata:
  name: qwen3-asr-1.7b
  type: asr
  family: qwen
  parameter_count: "1.7B"
  released_at: "2025-09"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-ASR-1.7B
      format: safetensors
    - type: modelscope
      repo: Qwen/Qwen3-ASR-1.7B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- CPU-only 容器 (任何硬件) ---
  # 1.7B 参数, CPU 推理, 使用 glm-asr-fastapi 引擎 (OpenAI 兼容 /v1/audio/transcriptions)
  - name: qwen3-asr-1.7b-cpu-fastapi
    status: blocked
    hardware:
      gpu_arch: "*"
    engine: glm-asr-fastapi
    format: safetensors
    default_config:
      port: 8003
    expected_performance:
      vram_mib: 0
      notes: "CPU-only ASR inference. NOTE: Qwen3-ASR is HuggingFace transformers model, incompatible with glm-asr-fastapi (FunASR). This variant is non-functional — use vllm-nightly variants instead, or use sensevoice-small for CPU ASR."

  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # BF16 权重 ~3.4GB, 128GB unified 余量充足
  # 复用 vllm-nightly (qwen3_5-cu130 镜像), gmu=0.1 (0.05 不够 CUDA context 开销)
  - name: qwen3-asr-1.7b-blackwell-vllm-nightly-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.1
      max_model_len: 8192
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 3870
      notes: "3.87 GiB model + 4.43 GiB KV cache (41K tokens) + 2.17 GiB CUDA graphs ≈ 10.5 GiB total (gmu=0.1). Encoder cache 2048 tokens. RTF 0.076-0.17 (6-13x real-time): 1.3s audio→0.22s, 7s→0.59s, 20s→1.56s. API: /v1/chat/completions with input_audio base64 (not /v1/audio/transcriptions). Needs vllm[audio] deps (librosa+soundfile). Cold start ~90s (load 20s + compile 15s + CUDA graphs 62s). Validated on GB10 2026-03-20."

  # --- GB10 (Blackwell, vllm-nightly-audio — custom image with vllm[audio]) ---
  - name: qwen3-asr-1.7b-blackwell-vllm-audio-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-nightly-audio
    format: safetensors
    compatibility:
      repair_init_commands:
        - 'python3 -m pip install --no-cache-dir --no-deps -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn vllm==0.14.0 qwen-asr nagisa soynlp DyNET38 cython qwen-omni-utils av sox pytz'
    default_config:
      gpu_memory_utilization: 0.1
      max_model_len: 8192
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 3870
      notes: "Same as vllm-nightly variant but uses vllm-asr-audio:latest image with audio deps pre-installed. Validated on GB10 2026-03-20."

  # --- GB10 vllm-spark variant (vllm-spark-tf5 镜像, 已在 containerd) ---
  - name: qwen3-asr-1.7b-blackwell-vllm-spark-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-spark
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.1
      max_model_len: 8192
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 3870
      notes: "vllm-spark-tf5, needs fix_rope.py + fix_funasr_import.py patches"

  # --- linux-1 (Ada, RTX 4090, K3S) ---
  - name: qwen3-asr-1.7b-ada-vllm-nightly-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 4096
      unified_memory: false
    engine: vllm-nightly-audio
    format: safetensors
    compatibility:
      repair_init_commands:
        - 'python3 -m pip install --no-cache-dir --no-deps -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn vllm==0.14.0 qwen-asr nagisa soynlp DyNET38 cython qwen-omni-utils av sox pytz'
    default_config:
      gpu_memory_utilization: 0.14
      max_model_len: 4096
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 6630
      notes: "gmu=0.14 for triple-model coexistence (LLM gmu=0.78 leaves ~7.8GiB/GPU). 3.87GiB model + KV cache. Audio deps: librosa+soundfile via init_commands. TTS→ASR chain verified: en/zh 100% accurate. 2026-03-02."
