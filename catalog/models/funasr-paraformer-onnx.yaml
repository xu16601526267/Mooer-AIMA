kind: model_asset
metadata:
  name: funasr-paraformer-onnx
  type: asr
  family: funasr
  parameter_count: "220M"
  released_at: "2024-09"
storage:
  formats: [onnx]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: modelscope
      repo: iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-onnx
      format: onnx
    - type: local_path
      path: "/opt/mt-ai/asr/models/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-onnx"
      notes: "AIBook M1000 SoC pre-loaded offline Paraformer model. Companion online/VAD/punctuation ONNX assets are expected alongside it under /opt/mt-ai/asr/models."
variants:
  # --- CPU-only (ARM64, ONNX Runtime) ---
  # Paraformer-large ~220M params, ONNX quantized (~200MB total)
  # Pipeline: FSMN-VAD → Paraformer (offline+online) → CT-Punctuation
  # CPU inference via ONNX Runtime, no GPU needed
  - name: funasr-paraformer-onnx-cpu-arm64
    hardware:
      gpu_arch: "*"
    engine: funasr
    format: onnx
    default_config:
      port: 32103
    expected_performance:
      vram_mib: 0
      notes: "FunASR Paraformer-large ONNX. CPU-only ARM64, ~200MB models. Measured 2026-03-28 on AIBook M1000 SoC: cold start ~10s. gRPC streaming ASR, 16kHz 16-bit PCM input. Pipeline: FSMN-VAD + Paraformer (offline+online) + CT-Punctuation. Zero GPU impact."
