kind: model_asset
metadata:
  name: qwen3-4b
  type: llm
  family: qwen
  parameter_count: "4B"
  released_at: "2025-04"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-4B
      format: safetensors
    - type: huggingface
      repo: Qwen/Qwen3-4B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-4B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # FP16 weights ~8GB, GB10 unified memory 充裕
  # gpu_memory_utilization 0.20 on 128GB unified ≈ 25.6GB → 远超 8GB 权重
  - name: qwen3-4b-blackwell-vllm-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.20
      max_model_len: 8192
      dtype: bfloat16
    expected_performance:
      tokens_per_second: [40, 80]
      latency_first_token_ms: [15, 40]

  # --- RTX 4090 (Ada, 24GB discrete) ---
  # FP16 weights ~8GB, 24GB VRAM 宽裕
  # vram_min_mib: 10240 → 排除 RTX 4060 (8GB), 4060 走 llamacpp
  - name: qwen3-4b-ada-vllm-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 10240
      unified_memory: false
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.50
      max_model_len: 8192
      dtype: auto
    expected_performance:
      tokens_per_second: [50, 100]
      latency_first_token_ms: [10, 30]

  # --- 所有设备通用 (llamacpp + GGUF) ---
  # Q4_K_M = 2.5GB, 所有设备可运行（含 8GB RTX 4060、16GB M4）
  # n_gpu_layers: 999 → 尽可能 GPU offload，剩余自动 CPU
  - name: qwen3-4b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
      ram_min_mib: 3072
    engine: llamacpp
    format: gguf
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 8192
    expected_performance:
      tokens_per_second: [15, 50]
      latency_first_token_ms: [20, 100]
