kind: model_asset
metadata:
  name: qwen3-8b
  type: llm
  family: qwen
  parameter_count: "8B"
  released_at: "2025-04"
  aliases:
    - Qwen3-8B-junhowie
    - gptq-Qwen3-8B-junhowie
    - gptq-Qwen3-8B
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-8B
      format: safetensors
    - type: huggingface
      repo: Qwen/Qwen3-8B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-8B
      format: safetensors
    - type: local_path
      path: "/opt/mt-ai/llm/models/gptq-Qwen3-8B"
      notes: "AIBook M1000 SoC pre-loaded GPTQ-Int4"
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # FP16 weights ~16GB, GB10 unified memory 128GB
  # gpu_memory_utilization 0.30 on 128GB ≈ 38.4GB → 充裕
  - name: qwen3-8b-blackwell-vllm-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 6144
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.30
      max_model_len: 8192
      dtype: bfloat16
    expected_performance:
      tokens_per_second: [25, 50]
      latency_first_token_ms: [20, 60]

  # --- RTX 4090 (Ada, 24GB discrete) ---
  # FP16 weights ~16GB + KV cache ~2GB = ~18GB
  # vram_min_mib: 16384 → 排除 RTX 4060 (8GB)，仅 4090 (24GB) 匹配
  # gpu_memory_utilization 0.80 on 24GB = 19.2GB
  - name: qwen3-8b-ada-vllm-fp16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 16384
      unified_memory: false
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.80
      max_model_len: 4096
      dtype: auto
    expected_performance:
      tokens_per_second: [30, 60]
      latency_first_token_ms: [15, 40]

  # --- Hygon DCU (BW150, 64GB HBM per card) ---
  # FP16 weights ~16GB, single DCU 64GB 余量充足
  # DCU 不支持 BF16, 必须用 FP16 (vLLM 自动转换)
  - name: qwen3-8b-dcu-vllm-fp16
    hardware:
      gpu_arch: DCU
      vram_min_mib: 6144
      unified_memory: false
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.90
      max_model_len: 8192
      dtype: float16
    expected_performance:
      startup_time_s: 60
      cold_start_time_s: 180
      tokens_per_second: [20, 50]
      vram_mib: 16000
      notes: "vLLM 0.9.2 DCU, FP16, single BW150 64GB, untested estimate."

  # --- Moore Threads MUSA (M1000 Dev Kit, 62GB unified) ---
  # FP16 weights ~16GB, M1000 unified memory 62GB, tp=1 only
  # GPTQ only for production; FP16/safetensors for dev/test
  # gpu_memory_utilization 0.70 on 62GB ≈ 43GB → 充裕
  - name: qwen3-8b-musa-vllm-fp16
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm-musa
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.70
      max_model_len: 16384
      max_num_seqs: 1
      enforce_eager: true
      dtype: auto
    expected_performance:
      tokens_per_second: [5, 20]
      latency_first_token_ms: [100, 500]

  # --- Moore Threads MUSA (M1000 SoC / AIBook, 32GB unified) ---
  # GPTQ-Int4 weights ~5GB, 32GB unified memory, tp=1 only
  # gmu=0.50 on 32GB = 16GB GPU → 5GB weights + 11GB KV cache
  # Pre-loaded at /opt/mt-ai/llm/models/gptq-Qwen3-8B
  # Coexists with embedding at gmu=0.2 (total gmu=0.7, ~26GB used)
  - name: qwen3-8b-musa-soc-vllm-gptq
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 6144
      unified_memory: true
    engine: vllm-musa
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.50
      max_model_len: 8192
      num_gpu_blocks_override: 256
      max_num_seqs: 1
      enforce_eager: true
      quantization: gptq
      dtype: float16
      block_size: 32
      swap_space: 0
      port: 32102
    expected_performance:
      startup_time_s: 117
      cold_start_time_s: 120
      tokens_per_second: [7, 8]
      latency_first_token_ms: [500, 550]
      vram_mib: 16384
      notes: "AIBook M1000 SoC 32GB LPDDR5X. GPTQ-Int4, vLLM-MUSA 0.9.2. Measured 2026-03-27: weights 16.4s, total cold start 117s. Decode 7.5 tok/s (steady state). TTFT 525ms. LLM+Embedding coexist at gmu=0.7 (26GB/32GB). Pre-loaded model at /opt/mt-ai/llm/models/gptq-Qwen3-8B."

  # --- 所有设备通用 (llamacpp + GGUF) ---
  # Q4_K_M = 5.03GB → RTX 4060 (8GB) ✓, M4 (16GB) ✓
  # Q8_0 = 8.71GB → RTX 4060 需部分 CPU offload
  - name: qwen3-8b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
      ram_min_mib: 6144
    engine: llamacpp
    format: gguf
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [10, 40]
      latency_first_token_ms: [30, 150]
