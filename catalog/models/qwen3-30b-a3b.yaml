kind: model_asset
metadata:
  name: qwen3-30b-a3b
  type: llm
  family: qwen
  parameter_count: "30B"
  released_at: "2025-04"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-30B-A3B
      format: safetensors
    - type: huggingface
      repo: Qwen/Qwen3-30B-A3B-FP8
      format: safetensors
      quantization: fp8
    - type: huggingface
      repo: Qwen/Qwen3-30B-A3B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-30B-A3B
      format: safetensors
    - type: huggingface
      repo: Qwen/Qwen3-30B-A3B-GPTQ-Int4
      format: safetensors
      quantization: gptq
    - type: modelscope
      repo: Qwen/Qwen3-30B-A3B-GPTQ-Int4
      format: safetensors
      quantization: gptq
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # MoE: 30B total / 3B active, BF16 weights ~60GB
  # 虽然 active params 仅 3B，但所有 expert 权重必须驻留内存
  # gpu_memory_utilization 0.55 on 128GB ≈ 70.4GB → 60GB 权重 + 10.4GB KV
  - name: qwen3-30b-a3b-blackwell-vllm-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 20480
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.55
      max_model_len: 4096
      dtype: bfloat16
    expected_performance:
      tokens_per_second: [20, 40]
      latency_first_token_ms: [30, 100]

  # --- AMD395 Radeon 8060S iGPU (RDNA3.5 gfx1151, 128GB LPDDR5X unified) ---
  # vLLM 路径当前仍不可用:
  # - FP8: ROCm vLLM TheRock 缺少 gfx1151 可用的 FP8 MoE kernels
  # - BF16: 58GiB 权重 + ~5GiB PyTorch overhead > 64GiB UMA 可映射空间 → OOM
  # - CPU offload 无效: unified memory 下 CPU/GPU 共享物理内存池
  # - ROCm/HIP llama.cpp: kernel 6.8 + amdgpu-dkms 6.16.13 有 Strix Halo 统一内存
  #   HIP runtime bug, tensor load 阶段 device-side page fault, 应用层无法绕过
  # 当前稳定方案: llamacpp-vulkan + Q4_K_M GGUF (验证配置见下方专用 variant)
  - name: qwen3-30b-a3b-rdna35-llamacpp-vulkan-q4
    hardware:
      gpu_arch: RDNA3.5
      vram_min_mib: 20480
      unified_memory: true
    engine: llamacpp
    format: gguf
    source:
      type: huggingface
      repo: unsloth/Qwen3-30B-A3B-GGUF
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 32768
    expected_performance:
      tokens_per_second: [70, 80]
      latency_first_token_ms: [280, 320]
      vram_mib: 22000
      notes: "Validated 2026-04-22 on AMD Ryzen AI MAX+ 395 + Radeon 8060S iGPU (gfx1151, RDNA3.5, 40 CU, 128GB LPDDR5X unified, ~64GB available VRAM). llama.cpp Vulkan (ghcr.io/ggml-org/llama.cpp:server-vulkan, b8840), Qwen3-30B-A3B-Q4_K_M.gguf 18.56GB. Tuned config: -b 4096 -ub 512 -fa on, KV cache f16, --parallel 1, ctx 32768. Measured: short prompt (in=128/out=256, C=1) decode 76.4 tok/s, TTFT 291ms, TPOT 12.0ms, stable. Long context (in=25000/out=512, C=1) TTFT 43.5s, decode 43.5 tok/s, stable. Matrix C=4 short: aggregate peak 122.6 tok/s (1.6x scaling). Tuning sweep: v1 (ub256 b2048 KVq8) 75.8 tps / TTFT 51.5s; v2 (ub512 b4096 KVf16) ⭐ chosen; v3 (ub512 b4096 KVq8) 74.4 tps / TTFT 63s fluctuating. KV f16 beats q8 at 25K context despite higher memory. iGPU decode matches AMD W7900D discrete workstation card (71-75 tok/s) at unified-memory cost profile."

  # --- Moore Threads MUSA (M1000 Dev Kit, 62GB unified, GPTQ-Int4) ---
  # GPTQ-Int4 权重 ~16GB, M1000 unified memory 62GB
  # tp=1 only, enforce-eager required, GPTQ-only quantization
  # gpu_memory_utilization 0.70 on 62GB ≈ 43GB → 16GB 权重 + KV cache 充裕
  - name: qwen3-30b-a3b-musa-vllm-gptq
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.70
      max_model_len: 16384
      max_num_seqs: 1
      enforce_eager: true
      quantization: gptq
      dtype: auto
    expected_performance:
      tokens_per_second: [9, 13]
      latency_first_token_ms: [900, 4000]

  # --- Moore Threads MUSA (M1000 SoC / AIBook, 32GB unified, GPTQ-Int4) ---
  # GPTQ-Int4 权重 ~16GB, 32GB unified memory, tp=1 only
  # MoE: 30B total / 3B active, 性能参考: M1000 Dev Kit ~12 tok/s
  # gmu=0.70 on 32GB = 22.4GB → 16GB 权重 + 6.4GB KV cache
  # 注意: 需单独下载 Qwen3-30B-A3B-GPTQ-Int4, AIBook 未预装
  - name: qwen3-30b-a3b-musa-soc-vllm-gptq
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 16384
      unified_memory: true
    engine: vllm
    format: safetensors
    source:
      type: modelscope
      repo: Qwen/Qwen3-30B-A3B-GPTQ-Int4
      quantization: gptq
    default_config:
      gpu_memory_utilization: 0.70
      max_model_len: 8192
      num_gpu_blocks_override: 256
      max_num_seqs: 1
      enforce_eager: true
      quantization: gptq
      dtype: float16
      block_size: 32
      swap_space: 0
    expected_performance:
      tokens_per_second: [9, 12]
      latency_first_token_ms: [130, 1400]
      vram_mib: 22528
      notes: "AIBook M1000 SoC 32GB LPDDR5X. GPTQ-Int4, vLLM-MUSA 0.9.2. Reference from M1000 dev kit: 12.53 tok/s (32 tokens), TTFT 129-1362ms depending on input length. MoE with only 3B active params — faster decode than 8B dense. Cannot coexist with embedding (gmu=0.7 + EMB gmu=0.2 = 0.9, 28.8GB > safe limit). Needs separate download."

  # --- MetaX N260 (MACA, 2× 64GB HBM2e, Docker) ---
  # BF16 weights ~60GB, TP=2 → 30GB per GPU, 64GB HBM2e 余量充足
  # MoE 30B total / 3B active, vllm-metax 0.13.0 (MACA cu-bridge)
  - name: qwen3-30b-a3b-maca-vllm-bf16
    hardware:
      gpu_arch: MACA
      vram_min_mib: 40960
      gpu_count_min: 2
      unified_memory: false
    engine: vllm
    format: safetensors
    source:
      type: modelscope
      repo: Qwen/Qwen3-30B-A3B
    default_config:
      gpu_memory_utilization: 0.90
      max_model_len: 32768
      dtype: bfloat16
      tensor_parallel_size: 2
      trust_remote_code: true
    expected_performance:
      startup_time_s: 226
      cold_start_time_s: 300
      tokens_per_second: [60, 66]
      vram_mib: 123012
      notes: "vLLM-MetaX 0.13.0, BF16, TP=2, 2× MetaX N260 64GB HBM2e. Measured 2026-03-06: weights 38s + torch.compile 161s + CUDA graph 27s = 226s startup. 65.8 tok/s decode (512 tokens). 61506 MiB/GPU (gmu=0.90). FLASH_ATTN backend, PIECEWISE CUDA graphs."

  # --- AMD W7900D RDNA3 (8× 48GB discrete, Docker) ---
  # BF16 weights ~60GB > 48GB single card → TP=2, 30GB per GPU
  # 8 GPUs available, can run up to 4 TP=2 instances
  # gmu=0.90 on 48GB ≈ 43GB per GPU → 30GB weights + 13GB KV cache
  - name: qwen3-30b-a3b-rdna3-vllm-bf16
    hardware:
      gpu_arch: RDNA3
      vram_min_mib: 40960
      gpu_count_min: 2
      unified_memory: false
    engine: vllm
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3-30B-A3B
    default_config:
      gpu_memory_utilization: 0.90
      max_model_len: 8192
      dtype: bfloat16
      tensor_parallel_size: 2
      trust_remote_code: true
    expected_performance:
      tokens_per_second: [15, 40]
      latency_first_token_ms: [50, 200]
      notes: "AMD W7900D RDNA3 48GB, TP=2, BF16. vLLM-ROCm with triton flash attention."

  # --- Ada (2× RTX 4090, KTransformers CPU-GPU hybrid, BF16) ---
  # BF16 全精度 ~60GB，通过 KTransformers 将非活跃 expert 卸载到 CPU
  # 2× RTX 4090 (48GB VRAM) + 503GB RAM → kt 实际只需 ~10-15GB GPU
  # kt_num_gpu_experts=6: 每层保留 6 个 expert 在 GPU，其余走 CPU AMX/AVX-512
  # 相比 llamacpp GGUF Q4: 全精度推理，精度更高；MoE 3B active 受益于 kt 架构
  - name: qwen3-30b-a3b-ada-sglang-kt-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 16384
      gpu_count_min: 2
      unified_memory: false
    engine: sglang-kt
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3-30B-A3B
    default_config:
      mem_fraction_static: 0.85
      tp_size: 2
      kt_cpuinfer: 40
      kt_num_gpu_experts: 6
      kt_method: BF16
      context_length: 32768
      disable_shared_experts_fusion: true
      chunked_prefill_size: 32768
      max_running_requests: 16
      watchdog_timeout: 3000
    expected_performance:
      startup_time_s: 120
      cold_start_time_s: 600
      tokens_per_second: [15, 40]
      notes: "SGLang-KT AppImage, BF16 全精度, CPU-GPU hybrid MoE. 2× RTX 4090 + 503GB RAM. KTransformers offloads inactive experts to CPU via AMX/AVX-512. Untested estimate — actual performance depends on CPU bandwidth and expert routing."

  # --- Ada 单卡 (RTX 4060 8GB via WSL, KTransformers, GPTQ-Int4) ---
  # GPTQ-Int4 权重 ~16GB，kt_method=GPTQ_INT4 使用 GPTQSafeTensorLoader + AVX2 内核
  # 要求: sym=true, desc_act=false (Qwen3-30B-A3B-GPTQ-Int4 满足)
  # 单卡 8GB: 非 expert 层 ~3GB + 4 GPU expert ~2GB + KV = ~6GB
  # CPU RAM 需 ~12GB 放 CPU expert；WSL 需配置 memory>=24GB
  # i9-13980HX 有 AVX2 (8P+16E=24核)，kt_cpuinfer=24 用全部物理核
  # kt_threadpool_count=2 减少锁竞争，提速 ~3-6%
  # 注意: v0.5.1 AppImage 的 BF16SafeTensorLoader 不支持 GPTQ, 需 v0.5.2+
  # 实测 (v0.5.2, WSL2): 无 CUDA graph 6.5 → CUDA graph 8.5 tok/s
  # CUDA graph 需 WSL toolchain: conda install cuda-toolkit libcurand-dev ninja gcc
  # AppImage 仅预编译 SM100 (Blackwell), SM89 (Ada) 需 JIT → 首次启动慢
  # 该变体按实测目标机型收敛到 8GB Ada 单卡；低于 8GB 会误导 auto-resolve
  # llamacpp Q4_K_M 在同硬件达 21 tok/s，sglang-kt 适合对精度/功能有要求的场景
  - name: qwen3-30b-a3b-ada-1gpu-sglang-kt-gptq
    hardware:
      gpu_arch: Ada
      vram_min_mib: 8192
      unified_memory: false
    engine: sglang-kt
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3-30B-A3B-GPTQ-Int4
      quantization: gptq
    default_config:
      mem_fraction_static: 0.55
      tp_size: 1
      kt_cpuinfer: 24
      kt_num_gpu_experts: 4
      kt_threadpool_count: 2
      kt_method: GPTQ_INT4
      quantization: gptq_marlin
      context_length: 4096
      disable_shared_experts_fusion: true
      attention_backend: triton
      max_running_requests: 2
      watchdog_timeout: 3000
    expected_performance:
      startup_time_s: 20
      cold_start_time_s: 300
      tokens_per_second: [7, 9]
      vram_mib: 6000
      notes: "SGLang-KT AppImage v0.5.2, GPTQ-Int4 (AVX2 GPTQ_INT4 kernel), CPU-GPU hybrid MoE. 1× RTX 4060 8GB (WSL2, i9-13980HX 24-core) + 24GB CPU RAM. Measured 2026-04-02: 8.53 tok/s decode (triton+CUDA graph, gpu=4, cpu=24, tp=1). CUDA graph enabled (requires cuda.h + curand.h symlinks in conda). Parameter sweep: cpuinfer must match physical cores (24), NOT logical (32, causes 5× regression). threadpool_count=2 gives 3-6% boost. gpu_experts=4 marginal over 2; gpu=6 OOMs. llamacpp Q4_K_M reaches 21 tok/s — gap due to CPU expert offload bandwidth overhead."

  # --- AMD W7900D RDNA3 (llamacpp-rocm, GGUF Q4_K_M) ---
  # Validated 2026-04-01: 71-75 tok/s decode on 8× W7900D
  # MoE Q4_K_M = 18GB → fits on single GPU, but llama.cpp auto-splits across all
  # 49/49 layers GPU-offloaded, gfx1100 natively supported
  - name: qwen3-30b-a3b-rdna3-llamacpp-q4
    hardware:
      gpu_arch: RDNA3
      vram_min_mib: 20480
      unified_memory: false
    engine: llamacpp
    format: gguf
    source:
      type: huggingface
      repo: Qwen/Qwen3-30B-A3B-GGUF
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [65, 80]
      latency_first_token_ms: [20, 100]
      notes: "Validated 2026-04-01 on 8× W7900D 48GB RDNA3. llama.cpp full-rocm Docker, Q4_K_M 18GB, 49/49 layers offloaded. 71-75 tok/s decode (512 tokens). MoE 3B active params = fast decode."

  # --- 所有设备通用 (llamacpp + GGUF) ---
  # MoE Q4_K_M = 18.6GB → linux-1 (24GB/GPU ✓), amd395 (128GB unified ✓)
  # 虽然文件大，但推理时仅激活 3B params，速度较快
  # 不设 Ada-vllm: BF16 60GB >> 2×24GB=48GB TP=2，无官方 FP8 权重
  - name: qwen3-30b-a3b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
      ram_min_mib: 20480
    engine: llamacpp
    format: gguf
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [8, 30]
      latency_first_token_ms: [40, 200]
      notes: "Measured on test-win (i9-13980HX + RTX 4060 8GB, WSL2, 24GB RAM): 21 tok/s decode (TPOT P50=47ms), TTFT 1.4s @128 input tokens. MoE 3B active params — decode speed comparable to 8B dense."
