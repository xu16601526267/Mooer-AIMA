kind: model_asset
metadata:
  name: qwen3.5-122b-a10b
  type: llm
  family: qwen
  parameter_count: "122B"
  released_at: "2025-12"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- linux-1 (Ada, 2× RTX 4090 = 96GB VRAM, KTransformers hybrid) ---
  # 122B total / 10B active per token, 256 experts, 8 experts/tok
  # BF16 weights ~244GB — far exceeds 96GB VRAM
  # KTransformers offloads inactive experts to CPU (503GB RAM, Xeon 8488C AMX)
  # gpu_experts=30 + cpuinfer=64 optimal (sweep tested 6 params × 16 configs)
  - name: qwen3.5-122b-a10b-ada-sglang-kt-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 20480
      unified_memory: false
    engine: sglang-kt
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
    default_config:
      kt_num_gpu_experts: 30
      kt_method: BF16
      kt_cpuinfer: 64
      kt_threadpool_count: 1
      tp_size: 2
      mem_fraction_static: 0.85
      disable_shared_experts_fusion: true
      enable_p2p_check: true
      chunked_prefill_size: 32768
      max_running_requests: 16
      attention_backend: triton
      context_length: 131072
      reasoning_parser: qwen3
      tool_call_parser: qwen3_coder
    expected_performance:
      tokens_per_second: [21, 23]
      vram_mib: 84232
      notes: "KTransformers + SGLang hybrid, 2× RTX 4090 + Xeon 8488C AMX. 256 experts, 30 on GPU, rest CPU-offloaded via AMX. 228GB RAM. Optimal params from 22-config sweep: gpu_experts=30 (+5 tok/s vs 15), cpuinfer=64 (+3% vs 40). 2026-03-03."

  # --- AMD W7900D RDNA3 (8× 48GB, vLLM ROCm 0.18.1, BF16) ---
  # 122B MoE (256 experts, 8 active/tok, 10B active), BF16 ~232GB → TP=8, ~29GB/GPU
  # Hybrid GDN (Gated-DeltaNet) linear attention + full attention
  # GDN uses Triton FLA kernels — works on RDNA3 without CK Flash Attention
  # REQUIRES vLLM >= 0.17.0 (qwen3_5_moe support added 2026-02-09)
  # vLLM 0.16.x does NOT work (no qwen3_5 model class)
  # Built from source: vLLM 0.18.1 + ROCm 7.2.1 + PyTorch 2.9.1 on navi container
  # Validated 2026-04-03: 13.3 tok/s decode (tuned MoE kernel), TTFT 92ms, 41.7 GiB/GPU (gmu=0.85)
  - name: qwen3.5-122b-a10b-rdna3-vllm-bf16
    hardware:
      gpu_arch: RDNA3
      vram_min_mib: 40960
      gpu_count_min: 8
      unified_memory: false
    engine: vllm
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
    default_config:
      gpu_memory_utilization: 0.85
      max_model_len: 4096
      dtype: bfloat16
      tensor_parallel_size: 8
      enforce_eager: true
      trust_remote_code: true
      attention_backend: TRITON_ATTN
    expected_performance:
      tokens_per_second: [13, 14]
      latency_first_token_ms: [80, 150]
      startup_time_s: 100
      vram_mib: 341504
      notes: "Validated 2026-04-03 on 8× W7900D 48GB RDNA3. vLLM 0.18.1+rocm721 (source build on rocm/vllm-dev navi container), BF16, TP=8, enforce-eager. 13.3 tok/s decode (128/512/1024 tokens consistent), TTFT 92ms, startup ~100s (with Triton cache). 41.7 GiB/GPU (gmu=0.85). MoE 256 experts, 10B active — GDN layers use Triton/FLA kernels, full-attention layers use TRITON_ATTN backend. No CK Flash Attention (gfx1100 excluded from CK build). Custom RDNA3-tuned fused_moe config installed (E=256,N=128 for M=1,2,4 — BLOCK_SIZE_N=16/16/64, num_warps=2/1/4, tuned 2026-04-03 via single-GPU benchmark sweep). AITER MoE (gfx9-only) and CK not available on RDNA3. Parameter sweep 2026-04-02: ROCM_ATTN/gmu=0.92/gmu=0.95/max_model_len=2048 all yield identical 13.2-13.3 tok/s — bottleneck is RDNA3 MoE architecture (WMMA vs MFMA, wave32 vs wave64, no CK/AITER support). CUDA graphs not viable (>700s startup). triton-dejavu 0.7.5 installed for autotuner cache persistence. 13.3 tok/s is current RDNA3 ceiling."

  # --- AMD W7900D RDNA3 (Ollama 0.20.0, Q4_K_M GGUF) ---
  # BLOCKED: GPU offload fails — Ollama offloads 0/49 layers to GPU (100% CPU)
  # Tested 2026-04-02..03: Ollama 0.19.0→0.20.0, qwen3.5:122b Q4_K_M (81GB), 8× W7900D gfx1100
  #   CPU-only: ~2 tok/s. Root cause: ggml ROCm lacks MoE + GDN kernels for gfx1100
  #   Same result with Gemma 4 31B: Ollama 0.20.0 = 100% CPU, 1.61 tok/s
