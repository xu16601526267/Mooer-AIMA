kind: model_asset
metadata:
  name: qwen3-emb-0.6b
  type: embedding
  family: qwen
  parameter_count: "0.6B"
  released_at: "2025-06"
  aliases:
    - Qwen3-Embedding-0.6B
    - qwen3-embedding-0.6b
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-Embedding-0.6B
      format: safetensors
    - type: modelscope
      repo: Qwen/Qwen3-Embedding-0.6B
      format: safetensors
    - type: local_path
      path: "/opt/mt-ai/emb/models/Qwen3-Embedding-0.6B"
variants:
  # --- Moore Threads MUSA (M1000 SoC / AIBook, 32GB unified) ---
  # 0.6B params, FP16 weights ~1.2GB, vLLM-MUSA serve with gmu=0.25
  # AIBook M1000 SoC uses a conservative default to coexist with the LLM and desktop session.
  # Pre-loaded at /opt/mt-ai/emb/models/Qwen3-Embedding-0.6B
  # Output: 1024-dim embeddings, max 4096 tokens input
  - name: qwen3-emb-0.6b-musa-soc-vllm
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-musa
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.25
      max_model_len: 4096
      num_gpu_blocks_override: 128
      enforce_eager: true
      block_size: 32
      swap_space: 0
      port: 32104
    expected_performance:
      startup_time_s: 80
      cold_start_time_s: 90
      vram_mib: 6400
      notes: "AIBook M1000 SoC 32GB. vLLM-MUSA 0.9.2, 1024-dim embeddings. gmu=0.25 is the AIBook source-deploy default so the embedding service can coexist with the LLM and desktop session. Measured 2026-05-09 on AIBook: model load ~1.12 GiB, service ready at /health. Pre-loaded at /opt/mt-ai/emb/models/Qwen3-Embedding-0.6B."

  # --- Moore Threads MUSA (M1000 Dev Kit, 62GB unified) ---
  # Same model, more headroom on 62GB
  - name: qwen3-emb-0.6b-musa-vllm
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-musa
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.10
      max_model_len: 4096
      enforce_eager: true
      block_size: 32
      swap_space: 0
    expected_performance:
      vram_mib: 6400
      notes: "M1000 Dev Kit 62GB. gmu=0.10 sufficient for 0.6B model. More headroom for coexistence with larger LLMs."

  # --- GB10 (Blackwell, 128GB unified) ---
  - name: qwen3-emb-0.6b-blackwell-vllm
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.05
      max_model_len: 4096
      dtype: bfloat16
    expected_performance:
      vram_mib: 4096
      notes: "GB10 128GB unified. gmu=0.05 sufficient. Coexists easily with LLM + ASR + TTS."

  # --- Ada (RTX 4090, 24GB discrete) ---
  - name: qwen3-emb-0.6b-ada-vllm
    hardware:
      gpu_arch: Ada
      vram_min_mib: 4096
      unified_memory: false
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.10
      max_model_len: 4096
      dtype: auto
    expected_performance:
      vram_mib: 2400
      notes: "RTX 4090 24GB. gmu=0.10 on 24GB = 2.4GB, sufficient for 1.2GB model. Coexists with LLM."
