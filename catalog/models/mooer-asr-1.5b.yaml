kind: model_asset
metadata:
  name: mooer-asr-1.5b
  type: asr
  family: mooer
  parameter_count: "1.5B"
  released_at: "2024-10"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: local_path
      path: "/opt/mt-ai/mooer/ASR_AST_MTL"
variants:
  # --- Moore Threads MUSA (M1000 SoC / AIBook, 32GB unified) ---
  # MoOER ASR_AST_MTL: 1.5B Qwen2-based, flash_attn for MUSA
  # PyInstaller-bundled binary with full torch-musa runtime
  # Native process, no container needed. Port 32107.
  # Note: uses GPU via torch-musa, but memory impact is modest (~2-3GB)
  - name: mooer-asr-1.5b-musa-soc-native
    hardware:
      gpu_arch: MUSA
      vram_min_mib: 4096
      unified_memory: true
    engine: mooer
    format: safetensors
    default_config:
      port: 32107
      only_ast: false
      mode: zh2en
    expected_performance:
      startup_time_s: 42
      cold_start_time_s: 45
      vram_mib: 15360
      notes: "AIBook M1000 SoC 32GB. Measured 2026-03-27: GPU memory ~15GB (not 3GB as estimated — includes torch-musa runtime + model weights + KV cache). First inference 42s (GPU warmup + torch.compile), steady state RTF 0.55-0.67 (4.5s audio → 2.5-3.0s). Chinese ASR accurate, zh→en translation functional. WARNING: Cannot coexist with LLM(gmu=0.5)+EMB(gmu=0.2) — total would exceed 32GB. Can coexist with LLM-only (16+15=31GB, tight). PyInstaller binary at /opt/mt-ai/mooer/mooer_server_aibook2. Start: ./mooer_server_aibook2 --only_ast false --mode zh2en --port 32107."
