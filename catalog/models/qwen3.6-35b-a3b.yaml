kind: model_asset
metadata:
  name: qwen3.6-35b-a3b
  type: llm
  family: qwen
  parameter_count: "35B"
  released_at: "2026-04"
  aliases:
    - Qwen3.6-35B-A3B
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3.6-35B-A3B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, Docker/K3S) ---
  # 实测稳定路径是 text-only vLLM:
  # - language_model_only=true
  # - attention_backend=TRITON_ATTN
  # - mm_encoder_attn_backend=TORCH_SDPA
  # - skip_mm_profiling=true
  # 该配置在 gb10-4t 上验证到 262144 max_model_len，可完成接近 256K prompt tokens。
  - name: qwen3.6-35b-a3b-blackwell-vllm-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.80
      max_model_len: 262144
      dtype: bfloat16
      enforce_eager: true
      trust_remote_code: true
      language_model_only: true
      reasoning_parser: qwen3
      enable_auto_tool_choice: true
      tool_call_parser: qwen3_xml
      attention_backend: TRITON_ATTN
      mm_encoder_attn_backend: TORCH_SDPA
      skip_mm_profiling: true
    expected_performance:
      startup_time_s: 175
      cold_start_time_s: 300
      tokens_per_second: [17, 27]
      tpot_ms: [37, 58]
      vram_mib: 66250
      notes: "Validated 2026-04-21 on gb10-4t (Blackwell, 128GB unified). Official Qwen3.6 native context is 262144, and this AIMA path was validated up to actual_prompt_tokens=256024. Current stable GB10 baseline path is text-only vLLM with explicit TRITON_ATTN/TORCH_SDPA backends. For long-context analysis, use TTFT, prefill_tok_s, and decode_tps=1000/tpot_ms before interpreting benchmark throughput_tps; throughput_tps is end-to-end output_tokens/total_duration and is heavily dominated by TTFT at 128K+. Baseline evidence is split across /home/qujing/aima-codex-qwen36/aima.db and /home/qujing/.aima/aima.db on gb10-4t: the current YAML context_scaling keeps exact prompt-token points, while baseline_measurements preserves the fuller DB records including short-context matrix rows and the 512-output 1K/32K smoke. On 2026-04-22/23, speculative MTP and DFlash were additionally validated on the same host with AIMA benchmark.run under single-stream; see the dedicated speculative variants below."
      context_scaling:
        # actual_prompt_tokens: [ttft_s, decode_tok_s, prefill_tok_s]
        # Direct 512-output baseline points from /home/qujing/.aima/aima.db.
        933:    [0.337, 28.5, 2765]
        29149:  [9.047, 26.6, 3222]
        # Calibrated long-context probes from /home/qujing/aima-codex-qwen36/aima.db.
        32791:  [10.378, 26.6, 3159]
        65558:  [27.822, 24.7, 2356]
        128024: [82.288, 21.5, 1556]
        160024: [120.431, 20.3, 1329]
        192024: [165.922, 19.3, 1157]
        224024: [218.974, 18.2, 1023]
        256024: [282.643, 17.4, 906]
      baseline_measurements:
        host: gb10-4t
        measured_at: "2026-04-21"
        sources:
          - db: /home/qujing/aima-codex-qwen36/aima.db
            description: "baseline matrix and calibrated long-context probes"
          - db: /home/qujing/.aima/aima.db
            description: "baseline 512-output smoke points"
        caveats:
          - "No 4K baseline row was found in the checked AIMA DBs or artifacts."
          - "The fuller baseline matrix is mostly output_tokens=128; do not compare it as a strict same-batch 512-output sweep against MTP/DFlash."
          - "Rows with actual_prompt_tokens omitted only preserved AIMA's input_len_bucket label, not tokenizer-exact avg_input_tokens."
        output_512:
          # workload: [actual_prompt_tokens, ttft_s, tpot_ms, decode_tok_s, end_to_end_tps, sample_count]
          1k-512:  [933,   0.337, 35.061, 28.5, 28.051, 4]
          32k-512: [29149, 9.047, 37.624, 26.6, 18.107, 3]
        matrix_128:
          # input_target_tokens: [actual_prompt_bucket, ttft_s, tpot_ms, decode_tok_s, end_to_end_tps, sample_count]
          128:    [136, 0.204, 34.979, 28.6, 27.367, 4]
          1024:   [935, 0.338, 35.157, 28.4, 26.666, 4]
          2048:   ["1K", 0.488, 35.191, 28.4, 25.822, 4]
