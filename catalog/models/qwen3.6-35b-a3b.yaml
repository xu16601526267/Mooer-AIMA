  # --- GB10 speculative path: native MTP on patched GB10 vLLM image ---
  # Measured with AIMA benchmark.run, concurrency=1, num_requests=1,
  # warmup_count=2, output_tokens=512. actual_prompt_tokens are taken from
  # response usage rather than the requested target bucket.
  - name: qwen3.6-35b-a3b-blackwell-vllm-mtp
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.92
      max_model_len: 262144
      dtype: bfloat16
      enforce_eager: true
      trust_remote_code: true
      language_model_only: true
      reasoning_parser: qwen3
      enable_auto_tool_choice: true
      tool_call_parser: qwen3_xml
      attention_backend: TRITON_ATTN
      mm_encoder_attn_backend: TORCH_SDPA
      skip_mm_profiling: true
      max_num_batched_tokens: 8192
      speculative_config:
        method: mtp
        num_speculative_tokens: 1
    expected_performance:
      startup_time_s: 190
      cold_start_time_s: 300
      tokens_per_second: [15, 39]
      tpot_ms: [25, 65]
      max_context_tokens: 116532
      notes: "Validated 2026-04-22 on gb10-4t with AIMA benchmark.run, single_stream=true, output_tokens=512. Service boots at max_model_len=262144, but the 262144 target bucket ended with read SSE stream: unexpected EOF before a stable 512-token sample was recorded. Treat 116532 actual_prompt_tokens as the highest stable long-context point under this exact benchmark shape."
      context_scaling:
        # actual_prompt_tokens: [ttft_s, decode_tok_s, prefill_tok_s]
        935:    [0.874, 39.1, 1070]
        1844:   [0.695, 39.0, 2653]
        3665:   [1.090, 39.2, 3364]
        7304:   [1.770, 37.2, 4126]
        14586:  [3.827, 33.3, 3811]
        29150:  [8.689, 28.3, 3355]
        58277:  [23.672, 15.7, 2462]
        116532: [72.017, 15.5, 1618]

  # --- GB10 speculative path: DFlash on FA2-injected GB10 vLLM image ---
  # Same AIMA benchmark.run shape as MTP, plus GB10 runtime env requirements
  # for the patched FlashAttention/GDN path.
  - name: qwen3.6-35b-a3b-blackwell-vllm-dflash
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.92
      max_model_len: 262144
      block_size: 1280
      dtype: bfloat16
      enforce_eager: false
      trust_remote_code: true
      language_model_only: true
      reasoning_parser: qwen3
      enable_auto_tool_choice: true
      tool_call_parser: qwen3_xml
      attention_backend: FLASH_ATTN
      mm_encoder_attn_backend: TORCH_SDPA
      skip_mm_profiling: true
      max_num_batched_tokens: 8192
      max_num_seqs: 1
      async_scheduling: false
      speculative_config:
        method: dflash
        model: /models/Qwen3.6-35B-A3B-DFlash
        num_speculative_tokens: 10
    expected_performance:
      startup_time_s: 376
      cold_start_time_s: 420
      tokens_per_second: [13, 45]
      tpot_ms: [22, 75]
      max_context_tokens: 233039
      notes: "Validated 2026-04-22/23 on gb10-4t with AIMA benchmark.run. Current working GB10 runtime also needs VLLM_KV_CACHE_LAYOUT=NHD, VLLM_SKIP_GDN_PREFILL_WARMUP=1, FLA_GDN_FIX_BT=1, and VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1. The context_scaling table below is the final retained 2026-04-23 sweep with output_tokens=512, concurrency=1, rounds=3, warmup=2, block_size=1280, max_num_batched_tokens=8192, max_num_seqs=1, no_async_scheduling, and num_speculative_tokens=10. Raw results are stored at artifacts/knowledge/qwen3.6-gb10-dflash-final-context-sweep-results.json. For the practical single-stream business path at 32K/64K input + 1K output, the retained recommendation is non-eager + block_size=1280 + max_num_batched_tokens=8192 + max_num_seqs=1 + no_async_scheduling + num_speculative_tokens=10; keep scheduler_reserve_full_isl enabled. Runtime logs confirm chunked prefill is enabled and prefix caching is disabled. Concurrent partial prefill, block_size=1536/2048, num_speculative_tokens=11/12, GDN FlashInfer prefill, DBO, FlashInfer TRTLLM MoE, FlashInfer CUTLASS MoE, cudagraph_capture_size=1, GB10 fused MoE tuned config safe-v1, GB10 targeted MoE autotune-v1, and round16 large-bucket-only MoE guided variants did not produce a stronger practical default or are unavailable/invalid for this current image/config. The raw H100 same-shape fused MoE config must not be used on GB10 because it fails fused_moe Triton compilation with shared memory Required=147456, Hardware limit=101376. Targeted MoE autotune-v1 is runnable and slightly improves 64K end-to-end TPS (+0.35%) but regresses 32K (-3.23%) and worsens TPOT in both buckets, so keep it as an experiment-only candidate. Round16 large-bucket-only variants were worse than both retained config and autotune-v1 at 64K/1K."
      final_context_sweep_512:
        benchmark: "AIMA benchmark.run"
        host: gb10-4t
        measured_at: "2026-04-23"
        image: qujing/vllm-gb10-dflash-fa2:latest
        concurrency: 1
        requests: 1
        rounds: 3
        warmup: 2
        output_tokens: 512
        ready_s: 376.4
        config:
          gpu_memory_utilization: 0.92
          max_model_len: 262144
          block_size: 1280
          max_num_batched_tokens: 8192
          max_num_seqs: 1
          async_scheduling: false
          moe_tuned_config: false
          speculative_config:
            method: dflash
            model: /models/Qwen3.6-35B-A3B-DFlash
            num_speculative_tokens: 10
        runtime_env:
          VLLM_KV_CACHE_LAYOUT: NHD
          VLLM_SKIP_GDN_PREFILL_WARMUP: "1"
          FLA_GDN_FIX_BT: "1"
          VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
        results:
          # input_target_tokens: [actual_prompt_tokens, ttft_s, tpot_ms, decode_tok_s, end_to_end_tps, draft_acceptance_rate, mean_acceptance_length]
          1024:   [934, 0.353, 23.976, 41.7, 39.785, 0.244, 2.44]
          2048:   [1844, 0.494, 24.353, 41.1, 38.856, 0.235, 2.35]
          4096:   [3664, 0.771, 24.821, 40.3, 38.324, 0.254, 2.54]
          8192:   [7304, 1.317, 22.112, 45.2, 40.543, 0.274, 2.74]
          16384:  [14586, 2.744, 27.768, 36.0, 30.555, 0.243, 2.43]
          32768:  [29149, 5.932, 29.363, 34.1, 24.679, 0.263, 2.63]
          65536:  [58277, 13.749, 38.113, 26.2, 15.220, 0.233, 2.33]
          131072: [116532, 35.169, 50.205, 19.9, 8.380, 0.234, 2.34]
          262144: [233039, 109.196, 74.197, 13.5, 3.482, 0.250, 2.50]
      business_long_context_1k:
        benchmark: "AIMA benchmark.run"
        host: gb10-4t
        measured_at: "2026-04-23"
        concurrency: 1
        requests: 1
        rounds: 3
        warmup: 2
        output_tokens: 1024
        prompt: "business long-context prompt"
        recommended_flags:
          max_num_seqs: 1
          async_scheduling: false
          scheduler_reserve_full_isl: true
          max_num_batched_tokens: 8192
          block_size: 1280
          num_speculative_tokens: 10
        results:
          # input_target_tokens: [actual_prompt_tokens, ttft_s, tpot_ms, end_to_end_tps, draft_acceptance_rate, mean_acceptance_length]
          32768: [29173, 5.955, 30.644, 27.324, 0.231, 2.31]
          65536: [58314, 13.807, 37.139, 19.746, 0.222, 2.22]
        moe_tuned_config_trials:
          - name: h100_same_shape_seed
            tuned_config_folder: /home/qujing/aima-codex-qwen36/moe-configs/qwen36-gb10-seed
            config_file: E=256,N=512,device_name=NVIDIA_GB10.json
            status: invalid
            reason: "Fails before ready in fused_moe Triton kernel: shared memory Required=147456, Hardware limit=101376."
          - name: gb10_safe_v1
            tuned_config_folder: /home/qujing/aima-codex-qwen36/moe-configs/qwen36-gb10-safe-v1
            config_file: E=256,N=512,device_name=NVIDIA_GB10.json
            status: runnable_not_recommended
            input_target_tokens: 65536
            actual_prompt_tokens: 58314
            output_tokens: 1024
            ttft_s: 13.970
            tpot_ms: 39.896
            end_to_end_tps: 18.712
            draft_acceptance_rate: 0.221
            mean_acceptance_length: 2.21
            delta_vs_retained_64k:
              ttft_pct: 1.18
              tpot_pct: 7.42
              end_to_end_tps_pct: -5.24
          - name: gb10_targeted_autotune_v1
            tuned_config_folder: /home/qujing/aima-codex-qwen36/moe-configs/qwen36-gb10-autotune-v1
            config_file: E=256,N=512,device_name=NVIDIA_GB10.json
            status: runnable_experiment_only
            autotune:
              script: artifacts/knowledge/qwen3.6-gb10-moe-autotune-targeted.py
              elapsed_s: 292
              batch_buckets: [1, 2, 4, 8, 16, 24, 32, 48, 64, 96, 128, 256, 512, 1024, 2048, 4096, 8192]
            results:
              # input_target_tokens: [actual_prompt_tokens, ttft_s, tpot_ms, end_to_end_tps, draft_acceptance_rate, mean_acceptance_length]
              32768: [29173, 6.025, 32.098, 26.443, 0.224, 2.24]
              65536: [58314, 13.712, 37.810, 19.815, 0.224, 2.24]
            delta_vs_retained:
              32768:
                ttft_pct: 1.17
                tpot_pct: 4.74
                end_to_end_tps_pct: -3.23
              65536:
                ttft_pct: -0.68
                tpot_pct: 1.81
                end_to_end_tps_pct: 0.35
          - name: gb10_e2e_guided_large_bucket_variants
            status: rejected
            benchmark_shape: "64K input / 1K output / concurrency=1 / rounds=2 / warmup=1"
            variants:
              - name: moe_e2e_big512plus
                overridden_buckets: [512, 1024, 2048, 4096, 8192]
                ttft_s: 13.839
                tpot_ms: 40.382
                end_to_end_tps: 18.567
                draft_acceptance_rate: 0.208
              - name: moe_e2e_big1024plus
                overridden_buckets: [1024, 2048, 4096, 8192]
                ttft_s: 13.830
                tpot_ms: 39.067
                end_to_end_tps: 19.035
                draft_acceptance_rate: 0.225
              - name: moe_e2e_big4096plus
                overridden_buckets: [4096, 8192]
                ttft_s: 14.071
                tpot_ms: 38.211
                end_to_end_tps: 19.262
                draft_acceptance_rate: 0.219
            conclusion: "No variant beat round12 retained 64K/1K TPS=19.746 or round15 autotune-v1 TPS=19.815."
      context_scaling:
        # actual_prompt_tokens: [ttft_s, decode_tok_s, prefill_tok_s]
        934:    [0.353, 41.7, 2644]
        1844:   [0.494, 41.1, 3735]
