kind: model_asset
metadata:
  name: qwen3-32b
  type: llm
  family: qwen
  parameter_count: "32B"
  released_at: "2025-04"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-32B
      format: safetensors
    - type: huggingface
      repo: Qwen/Qwen3-32B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-32B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # FP16 weights ~64GB, GB10 unified memory 128GB
  # gpu_memory_utilization 0.60 on 128GB ≈ 76.8GB → 64GB 权重 + 12.8GB KV cache
  - name: qwen3-32b-blackwell-vllm-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 20480
      unified_memory: true
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.60
      max_model_len: 4096
      dtype: bfloat16
    expected_performance:
      tokens_per_second: [8, 18]
      latency_first_token_ms: [50, 200]

  # --- Ascend 910B (sglang, safetensors BF16) ---
  # BF16 ~64GB → 8×64GB HBM = 512GB total, TP8 → each NPU holds ~8GB
  - name: qwen3-32b-ascend-sglang-bf16
    hardware:
      gpu_arch: Ascend910B
      vram_min_mib: 8192
    engine: sglang
    format: safetensors
    default_config:
      tp: 8
      mem_fraction_static: 0.86
      context_length: 8192
      disable_radix_cache: true
      watchdog_timeout: 9000

  # --- 所有设备通用 (llamacpp + GGUF) ---
  # Q4_K_M = 19.8GB → linux-1 (2×4090 24GB/GPU ✓), amd395 (128GB unified ✓)
  # RTX 4060 (8GB) / M4 (16GB) 太小，需大量 CPU offload
  # 不设 Ada-vllm: FP16 64GB >> 2×24GB=48GB TP=2
  - name: qwen3-32b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
      ram_min_mib: 22528
    engine: llamacpp
    format: gguf
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 2048
    expected_performance:
      tokens_per_second: [3, 15]
      latency_first_token_ms: [100, 500]
