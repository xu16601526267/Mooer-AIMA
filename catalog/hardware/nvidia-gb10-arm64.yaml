kind: hardware_profile
metadata:
  name: nvidia-gb10-arm64
  description: "NVIDIA DGX Spark GB10, ARM64, 128GB unified memory"
hardware:
  gpu:
    arch: Blackwell
    vram_mib: 15360
    bandwidth_gbps: 273
    compute_id: "10.0"
    compute_units: 2048
    resource_name: "nvidia.com/gpu"
    runtime_class_name: "nvidia"
  cpu:
    arch: arm64
    cores: 12
    freq_ghz: 3.0
  ram:
    total_mib: 131072
    bandwidth_gbps: 200
  unified_memory: true
constraints:
  tdp_watts: 100
  power_modes: [15, 30, 60, 100]
  cooling: passive
partition:
  gpu_tools: [hami, engine_params]
  cpu_tools: [k3s_cgroups]
container:
  env:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
    LD_LIBRARY_PATH: "/lib/aarch64-linux-gnu:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
