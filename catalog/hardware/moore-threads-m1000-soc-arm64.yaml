kind: hardware_profile
metadata:
  name: moore-threads-m1000-soc-arm64
  description: "Moore Threads M1000 SoC (AIBook), aarch64, 32GB unified LPDDR5X"
hardware:
  gpu:
    arch: MUSA
    vram_mib: 32768
    bandwidth_gbps: 60
    compute_id: ""
    compute_units: 0
    resource_name: ""
  cpu:
    arch: aarch64
    cores: 12
    freq_ghz: 2.65
  ram:
    total_mib: 32768
    bandwidth_gbps: 60
  npu:
    vendor: mthreads
    cores: 2
    tops_int8: 50
  unified_memory: true
constraints:
  tdp_watts: 89
  power_modes: [60, 89]
  cooling: active
partition:
  gpu_tools: [engine_params]
  cpu_tools: [cgroups]
container:
  devices:
    - /dev/mtgpu.0
    - /dev/dri
  env:
    ENABLE_MUSA_MMA: "1"
    TRITON_CACHE_DIR: "/tmp/triton"
    LD_LIBRARY_PATH: "/usr/local/musa/lib"
