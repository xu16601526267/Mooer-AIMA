kind: hardware_profile
metadata:
  name: nvidia-rtx4060-x86
  description: "NVIDIA RTX 4060 Laptop, x86_64, 8GB VRAM"
hardware:
  gpu:
    arch: Ada
    vram_mib: 8192
    bandwidth_gbps: 272
    compute_id: "8.9"
    compute_units: 3072
    resource_name: "nvidia.com/gpu"
    runtime_class_name: "nvidia"
  cpu:
    arch: x86_64
    cores: 32
    freq_ghz: 5.4
  ram:
    total_mib: 32768
    bandwidth_gbps: 40
  unified_memory: false
constraints:
  tdp_watts: 140
  power_modes: [140]
  cooling: active
partition:
  gpu_tools: [hami, engine_params]
  cpu_tools: [k3s_cgroups]
container:
  env:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
    LD_LIBRARY_PATH: "/lib/x86_64-linux-gnu:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
