kind: hardware_profile
metadata:
  name: amd-radeon-8060s-x86
  description: "AMD Radeon 8060S (RDNA 3.5), x86_64, shared memory with Ryzen AI MAX+ 395"
hardware:
  gpu:
    arch: RDNA3.5
    vram_mib: 16384
    bandwidth_gbps: 120
    compute_id: "gfx1151"
    compute_units: 2048
    resource_name: "amd.com/gpu"
  cpu:
    arch: x86_64
    cores: 16
    freq_ghz: 4.0
  ram:
    total_mib: 131072
    bandwidth_gbps: 60
  unified_memory: true
constraints:
  tdp_watts: 120
  power_modes: [120]
  cooling: active
partition:
  gpu_tools: [engine_params]
  cpu_tools: [cgroups]
container:
  devices:
    - /dev/kfd
    - /dev/dri
  env:
    LD_PRELOAD: "/opt/rocm/lib/librocm_smi64.so"
  security:
    privileged: true
    supplemental_groups: [44, 109]
