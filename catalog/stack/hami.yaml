kind: stack_component
metadata:
  name: hami
  version: "2.4.1"
  description: "HAMi GPU virtualization middleware for fine-grained GPU sharing"

compatibility:
  aima_min: "0.0.1"

# HAMi supports heterogeneous devices: NVIDIA, Ascend, HYGON DCU, Cambricon,
# Iluvatar, Moore Threads, MetaX. Skip on unsupported hardware:
#   - AMD Radeon RDNA: not in HAMi's supported device list (HYGON DCU ≠ AMD Radeon)
#   - NVIDIA UMA devices: NVML returns NVML_ERROR_NOT_SUPPORTED (code 3),
#     causing device-plugin CrashLoopBackOff (HAMi PR #1637 not yet released)
conditions:
  skip_profiles:
    - nvidia-gb10-arm64   # GB10: NVIDIA UMA, NVML memory query incompatible
    - amd-radeon-8060s-x86  # AMD Radeon 8060S: RDNA not in HAMi supported devices

source:
  chart: "hami-2.4.1.tgz"
  airgap: "hami-airgap-images.tar"
  platforms: [linux/amd64, linux/arm64]
  download:
    linux/amd64: "https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
    linux/arm64: "https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
  mirror:
    linux/amd64:
      - "https://ghfast.top/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
      - "https://cf.ghproxy.cc/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
      - "https://gh-proxy.com/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
    linux/arm64:
      - "https://ghfast.top/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
      - "https://cf.ghproxy.cc/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
      - "https://gh-proxy.com/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
  airgap_download:
    linux/amd64: "https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-amd64.tar"
    linux/arm64: "https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-arm64.tar"
  airgap_mirror:
    linux/amd64:
      - "https://ghfast.top/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-amd64.tar"
      - "https://cf.ghproxy.cc/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-amd64.tar"
      - "https://gh-proxy.com/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-amd64.tar"
    linux/arm64:
      - "https://ghfast.top/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-arm64.tar"
      - "https://cf.ghproxy.cc/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-arm64.tar"
      - "https://gh-proxy.com/https://github.com/Approaching-AI/AIMA/releases/download/bundle/stack/2026-02-26/hami-airgap-images-arm64.tar"
  airgap_sha256:
    linux/amd64: "090c689d0af72020b0afb18cff58a20e6aef8368ebd0b75c6e4b4bc736eb1ba4"
    linux/arm64: "bb2a453d4c5d9dbd04a46656a86d188e64739225c0e837ce8c9a339ae52b9371"

install:
  method: helm
  priority: 20
  tier: k3s
  helm:
    chart: "hami-2.4.1.tgz"
    namespace: "hami-system"
    values:
      scheduler:
        defaultMem: 0
        defaultCores: 0
        kubeScheduler:
          # Disable: K3S version tag "v1.31.4+k3s1" has invalid "+" for OCI image refs.
          # Single-GPU edge devices only need HAMi device plugin, not custom scheduler.
          enabled: false
      devicePlugin:
        deviceMemoryScaling: 1.0
        runtimeClassName: nvidia

verify:
  command: "k3s kubectl get pods -n hami-system"
  ready_condition: "Running"
  timeout_s: 120
  pods:
    - namespace: hami-system
      label: "app=hami-device-plugin"
      min_ready: 1

profiles:
  # Blackwell-arm64: excluded — see compatibility.exclude_gpu_arch
  nvidia-rtx4090-x86:
    extra_env:
      HAMI_DEVICE_MEMORY_SCALING: "1.0"

open_questions:
  - question: "What deviceMemoryScaling works best for vLLM on GB10?"
    hypothesis: "1.0 (no overcommit) since inference is memory-bound"
    test_method: "Deploy two models with gpu_memory_utilization=0.5 each, check OOM"
  - question: "Does HAMi work correctly with K3S containerd?"
    hypothesis: "Yes, HAMi supports containerd as runtime"
    test_method: "Install HAMi on K3S, deploy GPU workload, verify nvidia-smi in container"
  - question: "GB10 UMA: NVML nvmlDeviceGetMemoryInfo returns NVML_ERROR_NOT_SUPPORTED (code 3)"
    status: confirmed_incompatible
    finding: "HAMi v2.4.1 device-plugin enters CrashLoopBackOff on GB10 (160+ restarts). NVML cannot report unified memory. PR #1637 (merged 2026-02-04) not yet released. Workaround: exclude Blackwell from HAMi install, use engine-level memory management (gpu_memory_utilization) instead."
    test_method: "Re-evaluate when HAMi ships a release containing PR #1637"
  - question: "Is engine-layer memory management sufficient for GB10 without HAMi?"
    hypothesis: "Yes — llama.cpp --ctx-size and vLLM gpu_memory_utilization work on UMA. 128GB unified memory bottleneck is bandwidth/compute, not capacity."
    test_method: "Deploy multi-model on GB10 with engine-level limits only, observe stability and throughput"
  - question: "Should HAMi be skipped for AMD Radeon RDNA GPUs?"
    status: confirmed
    finding: "HAMi supports 7 heterogeneous device families (NVIDIA, Ascend, HYGON DCU, Cambricon, Iluvatar, Moore Threads, MetaX) but AMD Radeon RDNA is NOT among them. HYGON DCU is AMD-architecture but a different product line. On amd395 (RDNA3.5), HAMi device-plugin (configured with runtimeClassName:nvidia + nvidia.com/gpu) entered CrashLoopBackOff (380+ restarts) because no NVIDIA driver/NVML exists. Additionally, Strix Halo is UMA which may compound the issue (same as GB10). Manually deleted HAMi, added RDNA3.5-amd64 to skip_profiles."
    test_method: "Any new AMD Radeon profile should be added to skip_profiles. Re-evaluate if HAMi adds AMD ROCm support in future."
