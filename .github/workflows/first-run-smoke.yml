name: First Run Smoke

on:
  pull_request:
  push:
    branches:
      - develop
      - master

permissions:
  contents: read

concurrency:
  group: first-run-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test ./...

      - name: First-run smoke
        run: make first-run-smoke
