                <div class="value" x-text="wizHwProfile()"></div>
              </div>
              <!-- Docker -->
              <div class="wiz-hw-item">
                <div class="label" x-text="t('wiz_docker')"></div>
                <div class="value" :class="wizStackReady('docker') ? 'success' : 'warning'">
                  <span class="wiz-badge" :class="wizStackReady('docker') ? 'ready' : 'missing'"
                    x-text="wizStackReady('docker') ? t('wiz_ready') : t('wiz_not_found')"></span>
                </div>
              </div>
              <!-- K3S -->
              <div class="wiz-hw-item">
                <div class="label" x-text="t('wiz_k3s')"></div>
                <div class="value" :class="wizStackReady('k3s') ? 'success' : 'warning'">
                  <span class="wiz-badge" :class="wizStackReady('k3s') ? 'ready' : 'missing'"
                    x-text="wizStackReady('k3s') ? t('wiz_ready') : t('wiz_not_found')"></span>
                </div>
              </div>
            </div>
          </div>
          <!-- GPU Occupancy Warning -->
          <template x-if="onboardingData && onboardingData.gpu_occupancy && onboardingData.gpu_occupancy.length > 0">
            <div class="wiz-card" style="margin-top:16px;border-color:var(--warning)">
              <div class="wiz-card-title" style="color:var(--warning)">
                <span class="wiz-icon">&#x26A0;</span>
                <span x-text="t('wiz_gpu_occupied')"></span>
              </div>
              <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px" x-text="t('wiz_gpu_occupied_desc')"></p>
              <div style="display:flex;flex-direction:column;gap:8px">
                <template x-for="(proc, pi) in onboardingData.gpu_occupancy" :key="pi">
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-panel);border:var(--panel-border);border-radius:var(--radius-sm)">
                    <div>
                      <div style="font-size:14px;font-weight:600;color:var(--text)" x-text="proc.name"></div>
                      <div style="font-size:12px;color:var(--text-dim)">
                        <span x-text="proc.image"></span>
                        <span x-show="proc.gpu_mem_mib > 0" x-text="' \u00B7 GPU ' + (proc.gpu_mem_mib / 1024).toFixed(1) + ' GB'"></span>
                      </div>
                    </div>
                    <button class="wiz-btn wiz-btn-secondary" style="font-size:12px;padding:6px 14px;white-space:nowrap"
                      :style="proc._stopping ? 'opacity:0.5;pointer-events:none' : ''"
                      @click="wizStopContainer(proc, pi)"
                      x-text="proc._stopping ? t('wiz_stopping') : t('wiz_stop_container')"></button>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <div class="wiz-actions" style="margin-top:16px">
            <template x-if="wizNeedsInit()">
              <button class="wiz-btn wiz-btn-primary" @click="wizEnterInit()" x-text="t('wiz_continue_setup')"></button>
            </template>
            <template x-if="!wizNeedsInit()">
              <button class="wiz-btn wiz-btn-primary" @click="wizStartScan()" x-text="t('wiz_continue_scan')"></button>
            </template>
            <button class="wiz-btn wiz-btn-secondary" @click="wizSkip()">Skip</button>
          </div>
        </div>

        <!-- INIT phase -->
        <div x-show="onboardingPhase === 'init'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x2699;</span> <span x-text="t('wiz_init')"></span></div>
            <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px" x-text="t('wiz_needs_init')"></p>

            <template x-if="wizCanAutoInit()">
              <div style="display:flex;flex-direction:column;gap:12px">
                <div class="wiz-hint">
                  <span x-text="'Automatic ' + wizInitTier() + ' stack setup is running in this browser session.'"></span>
                </div>
                <div class="wiz-scan-list">
                  <template x-for="(item, i) in onboardingInitLog" :key="i">
                    <div class="wiz-scan-item">
                      <span class="wiz-scan-icon" x-text="item.type === 'component' ? '\u2714' : '\u2699'"></span>
                      <span class="wiz-scan-type" x-text="item.type"></span>
                      <span x-text="item.name"></span>
                    </div>
                  </template>
                  <div class="wiz-scan-item" x-show="onboardingInitLog.length === 0 || onboardingInitRunning">
                    <span class="wiz-spinner"></span>
                    <span x-text="onboardingInitRunning ? t('wiz_init_polling') : ('Waiting for ' + wizInitTier() + ' stack setup...')"></span>
                  </div>
                </div>
                <div class="wiz-error" x-show="onboardingInitError" x-text="onboardingInitError"></div>
              </div>
            </template>

            <template x-if="!wizCanAutoInit()">
              <div style="display:flex;flex-direction:column;gap:12px">
                <!-- Linux instructions -->
                <template x-if="wizPlatform() === 'linux'">
                  <div style="display:flex;flex-direction:column;gap:12px">
                    <p style="font-size:13px;color:var(--text-dim)" x-text="t('wiz_init_linux')"></p>
                    <div class="wiz-cmd-box">
                      <code x-text="wizInitCommand()"></code>
                      <button class="wiz-copy-btn" @click="wizCopyText(wizInitCommand(), $event)" x-text="t('wiz_copy')"></button>
                    </div>
                    <p class="wiz-hint" x-show="wizInitBlockedReason()" x-text="wizInitBlockedReason()"></p>
                  </div>
                </template>

                <!-- macOS instructions -->
                <template x-if="wizPlatform() === 'darwin'">
                  <div style="display:flex;flex-direction:column;gap:12px">
                    <template x-if="wizStackReady('docker')">
                      <p style="font-size:13px;color:var(--success)" x-text="t('wiz_init_mac_ready')"></p>
                    </template>
                    <template x-if="!wizStackReady('docker')">
                      <p style="font-size:13px;color:var(--text-dim)" x-text="t('wiz_init_mac')"></p>
                    </template>
                  </div>
                </template>

                <!-- Windows instructions -->
                <template x-if="wizPlatform() === 'windows'">
                  <div>
                    <p style="font-size:13px;color:var(--text-dim)" x-text="t('wiz_init_win')"></p>
                  </div>
                </template>

                <!-- Polling status -->
                <div class="wiz-polling-note" style="margin-top:16px">
                  <span class="wiz-spinner"></span>
                  <span x-text="onboardingInitTimeout ? t('wiz_init_timeout') : t('wiz_init_polling')"></span>
                </div>
              </div>
            </template>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="wizCanAutoInit() ? wizCancelInit() : wizSkipInit()" x-text="wizCanAutoInit() ? t('wiz_cancel') : t('wiz_skip_native')"></button>
          </div>
        </div>

        <!-- SCANNING phase -->
        <div x-show="onboardingPhase === 'scanning'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x1F50D;</span> <span x-text="t('wiz_scanning')"></span></div>
            <div class="wiz-scan-list">
              <template x-for="(item, i) in onboardingScanLog" :key="i">
                <div class="wiz-scan-item">
                  <span class="wiz-scan-icon" x-text="item.type === 'engine' ? '\u2699' : item.type === 'model' ? '\u25A0' : '\u2714'"></span>
                  <span class="wiz-scan-type" x-text="item.type"></span>
                  <span x-text="item.name"></span>
                </div>
              </template>
              <div class="wiz-scan-item" x-show="!onboardingScanDone && onboardingScanLog.length === 0">
                <span class="wiz-spinner"></span>
                <span x-text="t('wiz_scanning_engines')"></span>
              </div>
            </div>
            <!-- Central status -->
            <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;color:var(--text-tertiary)" x-text="t('wiz_scan_central') + ':'"></span>
              <span class="wiz-badge" :class="onboardingScanResults.centralConnected ? 'ready' : 'missing'"
                x-text="onboardingScanResults.centralConnected ? t('wiz_scan_central_connected') : t('wiz_scan_central_offline')"></span>
            </div>
            <!-- Scan summary + continue (shown when scan completes) -->
            <template x-if="onboardingScanDone">
              <div style="margin-top:16px;padding:12px;background:var(--bg-panel);border-radius:var(--radius-sm)">
                <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px" x-text="t('wiz_scan_complete')"></div>
                <div style="font-size:13px;color:var(--text-dim)">
                  <span x-text="t('wiz_engine_label') + ': ' + onboardingScanResults.engines.length"></span>
                  <span style="margin-left:16px" x-text="t('models') + ': ' + onboardingScanResults.models.length"></span>
                </div>
              </div>
            </template>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="onboardingPhase = 'detecting'" x-text="t('wiz_back')"></button>
            <template x-if="onboardingScanDone">
              <button class="wiz-btn wiz-btn-primary" @click="onboardingPhase = 'choosing'" x-text="t('wiz_continue')"></button>
            </template>
          </div>
        </div>

        <!-- CHOOSING phase -->
        <div x-show="onboardingPhase === 'choosing'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x1F914;</span> <span x-text="t('wiz_choosing')"></span></div>
            <div class="wiz-choice-grid">
              <div class="wiz-choice-card" @click="wizGoRecommend()">
                <div class="wiz-choice-icon">&#x2728;</div>
                <div class="wiz-choice-title" x-text="t('wiz_choose_recommended')"></div>
                <div class="wiz-choice-desc" x-text="t('wiz_choose_recommended_desc')"></div>
              </div>
              <div class="wiz-choice-card"
                :class="{ disabled: onboardingScanResults.models.length === 0 }"
                @click="onboardingScanResults.models.length > 0 && (onboardingPhase = 'local')">
                <div class="wiz-choice-icon">&#x1F4BE;</div>
                <div class="wiz-choice-title" x-text="t('wiz_choose_local')"></div>
                <div class="wiz-choice-desc" x-text="onboardingScanResults.models.length > 0 ? (onboardingScanResults.models.length + ' ' + t('models')) : t('wiz_no_local_models')"></div>
              </div>
            </div>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="onboardingPhase = 'scanning'" x-text="t('wiz_back')"></button>
            <button class="wiz-btn wiz-btn-secondary" @click="wizSkip()">Skip</button>
          </div>
        </div>

        <!-- RECOMMEND phase -->
        <div x-show="onboardingPhase === 'recommend'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x2728;</span> <span x-text="t('wiz_recommend')"></span></div>
            <!-- Loading -->
            <div x-show="onboardingRecommendLoading" style="text-align:center;padding:24px">
              <div class="wiz-spinner" style="width:20px;height:20px;margin:0 auto 12px"></div>
            </div>
            <!-- No results -->
            <div x-show="!onboardingRecommendLoading && onboardingRecommendations.length === 0" class="wiz-hint" x-text="t('wiz_no_recommendations')"></div>
            <!-- Model grid -->
            <div class="wiz-model-grid" x-show="!onboardingRecommendLoading && onboardingRecommendations.length > 0">
              <template x-for="(rec, i) in onboardingRecommendations" :key="i">
                <div class="wiz-model-card">
                  <div class="wiz-model-card-name">
                    <span x-text="rec.model_name"></span>
                    <span class="wiz-badge" x-show="rec.fit_score" x-text="'fit: ' + rec.fit_score + '%'" style="float:right;font-size:12px"></span>
                  </div>
                  <div class="wiz-model-card-meta">
                    <span class="wiz-tag" x-show="rec.parameter_count" x-text="rec.parameter_count + (rec.active_params ? ' (' + rec.active_params + ' active)' : '')"></span>
                    <span class="wiz-tag" x-show="rec.variant && rec.variant.format" x-text="rec.variant.format"></span>
                    <span class="wiz-tag" x-show="rec.variant && rec.variant.precision_label" x-text="rec.variant.precision_label"></span>
                    <span class="wiz-tag" x-show="rec.variant && rec.variant.disk_size_mib" x-text="(rec.variant.disk_size_mib / 1024).toFixed(1) + ' GB'"></span>
                  </div>
                  <div class="wiz-model-card-perf">
                    <span x-show="rec.engine && rec.engine.type"><span style="color:var(--text-tertiary)" x-text="t('wiz_engine_label') + ': '"></span><span x-text="rec.engine.type + (rec.engine.image ? ' (' + rec.engine.image.split(':').pop() + ')' : '')"></span></span>
                    <span x-show="rec.engine && rec.engine.cold_start_s"><span style="color:var(--text-tertiary)" x-text="t('wiz_cold_start') + ': '"></span><span x-text="Array.isArray(rec.engine.cold_start_s) ? rec.engine.cold_start_s[0]+'-'+rec.engine.cold_start_s[1]+'s' : rec.engine.cold_start_s+'s'"></span></span>
                    <span x-show="rec.performance && rec.performance.tokens_per_second"><span style="color:var(--text-tertiary)" x-text="t('wiz_perf_tps') + ': '"></span><span x-text="Array.isArray(rec.performance.tokens_per_second) ? rec.performance.tokens_per_second[0]+'-'+rec.performance.tokens_per_second[1] : rec.performance.tokens_per_second"></span></span>
                  </div>
                  <div class="wiz-model-card-perf" style="margin-top:4px">
                    <span x-text="(rec.engine_status && rec.engine_status.installed ? '\u2705 ' + t('wiz_engine_installed') : '\uD83D\uDCE5 ' + t('wiz_engine_needs_dl'))"></span>
                    <span x-text="(rec.model_status && rec.model_status.local_available ? '\u2705 ' + t('wiz_model_local') : '\uD83D\uDCE5 ' + t('wiz_model_needs_dl'))"></span>
                  </div>
                  <div class="wiz-model-card-actions">
                    <button class="wiz-btn wiz-btn-primary"
                      x-show="rec.engine_status && rec.engine_status.installed && rec.model_status && rec.model_status.local_available"
                      @click="wizDeploy(rec)" x-text="t('wiz_run')"></button>
                    <button class="wiz-btn wiz-btn-primary"
                      x-show="!(rec.engine_status && rec.engine_status.installed && rec.model_status && rec.model_status.local_available) && !(rec.engine_status && rec.engine_status.needs_build)"
                      @click="wizDeploy(rec)" x-text="t('wiz_download_deploy')"></button>
                    <button class="wiz-btn wiz-btn-secondary"
                      x-show="rec.engine_status && rec.engine_status.needs_build"
                      disabled x-text="t('wiz_build_required')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="onboardingPhase = 'choosing'" x-text="t('wiz_back')"></button>
          </div>
        </div>

        <!-- LOCAL phase -->
        <div x-show="onboardingPhase === 'local'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x1F4BE;</span> <span x-text="t('wiz_local')"></span></div>
            <div class="wiz-model-grid">
              <template x-for="(m, i) in onboardingScanResults.models" :key="i">
                <div class="wiz-model-card">
                  <div class="wiz-model-card-name" x-text="m.name || m.model"></div>
                  <div class="wiz-model-card-meta">
                    <span class="wiz-tag" x-show="m.format" x-text="m.format"></span>
                    <span class="wiz-tag" x-show="m.size" x-text="m.size"></span>
                    <span class="wiz-tag" x-show="m.engine" x-text="m.engine"></span>
                  </div>
                  <div class="wiz-model-card-actions">
                    <button class="wiz-btn wiz-btn-primary" @click="wizDeployLocal(m)" x-text="t('wiz_run')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="onboardingPhase = 'choosing'" x-text="t('wiz_back')"></button>
          </div>
        </div>

        <!-- DEPLOYING phase -->
        <div x-show="onboardingPhase === 'deploying'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x1F680;</span> <span x-text="t('wiz_deploying')"></span></div>
            <div class="wiz-deploy-steps">
              <template x-for="(step, i) in (onboardingDeployProgress || {}).steps || []" :key="i">
                <div class="wiz-deploy-step">
                  <div class="wiz-step-icon" x-text="step.status === 'done' ? '\u2705' : step.status === 'error' ? '\u274C' : step.status === 'active' ? '\u23F3' : '\u23F8'"></div>
                  <div class="wiz-step-body">
                    <div class="wiz-step-title" x-text="step.label"></div>
                    <div class="wiz-step-detail" x-show="step.detail" x-text="step.detail"></div>
                    <template x-if="step.status === 'active' && step.progress >= 0">
                      <div class="wiz-progress">
                        <div class="wiz-progress-fill" :class="{ indeterminate: step.progress < 0 }"
                          :style="step.progress >= 0 ? 'width:' + step.progress + '%' : ''"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
            <!-- Error -->
            <div class="wiz-error" x-show="(onboardingDeployProgress || {}).error" x-text="(onboardingDeployProgress || {}).error"></div>
            <!-- GPU Occupancy in deploy error state — let user stop services and retry -->
            <template x-if="(onboardingDeployProgress || {}).error && onboardingData && onboardingData.gpu_occupancy && onboardingData.gpu_occupancy.length > 0">
              <div style="margin-top:12px;padding:14px;background:var(--bg-panel);border:1px solid var(--warning);border-radius:var(--radius-sm)">
                <div style="font-size:13px;font-weight:600;color:var(--warning);margin-bottom:8px" x-text="t('wiz_gpu_occupied')"></div>
                <div style="display:flex;flex-direction:column;gap:6px">
                  <template x-for="(proc, pi) in onboardingData.gpu_occupancy" :key="'deploy-'+pi">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-primary);border-radius:var(--radius-sm)">
                      <div>
                        <span style="font-size:13px;font-weight:600;color:var(--text)" x-text="proc.name"></span>
                        <span style="font-size:11px;color:var(--text-dim);margin-left:6px" x-text="proc.image"></span>
                      </div>
                      <button class="wiz-btn wiz-btn-secondary" style="font-size:11px;padding:4px 12px"
                        @click="wizStopContainer(proc, pi)"
                        x-text="proc._stopping ? t('wiz_stopping') : t('wiz_stop_container')"></button>
                    </div>
                  </template>
                </div>
                <button class="wiz-btn wiz-btn-primary" style="margin-top:10px;font-size:13px"
                  @click="wizRetryDeploy()" x-text="t('wiz_retry_deploy')"></button>
              </div>
            </template>
          </div>
          <div class="wiz-actions" style="margin-top:16px">
            <button class="wiz-btn wiz-btn-secondary" @click="wizCancelDeploy()" x-text="t('wiz_cancel')"></button>
          </div>
        </div>

        <!-- COMPLETE phase (success screen) -->
        <template x-if="onboardingPhase === 'done'">
          <div class="wiz-card">
            <div class="wiz-complete">
              <div class="wiz-complete-icon">&#x2705;</div>
              <h3 x-text="t('wiz_complete_title')"></h3>
              <p x-text="t('wiz_model_ready') + ' ' + (onboardingDeployModel || '')"></p>
              <div class="wiz-endpoint" x-show="onboardingDeployEndpoint" x-text="onboardingDeployEndpoint"></div>
              <div style="margin-top:8px">
                <button class="wiz-btn wiz-btn-primary wiz-btn-lg" @click="wizFinish()" x-text="t('wiz_start_chatting')"></button>
              </div>
            </div>
          </div>
        </template>

      </div>
    </div>
  </template>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo"><img :src="theme === 'dark' ? 'logo-dark-wordmark.svg' : 'logo-light-wordmark.svg'" alt="AIMA" class="topbar-logo-img"></div>
    <div class="topbar-right">
      <span class="status-text">
        <span class="status-dot" :class="systemOnline ? 'online' : 'offline'"></span>
        <span x-text="systemOnline ? t('system_online') : t('connecting')"></span>
      </span>
      <select class="lang-select" x-model="theme" @change="saveTheme()">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
      <select class="lang-select" x-model="lang" @change="saveLang()">
        <option value="en">EN</option>
        <option value="zh">&#x4E2D;&#x6587;</option>
        <option value="ja">&#x65E5;&#x672C;&#x8A9E;</option>
        <option value="ko">&#xD55C;&#xAD6D;&#xC5B4;</option>
        <option value="es">ES</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
      </select>
      <button class="btn-icon" @click="openSettings()" :title="t('settings')">&#x2699;</button>
    </div>
  </div>

  <!-- Mobile Metrics -->
  <div class="mobile-metrics">
    <template x-if="hw.gpu">
      <div class="mm-item">
        GPU <span x-text="hw.gpu.util + '%'"></span>
        <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.gpu.util + '%'"></div></div>
        <span x-text="hw.gpu.temp ? hw.gpu.temp + '\u00B0C' : ''"></span>
      </div>
    </template>
    <div class="mm-item">
      MEM <span x-text="hw.mem.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.mem.pct + '%'"></div></div>
    </div>
    <div class="mm-item">
      CPU <span x-text="hw.cpu.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.cpu.pct + '%'"></div></div>
    </div>
  </div>

  <!-- Main 3-Column Layout -->
  <div class="main">

    <!-- Left Sidebar: Hardware + Models + Engines -->
    <div class="sidebar-left">

      <!-- Hardware Panel -->
      <div class="panel">
        <div class="panel-title">&#x25A0; <span x-text="t('hardware')"></span></div>
        <!-- Device identity -->
        <div class="device-identity">
          <span class="device-name" x-text="displayDeviceName(hostname || selfIp || 'This Device')"></span>
          <span class="device-ip" x-show="selfIp && selfIp !== 'localhost' && selfIp !== '127.0.0.1'" x-text="selfIp"></span>
        </div>
        <div class="hardware-group" x-show="!hideAcceleratorPanel()">
          <div class="hardware-group-title" x-text="t('hardware_group_accelerator')"></div>
          <template x-if="hw.gpu">
            <div>
              <div class="gauge">
                <div class="gauge-label">
                  <span x-text="hw.gpu.countLabel + ' ' + hw.gpu.name"></span>
                  <span x-text="hw.gpu.util + '%'"></span>
                </div>
                <div class="gauge-bar">
                  <div class="gauge-fill" :class="hw.gpu.util > 90 ? 'crit' : hw.gpu.util > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.util + '%'"></div>
                </div>
              </div>
              <div class="gauge">
                <div class="gauge-label">
                  <span x-text="hwGpuLabel() + ' ' + hw.gpu.vramSummary"></span>
                  <span x-text="hw.gpu.memUsed + '/' + hw.gpu.memTotal"></span>
                </div>
                <div class="gauge-bar">
                  <div class="gauge-fill" :class="hw.gpu.memPct > 90 ? 'crit' : hw.gpu.memPct > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.memPct + '%'"></div>
                </div>
              </div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:2px" x-show="hw.gpu.temp">
                <span x-text="hw.gpu.temp + '\u00B0C'"></span>
                <span x-show="hw.gpu.power" x-text="' / ' + hw.gpu.power + 'W'"></span>
                <span x-show="hw.gpu.computeId" x-text="' \u00B7 ' + hw.gpu.computeId"></span>
              </div>
              <!-- Expand/collapse per-card details -->
              <template x-if="hw.gpu.cards && hw.gpu.cards.length > 1">
                <div>
                  <div class="gpu-expand-toggle" @click="gpuExpanded = !gpuExpanded" style="cursor:pointer;font-size:11px;color:var(--accent);margin-top:4px;user-select:none">
                    <span x-text="gpuExpanded ? '\u25BC' : '\u25B6'"></span>
                    <span x-text="gpuExpanded ? 'Collapse' : ('Show ' + hw.gpu.cards.length + ' cards')"></span>
                  </div>
                  <div x-show="gpuExpanded" x-transition.duration.150ms style="margin-top:4px">
                    <template x-for="card in hw.gpu.cards" :key="card.index">
                      <div class="gpu-card-row" style="margin-bottom:6px;padding:4px 6px;border-radius:4px;background:var(--panel-bg);font-size:11px">
                        <div style="display:flex;justify-content:space-between;color:var(--text-dim)">
                          <span x-text="'GPU ' + card.index"></span>
                          <span x-text="card.util + '%'"></span>
                        </div>
                        <div class="gauge-bar" style="height:3px;margin:2px 0">
                          <div class="gauge-fill" :class="card.util > 90 ? 'crit' : card.util > 70 ? 'warn' : ''" :style="'width:' + card.util + '%'"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;color:var(--text-dim)">
                          <span x-text="'VRAM ' + card.memUsed + '/' + card.memTotal"></span>
                          <span x-text="card.temp ? (card.temp + '\u00B0C / ' + card.power + 'W') : ''"></span>
                        </div>
                        <div class="gauge-bar" style="height:3px;margin:2px 0">
                          <div class="gauge-fill" :class="card.memPct > 90 ? 'crit' : card.memPct > 70 ? 'warn' : ''" :style="'width:' + card.memPct + '%'"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!hw.gpu">
            <div class="empty" x-text="t('no_gpu')"></div>
          </template>
        </div>
        <div class="hardware-group">
          <div class="hardware-group-title" x-text="t('hardware_group_host')"></div>
          <div class="gauge">
            <div class="gauge-label"><span x-text="hw.cpu.label"></span><span x-text="hw.cpu.pct + '%'"></span></div>
            <div class="gauge-bar">
              <div class="gauge-fill" :class="hw.cpu.pct > 90 ? 'crit' : hw.cpu.pct > 70 ? 'warn' : ''" :style="'width:' + hw.cpu.pct + '%'"></div>
            </div>
          </div>
          <div class="gauge" style="margin-top:6px" x-show="hwShowSeparateRam()">
            <div class="gauge-label">
              <span x-text="hwHostMemoryLabel()"></span>
              <span x-text="hw.mem.used + '/' + hw.mem.total"></span>
            </div>
            <div class="gauge-bar">
              <div class="gauge-fill" :class="hw.mem.pct > 90 ? 'crit' : hw.mem.pct > 70 ? 'warn' : ''" :style="'width:' + hw.mem.pct + '%'"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Models Panel -->
      <div class="panel">
        <div class="panel-title">&#x25C6; <span x-text="t('models')"></span><span class="panel-title-actions"><button type="button" class="panel-action-btn" :disabled="modelScanning" @click="scanModels()" x-text="modelScanning ? t('scanning_label') : t('scan_label')"></button></span></div>
        <template x-if="deployableModels().length === 0">
          <div class="empty" x-text="t('no_models')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="(m, mi) in deployableModels()" :key="m.name || mi">
            <li class="model-list-item">
              <span class="dot" :class="modelDotClass(m.name)"></span>
              <div class="model-entry">
                <div class="model-entry-top">
                  <span class="model-name" x-text="m.name" :title="m.name"></span>
                  <span class="model-size" x-text="m.size || ''" :title="m.size || ''"></span>
                </div>
                <div class="model-entry-meta">
                  <span class="model-status-note" x-text="modelStatusNote(m.name)" :title="modelStatusNote(m.name)"></span>
                  <button type="button"
                    class="model-deploy-btn"
                    :class="modelDeploying[m.name] ? 'is-busy' : ''"
                    :disabled="modelDeployButtonDisabled(m.name)"
                    @click="deployModel(m.name)"
                    x-text="modelDeployButtonLabel(m.name)"></button>
                </div>
              </div>
            </li>
          </template>
        </ul>
        <template x-if="componentModels().length > 0">
          <div class="hardware-group" style="margin-top:14px">
            <div class="hardware-group-title" @click="componentSectionExpanded = !componentSectionExpanded" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none">
              <span>语音组件</span>
              <span style="font-size:11px;color:var(--text-dim)" x-text="(componentSectionExpanded ? '▼ ' : '▶ ') + componentSectionToggleLabel()"></span>
            </div>
            <ul class="panel-list" x-show="componentSectionExpanded" x-transition.duration.150ms>
              <template x-for="(m, mi) in componentModels()" :key="'component-' + (m.name || mi)">
                <li class="model-list-item">
                  <span class="dot dot-dim"></span>
                  <div class="model-entry">
                    <div class="model-entry-top">
                      <span class="model-name" x-text="m.name" :title="m.name"></span>
                      <span class="model-size" x-text="m.size || ''" :title="m.size || ''"></span>
                    </div>
                    <div class="model-entry-meta">
                      <span class="model-status-note" x-text="componentStatusNote(m)" :title="componentStatusNote(m)"></span>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </template>
      </div>

      <!-- Engines Panel -->
      <div class="panel">
        <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span><span class="panel-title-actions"><button type="button" class="panel-action-btn" :disabled="engineScanning" @click="scanEngines()" x-text="engineScanning ? t('scanning_label') : t('scan_label')"></button></span></div>
        <template x-if="engines.length === 0">
          <div class="empty" x-text="t('no_engines')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="(e, ei) in engines" :key="e.id || ei">
            <li>
              <span class="dot" :class="e.available ? 'dot-green' : 'dot-dim'"></span>
              <span x-text="e.type"></span>
              <span class="item-detail" x-text="e.variant || ''"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <!-- Center: Chat / Support (toggled by currentView) -->
    <div class="center">
      <div class="agent-header">
        <div class="agent-header-main">
          <img class="agent-avatar" src="avatar.svg" alt="AIMA Agent">
          <div class="agent-meta">
            <div class="agent-name">AIMA AI工程师</div>
            <div class="agent-mode">
              <span class="status-dot" :class="headerModeTone()" style="width:6px;height:6px"></span>
              <span x-text="headerModeLabel()"></span>
            </div>
          </div>
        </div>
        <div class="agent-header-actions">
          <button class="agent-onboarding-btn" x-ref="onboardingTrigger" @click="openOnboardingDrawer()" :title="t('onboarding_title')">
            <span x-text="t('onboarding_title')"></span>
          </button>
          <button class="agent-explorer-btn"
            :class="{ active: currentView === 'explorer', running: explorerPhaseTone() === 'running', blocked: explorerPhaseTone() === 'blocked' }"
            @click="toggleExplorerView()"
            :title="t('explorer_view')">
            <span class="explorer-dot"></span>
            <span x-text="t('explorer_view')"></span>
          </button>
          <button class="agent-support-btn"
            :class="{ active: currentView === 'support', connected: supportConnected }"
            @click="openSupportFlow()">
            <span class="support-dot"></span>
            <span x-text="supportEntryLabel()"></span>
          </button>
        </div>
      </div>

      <!-- Chat View -->
      <div x-show="currentView === 'chat'" class="chat-view">
        <div class="chat-messages" x-ref="chatMessages">
          <template x-if="messages.length === 0 && !thinking">
            <div class="chat-welcome">
              <div class="chat-welcome-title">AIMA</div>
              <div class="chat-welcome-hint" x-text="t('welcome')"></div>
            </div>
          </template>
          <template x-for="(msg, i) in messages" :key="i">
            <div class="msg" :class="'msg-' + msg.role">
              <template x-if="msg.role === 'user'">
                <div><span class="msg-prefix">&gt;</span><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'ai'">
                <div><span class="msg-prefix">○</span><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'tool'">
                <div class="msg-tool" :class="msg.expanded ? 'expanded' : ''" @click="msg.expanded = !msg.expanded">
                  <div class="msg-tool-header">
                    <span class="msg-tool-indicator" :class="msg.status || 'running'"></span>
                    <span class="msg-tool-name" x-text="msg.toolName || 'tool'"></span>
                    <span class="msg-tool-duration" x-show="msg.duration" x-text="msg.duration"></span>
                    <span class="msg-tool-expand">▸</span>
                  </div>
                  <div class="msg-tool-content">
                    <div class="msg-tool-args" x-show="msg.args">
                      <strong>Input:</strong>
                      <pre x-text="typeof msg.args === 'object' ? JSON.stringify(msg.args, null, 2) : msg.args"></pre>
                    </div>
                    <div class="msg-tool-result" :class="msg.status" x-show="msg.result">
                      <strong>Result:</strong>
                      <pre x-text="typeof msg.result === 'object' ? JSON.stringify(msg.result, null, 2) : msg.result"></pre>
                    </div>
                  </div>
                </div>
              </template>
              <template x-if="msg.role === 'error'">
                <div><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'system'">
                <div><span class="msg-text" x-text="msg.text"></span></div>
              </template>
            </div>
          </template>
          <div class="thinking" x-show="thinking">&middot;&middot;&middot;</div>
        </div>

        <div class="chat-mode-strip" x-show="!agentAvailable && systemOnline">
          <div class="chat-mode-note" x-text="t('direct_mode_hint')"></div>
          <div class="chat-mode-actions">
            <template x-for="action in directQuickActions()" :key="action.command">
              <button type="button" class="chat-shortcut-btn" @click="sendSuggestedInput(action.command)" x-text="action.label"></button>
            </template>
          </div>
        </div>

        <div class="chat-input-wrap">
          <span class="chat-prompt">&gt;</span>
          <div class="chat-hint"
            @mouseenter="chatHintOpen = true"
            @mouseleave="chatHintOpen = false"
            @focusin="chatHintOpen = true"
            @focusout="chatHintOpen = false"
            @click.outside="chatHintOpen = false">
            <button type="button"
              class="chat-hint-btn"
              :aria-expanded="chatHintOpen ? 'true' : 'false'"
              :aria-describedby="chatHintOpen ? 'chat-cli-hint' : null"
              :aria-label="t('cli_hint_label')"
              :title="t('cli_hint_label')"
              @click.stop="chatHintOpen = !chatHintOpen"
              @keydown.escape.stop.prevent="chatHintOpen = false">i</button>
            <span class="chat-hint-popup"
              id="chat-cli-hint"
              role="tooltip"
              x-cloak
              x-show="chatHintOpen"
              x-transition.opacity.duration.150ms
              x-html="t('cli_hint')"></span>
          </div>
          <input class="chat-input"
            x-ref="chatInput"
            x-model="input"
            @keydown.enter="send()"
            :placeholder="t('chat_placeholder')"
            :disabled="thinking"
            autocomplete="off"
            spellcheck="false">
          <button class="chat-send" @click="send()" :disabled="thinking || !input.trim()" x-text="t('send')"></button>
        </div>
      </div>

      <!-- Explorer View -->
      <div x-show="currentView === 'explorer'" class="explorer-page" x-cloak>
        <div class="explorer-tabbar">
          <button class="explorer-tab"
            :class="{ active: explorerTab === 'overview' }"
            @click="explorerTab = 'overview'"
            x-text="t('explorer_tab_overview')"></button>
          <button class="explorer-tab"
            :class="{ active: explorerTab === 'runs' }"
            @click="openRunsTab()"
            x-text="t('explorer_tab_runs')"></button>
        </div>

        <div class="explorer-scroll" x-show="explorerTab === 'overview'">
          <!-- A1: Current Run Status -->
          <section class="explorer-section">
            <div class="explorer-section-title" x-text="t('explorer_current_run')"></div>
            <div class="explorer-status-row">
              <span class="explorer-chip"
                :class="explorerPhaseTone()"
                x-text="(explorerStatus && explorerStatus.phase) || 'idle'"></span>
              <div class="explorer-meta">
                <div class="explorer-meta-primary" x-text="explorerCurrentGoal()"></div>
                <div class="explorer-meta-secondary" x-text="explorerCurrentMeta()"></div>
              </div>
            </div>

            <!-- Progress bar (only while running) -->
            <template x-if="explorerTaskTotal() > 0">
              <div class="explorer-progress">
                <div class="explorer-progress-label">
                  <span x-text="t('explorer_tasks_progress') + ': ' + explorerTaskCompleted() + ' / ' + explorerTaskTotal()"></span>
                  <span x-text="explorerTaskPct() + '%'"></span>
                </div>
                <div class="explorer-progress-bar">
                  <div class="explorer-progress-fill" :style="'width: ' + explorerTaskPct() + '%'"></div>
                </div>
                <div class="explorer-task-chips">
                  <span class="explorer-task-chip success" x-text="'&check; ' + (explorerLastMetrics()?.completed || 0)"></span>
                  <span class="explorer-task-chip failed"  x-text="'&times; ' + (explorerLastMetrics()?.failed || 0)"></span>
                  <span class="explorer-task-chip skipped" x-text="'⊘ ' + (explorerLastMetrics()?.skipped || 0)"></span>
                </div>
              </div>
            </template>

            <div class="explorer-actions">
              <button class="explorer-btn primary"
                @click="openExplorerTrigger()"
                :disabled="explorerTriggering"
                x-text="t('explorer_trigger_btn')"></button>
              <button class="explorer-btn danger"
                x-show="explorerStatus && explorerStatus.running"
                @click="explorerCancel()"
                x-text="t('explorer_cancel_btn')"></button>
              <button class="explorer-btn"
                @click="explorerRefresh()"
                x-text="t('explorer_refresh_btn')"></button>
            </div>

            <template x-if="explorerFeedback">
              <div class="explorer-feedback" :class="explorerFeedback.type" x-text="explorerFeedback.text"></div>
            </template>
          </section>

          <!-- A2: DB Delta Counter -->
          <section class="explorer-section">
            <div class="explorer-section-title" x-text="t('explorer_db_delta')"></div>
            <div class="explorer-kpi-grid">
              <div class="explorer-kpi">
                <div class="explorer-kpi-label" x-text="t('explorer_db_configurations')"></div>
                <div class="explorer-kpi-value" x-text="explorerDbDeltas.configurations || 0"></div>
              </div>
              <div class="explorer-kpi">
                <div class="explorer-kpi-label" x-text="t('explorer_db_benchmark_results')"></div>
                <div class="explorer-kpi-value" x-text="explorerDbDeltas.benchmark_results || 0"></div>
              </div>
              <div class="explorer-kpi">
                <div class="explorer-kpi-label" x-text="t('explorer_db_events')"></div>
                <div class="explorer-kpi-value" x-text="explorerDbDeltas.exploration_events || 0"></div>
              </div>
            </div>
            <div style="margin-top:8px;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);"
                 x-text="t('explorer_db_since') + ': ' + (explorerDbSince || '—')"></div>
          </section>

          <!-- A4: Latest Summary -->
          <section class="explorer-section">
            <div class="explorer-section-title" x-text="t('explorer_latest_summary')"></div>
            <template x-if="!explorerLatestRun">
              <div class="explorer-empty" x-text="t('explorer_no_runs')"></div>
            </template>
            <template x-if="explorerLatestRun">
              <div>
                <div class="explorer-status-row">
                  <span class="explorer-chip" :class="explorerLatestRun.status"
                        x-text="explorerLatestRun.status"></span>
                  <div class="explorer-meta">
                    <div class="explorer-meta-primary" x-text="explorerLatestRun.goal || '(no goal)'"></div>
                    <div class="explorer-meta-secondary"

                <div class="gauge"><div class="gauge-label"><span x-text="hwGpuLabel() + ' ' + hw.gpu.vramSummary"></span><span x-text="hw.gpu.memUsed + '/' + hw.gpu.memTotal"></span></div><div class="gauge-bar"><div class="gauge-fill" :class="hw.gpu.memPct > 90 ? 'crit' : hw.gpu.memPct > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.memPct + '%'"></div></div></div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:2px" x-show="hw.gpu.temp">
                  <span x-text="hw.gpu.temp + '\u00B0C'"></span>
                  <span x-show="hw.gpu.power" x-text="' / ' + hw.gpu.power + 'W'"></span>
                  <span x-show="hw.gpu.computeId" x-text="' \u00B7 ' + hw.gpu.computeId"></span>
                </div>
                <template x-if="hw.gpu.cards && hw.gpu.cards.length > 1">
                  <div>
                    <div @click="gpuExpanded = !gpuExpanded" style="cursor:pointer;font-size:11px;color:var(--accent);margin-top:4px;user-select:none">
                      <span x-text="gpuExpanded ? '\u25BC' : '\u25B6'"></span>
                      <span x-text="gpuExpanded ? 'Collapse' : ('Show ' + hw.gpu.cards.length + ' cards')"></span>
                    </div>
                    <div x-show="gpuExpanded" x-transition.duration.150ms style="margin-top:4px">
                      <template x-for="card in hw.gpu.cards" :key="card.index">
                        <div style="margin-bottom:6px;padding:4px 6px;border-radius:4px;background:var(--panel-bg);font-size:11px">
                          <div style="display:flex;justify-content:space-between;color:var(--text-dim)">
                            <span x-text="'GPU ' + card.index"></span>
                            <span x-text="card.util + '%'"></span>
                          </div>
                          <div class="gauge-bar" style="height:3px;margin:2px 0"><div class="gauge-fill" :class="card.util > 90 ? 'crit' : card.util > 70 ? 'warn' : ''" :style="'width:' + card.util + '%'"></div></div>
                          <div style="display:flex;justify-content:space-between;color:var(--text-dim)">
                            <span x-text="'VRAM ' + card.memUsed + '/' + card.memTotal"></span>
                            <span x-text="card.temp ? (card.temp + '\u00B0C / ' + card.power + 'W') : ''"></span>
                          </div>
                          <div class="gauge-bar" style="height:3px;margin:2px 0"><div class="gauge-fill" :class="card.memPct > 90 ? 'crit' : card.memPct > 70 ? 'warn' : ''" :style="'width:' + card.memPct + '%'"></div></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!hw.gpu">
              <div class="empty" x-text="t('no_gpu')"></div>
            </template>
          </div>
          <div class="hardware-group">
            <div class="hardware-group-title" x-text="t('hardware_group_host')"></div>
            <div class="gauge"><div class="gauge-label"><span x-text="hw.cpu.label"></span><span x-text="hw.cpu.pct + '%'"></span></div><div class="gauge-bar"><div class="gauge-fill" :class="hw.cpu.pct > 90 ? 'crit' : hw.cpu.pct > 70 ? 'warn' : ''" :style="'width:' + hw.cpu.pct + '%'"></div></div></div>
            <div class="gauge" style="margin-top:6px" x-show="hwShowSeparateRam()"><div class="gauge-label"><span x-text="hwHostMemoryLabel()"></span><span x-text="hw.mem.used + '/' + hw.mem.total"></span></div><div class="gauge-bar"><div class="gauge-fill" :class="hw.mem.pct > 90 ? 'crit' : hw.mem.pct > 70 ? 'warn' : ''" :style="'width:' + hw.mem.pct + '%'"></div></div></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25C6; <span x-text="t('models')"></span></div>
          <ul class="panel-list">

                <span class="dot" :class="modelDotClass(m.name)"></span>

                    <span class="model-size" x-text="m.size || ''" :title="m.size || ''"></span>
                  </div>
                  <div class="model-entry-meta">
                    <span class="model-status-note" x-text="modelStatusNote(m.name)" :title="modelStatusNote(m.name)"></span>
                    <button type="button"
                      class="model-deploy-btn"
                      :class="modelDeploying[m.name] ? 'is-busy' : ''"

                </div>

            </template>
          </ul>

        <div class="panel">
          <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span></div>
          <ul class="panel-list">
            <template x-for="(e, ei) in engines" :key="e.id || ei"><li><span class="dot" :class="e.available ? 'dot-green' : 'dot-dim'"></span><span x-text="e.type"></span></li></template>

        </div>
      </div>

    <template x-if="mobileTab === 'fleet'">
      <div style="display:flex;flex-direction:column;gap:8px">

          <div class="panel-title">&#x25C9; <span x-text="t('fleet')"></span></div>
          <template x-for="(d, fi) in fleet" :key="d.id || d.addr || fi"><div class="fleet-device"><span class="status-dot" :class="d.online ? 'online' : 'offline'" style="width:6px;height:6px"></span><div><div class="name" x-text="d.name || d.id"></div><div class="meta" x-text="d.meta || ''"></div></div></div></template>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25B2; <span x-text="t('deployments')"></span></div>
          <ul class="panel-list"><template x-for="dep in deployments" :key="dep.name || dep.model || dep.address || dep.detail"><li style="flex-wrap:wrap"><span class="dot" :class="dep.phase === 'running' && dep.ready ? 'dot-green' : dep.phase === 'failed' ? 'dot-red' : 'dot-orange'"></span><span x-text="dep.name"></span><span class="item-detail" x-text="dep.phase === 'failed' ? (dep.failure_detail || dep.detail) : (dep.startup_message || dep.phase)"></span><template x-if="dep.startup_progress > 0 && dep.startup_progress < 100"><div style="width:100%;margin-top:2px"><div class="deploy-progress"><div class="deploy-progress-fill" :style="'width:' + dep.startup_progress + '%'"></div></div></div></template></li></template></ul>
        </div>
      </div>
    </template>
    <template x-if="mobileTab === 'support'">
      <div class="support-page">
        <div class="support-page-shell">
          <div class="support-feedback" x-show="supportPageError" x-text="supportPageError"></div>
          <div class="support-connected support-flow">
            <div class="support-content-scroll" x-ref="supportPageScroll">
              <div class="support-status-strip">
                <div class="support-status-pill"><span x-text="t('support_device_id')"></span><strong x-text="supportState.deviceId || 'linking…'"></strong></div>
                <div class="support-status-pill"><span x-text="t('support_active_task')"></span><strong x-text="supportState.activeTask ? (supportState.activeTask.status || 'active') : (supportConnected ? t('support_no_task') : t('support_connecting'))"></strong></div>
              </div>
              <div class="support-summary-grid" x-show="supportSummaryVisible()">
                <div class="support-summary-card">
                  <div class="label" x-text="t('support_device_id')"></div>
                  <div class="value" x-text="supportState.deviceId || 'linking…'"></div>
                  <div class="meta" x-text="supportBindSummaryText()"></div>
                  <div class="support-summary-link" x-show="supportBindingURL()" x-text="supportBindingURL()"></div>
                  <div class="support-summary-actions">
                    <button type="button" class="support-summary-btn" @click="openSupportBinding()" :disabled="!supportCanBind()" x-text="supportBindActionLabel()"></button>
                  </div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportBudgetTasksLabel()"></div>
                  <div class="value" x-text="supportTaskBudgetValue()"></div>
                  <div class="meta" x-text="supportBudgetAmountSummary()"></div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportShareHeading()"></div>
                  <div class="value" x-text="supportSharePrimaryValue()"></div>
                  <div class="meta" x-text="supportShareMetaText()"></div>
                  <div class="support-summary-actions" x-show="supportState.shareText">
                    <button type="button" class="support-summary-btn" @click="copySupportShareText()" x-text="supportCopyShareLabel()"></button>
                  </div>
                </div>
              </div>
              <div class="support-summary-card support-confirmation-card" x-show="supportWaitingBrowserConfirmation()">
                <div class="label">浏览器确认</div>
                <div class="value" x-text="(supportBrowserConfirmation && supportBrowserConfirmation.userCode) || supportState.browserConfirmUserCode || 'pending'"></div>
                <div class="meta" x-text="supportBrowserConfirmationText()"></div>
                <div class="support-summary-link" x-show="supportBrowserConfirmationURL()" x-text="supportBrowserConfirmationURL()"></div>
                <div class="support-summary-actions">
                  <button type="button" class="support-summary-btn" @click="openSupportBrowserConfirmation()" :disabled="!supportBrowserConfirmationURL()">打开确认页</button>
                </div>
              </div>
              <div class="support-msg-list" x-ref="supportMsgList" style="min-height:80px">
                <template x-if="supportPageFeed.length === 0"><div class="support-msg-empty" x-text="supportPageEmptyStateText()"></div></template>
                <template x-for="entry in supportPageFeed" :key="entry.id"><div class="support-msg"><span class="msg-type" :class="supportPageTypeClass(entry.type)" x-text="supportPageTypeLabel(entry.type)"></span><span class="support-msg-body" x-text="entry.text"></span></div></template>
              </div>
              <div class="support-intake" x-show="supportPageShowTaskMenu()">
                <div class="support-intake-header">
                  <div class="support-intake-title" x-text="supportTaskMenuTitle()"></div>
                  <div class="support-intake-subtitle" x-text="supportTaskMenuSubtitle()"></div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuOptions().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuPrompt()"></div>
                  <div class="support-chip-list">
                    <template x-for="option in supportTaskMenuOptions()" :key="option.id || option.value"><button type="button" class="support-chip" @click="applySupportTaskOption(option)" x-text="supportManifestText(option.label, option.value || option.id || '')"></button></template>
                  </div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuExamples().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuFreeformHint()"></div>
                  <div class="support-chip-list">
                    <template x-for="example in supportTaskMenuExamples()" :key="supportManifestText(example, '')"><button type="button" class="support-chip" @click="applySupportExample(example)" x-text="supportManifestText(example, '')"></button></template>
                  </div>
                </div>
                <div class="support-note" x-show="supportPageGuidedHint" x-text="supportPageGuidedHint"></div>
                <div class="support-note" x-show="!supportPageGuidedHint && supportTaskMenuSecretWarning()" x-text="supportTaskMenuSecretWarning()"></div>
                <div class="support-helper" x-show="supportTaskMenuFooter()" x-text="supportTaskMenuFooter()"></div>
              </div>
            </div>
            <div class="support-footer">
              <div class="support-input-row">
                <input
                  x-ref="supportPageInput"
                  :value="supportPageInputValue()"
                  @input="setSupportPageInput($event.target.value)"
                  @keydown.enter="submitSupportInput()"
                  :placeholder="supportPageInputPlaceholder()"
                  :disabled="supportPageInputDisabled()">
                <button @click="submitSupportInput()" :disabled="!supportPageCanSubmit()" x-text="supportPageButtonLabel()"></button>
                <button x-show="supportPagePrompt" @click="skipSupportConnect()" class="support-skip-btn" x-text="t('support_skip')"></button>
              </div>
              <button class="support-disconnect-btn" x-show="supportConnected" @click="disconnectSupport()" x-text="supportDisconnectLabel()"></button>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Settings Modal -->
  <template x-if="showSettings">
    <div class="modal-overlay" @click.self="showSettings = false">
      <div class="modal">
        <h3 x-text="t('settings')"></h3>

        <!-- Feedback -->
        <template x-if="settingsFeedback">
          <div class="modal-feedback" :class="settingsFeedback.type" x-text="settingsFeedback.text"></div>
        </template>

        <!-- Tab bar -->
        <div class="settings-tabs">
          <button class="settings-tab" :class="{ active: settingsTab === 'general' }" @click="settingsTab = 'general'" x-text="t('tab_general')"></button>
          <button class="settings-tab" :class="{ active: settingsTab === 'monitoring' }" @click="settingsTab = 'monitoring'" x-text="t('tab_monitoring')"></button>
          <button class="settings-tab" :class="{ active: settingsTab === 'agent' }" @click="settingsTab = 'agent'" x-text="t('tab_agent')"></button>
          <button class="settings-tab" :class="{ active: settingsTab === 'connectivity' }" @click="settingsTab = 'connectivity'" x-text="t('tab_connectivity')"></button>
        </div>

        <!-- Tab: General -->
        <div x-show="settingsTab === 'general'">
          <div class="modal-section">
            <div class="modal-section-title" x-text="t('access_auth')"></div>
            <div class="modal-field">
              <label x-text="t('api_key')"></label>
              <input type="password" x-model="settingsForm.apiKey" :placeholder="t('api_key_hint')">
              <div class="modal-hint" x-text="t('api_key_local')"></div>
            </div>
          </div>
        </div>

        <!-- Tab: Monitoring & Patrol -->
        <div x-show="settingsTab === 'monitoring'">
          <div class="modal-section">
            <div class="modal-field">
              <label x-text="t('patrol_interval')"></label>
              <input type="text" x-model="settingsForm.patrolInterval" placeholder="5m">
              <div class="modal-hint" x-text="t('patrol_interval_hint')"></div>
            </div>
            <div class="modal-field toggle-row">
              <label x-text="t('self_healing')"></label>
              <label class="toggle-switch">
                <input type="checkbox" x-model="settingsForm.selfHeal">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="modal-field">
              <label x-text="t('gpu_temp_threshold')"></label>
              <input type="number" x-model.number="settingsForm.gpuTempWarn" min="50" max="120" placeholder="85">
              <div class="modal-hint" x-text="t('gpu_temp_hint')"></div>
            </div>
            <div class="modal-field">
              <label x-text="t('gpu_idle_pct')"></label>
              <input type="number" x-model.number="settingsForm.gpuIdlePct" min="0" max="100" placeholder="10">
            </div>
            <div class="modal-field">
              <label x-text="t('gpu_idle_minutes')"></label>
              <input type="number" x-model.number="settingsForm.gpuIdleMinutes" min="1" max="1440" placeholder="15">
            </div>
            <div class="modal-field">
              <label x-text="t('vram_opportunity')"></label>
              <input type="number" x-model.number="settingsForm.vramOpportunityPct" min="0" max="100" placeholder="50">
              <div class="modal-hint" x-text="t('vram_opportunity_hint')"></div>
            </div>
          </div>
        </div>

        <!-- Tab: AI Agent (LLM) -->
        <div x-show="settingsTab === 'agent'">
          <div class="modal-section">
            <div class="modal-section-title" x-text="t('llm_backend')"></div>
            <div class="modal-field">
              <label x-text="t('llm_endpoint')"></label>
              <input type="url" x-model="settingsForm.llmEndpoint" placeholder="http://localhost:6188/v1">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_model')"></label>
              <input type="text" x-model="settingsForm.llmModel" placeholder="qwen3-8b">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_api_key')"></label>
              <input type="password" x-model="settingsForm.llmApiKey" :placeholder="t('llm_api_key_hint')">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_user_agent')"></label>
              <input type="text" x-model="settingsForm.llmUserAgent" placeholder="claude-code/2.1.5">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_extra_params')"></label>
              <textarea x-model="settingsForm.llmExtraParams" :placeholder="t('llm_extra_params_hint')" rows="2"></textarea>
            </div>
            <div class="modal-hint" x-text="t('llm_config_hint')"></div>
          </div>
        </div>

        <!-- Tab: Connectivity -->
        <div x-show="settingsTab === 'connectivity'">
          <div class="modal-section">
            <div class="modal-section-title" x-text="t('central_server')"></div>
            <div class="modal-field">
              <label x-text="t('central_endpoint')"></label>
              <input type="url" x-model="settingsForm.centralEndpoint" placeholder="https://central.example.com">
            </div>
            <div class="modal-field">
              <label x-text="t('central_api_key')"></label>
              <input type="password" x-model="settingsForm.centralApiKey" :placeholder="t('central_api_key_hint')">
            </div>
          </div>
          <div class="modal-section">
            <div class="modal-section-title" x-text="t('support_service')"></div>
            <div class="modal-field toggle-row">
              <label x-text="t('support_enabled')"></label>
              <label class="toggle-switch">
                <input type="checkbox" x-model="settingsForm.supportEnabled">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="modal-field">
              <label x-text="t('support_endpoint_label')"></label>
              <input type="url" x-model="settingsForm.supportEndpoint" placeholder="https://support.example.com">
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-btn" @click="showSettings = false" x-text="t('cancel')"></button>
          <button class="modal-btn" @click="clearSettings()" x-text="t('clear')"></button>
          <button class="modal-btn primary" @click="saveSettings()" :disabled="settingsSaving" x-text="settingsSaving ? t('saving') : t('save')"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- Explorer Trigger Modal -->
  <template x-if="explorerTriggerOpen">
    <div class="modal-overlay" @click.self="explorerTriggerOpen = false">
      <div class="modal">
        <h3 x-text="t('explorer_trigger_title')"></h3>

        <template x-if="explorerTriggerFeedback">
          <div class="modal-feedback" :class="explorerTriggerFeedback.type" x-text="explorerTriggerFeedback.text"></div>
        </template>

        <div class="modal-section">
          <div class="modal-field">
            <label x-text="t('explorer_trigger_kind')"></label>
            <select class="explorer-select" x-model="explorerTriggerForm.kind">
              <option value="validate">validate</option>
              <option value="tune">tune</option>
              <option value="open_question">open_question</option>
            </select>
          </div>

          <div class="modal-field">
            <label x-text="t('explorer_trigger_model')"></label>
            <template x-if="Array.isArray(models) && models.length > 0">
              <select class="explorer-select" x-model="explorerTriggerForm.model">
                <option value="" x-text="t('explorer_trigger_model_ph')"></option>
                <template x-for="m in models" :key="m.name || m.id">
                  <option :value="m.name || m.id" x-text="m.name || m.id"></option>
                </template>
              </select>
            </template>
            <template x-if="!Array.isArray(models) || models.length === 0">
              <input type="text" class="explorer-select" x-model="explorerTriggerForm.model"
                     :placeholder="t('explorer_trigger_model_ph')" />
            </template>
            <div class="modal-hint" x-text="t('explorer_trigger_model_hint')"></div>
          </div>

          <div class="modal-field">
            <label x-text="t('explorer_trigger_goal')"></label>
            <textarea x-model="explorerTriggerForm.goal"
                      :placeholder="t('explorer_trigger_goal_ph')"
                      rows="3"></textarea>
            <div class="modal-hint" x-text="t('explorer_trigger_goal_hint')"></div>
          </div>

          <div class="modal-field">
            <label x-text="t('explorer_trigger_approval')"></label>
            <select class="explorer-select" x-model="explorerTriggerForm.approval_mode">
              <option value="auto">auto</option>
              <option value="needs_approval">needs_approval</option>
            </select>
          </div>

          <div class="modal-hint" x-text="t('explorer_trigger_local_note')"></div>
        </div>

        <div class="modal-actions">
          <button class="modal-btn" @click="explorerTriggerOpen = false" x-text="t('cancel')"></button>
          <button class="modal-btn primary"
                  @click="submitExplorerTrigger()"
                  :disabled="explorerTriggering || !explorerTriggerForm.goal.trim() || !(explorerTriggerForm.model || '').trim()"
                  x-text="explorerTriggering ? t('saving') : t('explorer_trigger_submit')"></button>
        </div>
      </div>
    </div>

  <!-- Explorer Run Detail Drawer (D3) -->
  <template x-if="explorerDrawerRunId">
    <div>
      <div class="onboarding-overlay" @click="closeRunDrawer()"></div>
      <aside class="explorer-drawer" role="dialog" aria-modal="true" :aria-label="t('explorer_drawer_title')">
        <div class="onboarding-drawer-header">
          <div>
            <h3 class="onboarding-drawer-title" x-text="t('explorer_drawer_title')"></h3>
            <p class="onboarding-drawer-subtitle" x-text="explorerDrawerRunId"></p>
          </div>
          <button class="onboarding-close-btn" @click="closeRunDrawer()" :title="t('cancel')">&times;</button>
        </div>

        <div class="onboarding-tabs">
          <button type="button"
                  :class="{ active: explorerDrawerTab === 'summary' }"
                  @click="switchDrawerTab('summary')"
                  x-text="t('explorer_drawer_tab_summary')"></button>
          <button type="button"
                  :class="{ active: explorerDrawerTab === 'plan' }"
                  @click="switchDrawerTab('plan')"
                  x-text="t('explorer_drawer_tab_plan')"></button>
          <button type="button"
                  :class="{ active: explorerDrawerTab === 'events' }"
                  @click="switchDrawerTab('events')"
                  x-text="t('explorer_drawer_tab_events')"></button>
        </div>

        <div class="onboarding-drawer-body">
          <div class="onboarding-loading" x-show="explorerDrawerLoading" x-text="t('loading')"></div>

          <template x-if="explorerDrawerRun">
            <div class="explorer-drawer-meta">
              <span class="explorer-chip" :class="explorerDrawerRun.status" x-text="explorerDrawerRun.status"></span>
              <span class="explorer-runs-cell-mono" x-text="explorerDrawerRun.kind || ''"></span>
              <span class="explorer-runs-cell-mono" x-text="runPlanTier(explorerDrawerRun)"></span>
              <span class="explorer-runs-cell-mono"
                    x-text="t('explorer_runs_col_started') + ': ' + runRelativeTime(explorerDrawerRun.started_at)"></span>
              <span class="explorer-runs-cell-mono"
                    x-text="t('explorer_runs_col_duration') + ': ' + runDuration(explorerDrawerRun)"></span>
            </div>
          </template>

          <!-- Summary tab -->
          <template x-if="explorerDrawerTab === 'summary'">
            <div>
              <template x-if="explorerDrawerDocs['summary.md'] && explorerDrawerDocs['summary.md'].exists">
                <pre class="explorer-md" x-text="explorerDrawerDocs['summary.md'].content"></pre>
              </template>
              <template x-if="explorerDrawerDocs['summary.md'] && !explorerDrawerDocs['summary.md'].exists">
                <div class="explorer-empty" x-text="t('explorer_summary_missing')"></div>
              </template>
            </div>
          </template>

          <!-- Plan tab -->
          <template x-if="explorerDrawerTab === 'plan'">
            <div>
              <template x-if="explorerDrawerDocs['plan.md'] && explorerDrawerDocs['plan.md'].exists">
                <pre class="explorer-md" x-text="explorerDrawerDocs['plan.md'].content"></pre>
              </template>
              <template x-if="explorerDrawerDocs['plan.md'] && !explorerDrawerDocs['plan.md'].exists">
                <div class="explorer-empty" x-text="t('explorer_plan_missing')"></div>
              </template>
            </div>
          </template>

          <!-- Events tab -->
          <template x-if="explorerDrawerTab === 'events'">
            <div class="explorer-events">
              <template x-if="!explorerDrawerLoading && explorerDrawerEvents.length === 0">
                <div class="explorer-empty" x-text="t('explorer_events_empty')"></div>
              </template>
              <template x-for="ev in explorerDrawerEvents" :key="ev.id">
                <div class="explorer-event">
                  <div class="explorer-event-summary" @click="toggleDrawerEvent(ev.id)">
                    <span class="explorer-runs-cell-mono" x-text="'#' + ev.step_index"></span>
                    <span class="explorer-runs-cell-mono" x-text="ev.step_kind || ''"></span>
                    <span class="explorer-runs-cell-mono" x-text="ev.tool_name || ''"></span>
                    <span class="explorer-chip" :class="ev.status" x-text="ev.status"></span>
                    <span class="explorer-runs-cell-mono" x-text="runRelativeTime(ev.created_at)"></span>
                  </div>
                  <template x-if="explorerDrawerEventExpanded === ev.id">
                    <div class="explorer-event-body">
                      <template x-if="ev.request_json">
                        <div>
                          <div class="explorer-event-label" x-text="t('explorer_event_request')"></div>
                          <pre class="explorer-md" x-text="ev.request_json"></pre>
                        </div>
                      </template>
                      <template x-if="ev.response_json">
                        <div>
                          <div class="explorer-event-label" x-text="t('explorer_event_response')"></div>
                          <pre class="explorer-md" x-text="ev.response_json"></pre>
                        </div>
                      </template>
                      <template x-if="!ev.request_json && !ev.response_json">
                        <div class="explorer-empty" x-text="t('explorer_event_empty_payload')"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </aside>
    </div>
  </template>

  <template x-if="showOnboardingDrawer">
    <div>
      <div class="onboarding-overlay" @click="closeOnboardingDrawer()"></div>
      <aside class="onboarding-drawer" x-ref="onboardingDrawer" role="dialog" aria-modal="true" :aria-label="t('onboarding_title')" tabindex="-1" @keydown.tab.prevent="cycleOnboardingFocus($event)">
        <div class="onboarding-drawer-header">
          <div>
            <h3 class="onboarding-drawer-title" x-text="onboardingText(((onboardingLocaleData() || {}).title), t('onboarding_title'))"></h3>
            <p class="onboarding-drawer-subtitle" x-text="t('onboarding_subtitle')"></p>
          </div>
          <button class="onboarding-close-btn" x-ref="onboardingCloseBtn" @click="closeOnboardingDrawer()" :title="t('cancel')">&times;</button>
        </div>

        <div class="onboarding-tabs">
          <button type="button" :class="{ active: onboardingTab === 'quick_start' }" @click="onboardingTab = 'quick_start'" x-text="onboardingText((((onboardingLocaleData() || {}).tabs || {}).quick_start), t('onboarding_tab_quick_start'))"></button>
          <button type="button" :class="{ active: onboardingTab === 'full_commands' }" @click="onboardingTab = 'full_commands'" x-text="onboardingText((((onboardingLocaleData() || {}).tabs || {}).full_commands), t('onboarding_tab_full_commands'))"></button>
          <button type="button" :class="{ active: onboardingTab === 'troubleshooting' }" @click="onboardingTab = 'troubleshooting'" x-text="onboardingText((((onboardingLocaleData() || {}).tabs || {}).troubleshooting), t('onboarding_tab_troubleshooting'))"></button>
        </div>

        <div class="onboarding-drawer-body">
          <div class="onboarding-loading" x-show="onboardingLoading" x-text="t('loading')"></div>
          <div class="onboarding-error" x-show="onboardingError" x-text="onboardingError"></div>

          <section class="onboarding-section" x-show="onboardingTab === 'quick_start' && onboardingLocaleData()">
            <p class="support-note" x-text="onboardingText(((((onboardingLocaleData() || {}).quick_start) || {}).intro), '')"></p>
            <div class="support-starter-section">
              <div class="support-starter-label" x-text="t('onboarding_recommended_action')"></div>
              <button type="button" class="onboarding-command-btn onboarding-run-btn"
                @click="runRecommendedFromOnboarding()"
                :disabled="onboardingStartLoading">
                <strong x-text="onboardingStartLoading ? t('onboarding_checking_recommendation') : t('onboarding_run_recommended')"></strong>
                <span x-text="t('onboarding_run_recommended_desc')"></span>
              </button>
              <div class="onboarding-error" x-show="onboardingStartError" x-text="onboardingStartError"></div>
            </div>
            <ol class="onboarding-steps">
              <template x-for="(item, idx) in (((((onboardingLocaleData() || {}).quick_start) || {}).steps) || [])" :key="item.id || item.command || idx">
                <li class="onboarding-step">
                  <strong x-text="onboardingText(item.title, '')"></strong>
                  <span class="support-note" x-text="onboardingText(item.body, '')"></span>
                </li>
              </template>
            </ol>
            <div class="support-starter-section" x-show="(((((onboardingLocaleData() || {}).quick_start) || {}).commands) || []).length > 0">
              <div class="support-starter-label" x-text="t('onboarding_common_commands')"></div>
              <div class="onboarding-command-list">
                <template x-for="(item, idx) in (((((onboardingLocaleData() || {}).quick_start) || {}).commands) || [])" :key="item.id || item.command || idx">
                  <button type="button" class="onboarding-command-btn" @click="insertOnboardingCommand(item.command)">
                    <strong x-text="onboardingText(item.label, item.command || '')"></strong>
                    <span x-text="onboardingText(item.description, item.command || '')"></span>
                  </button>
                </template>
              </div>
            </div>
          </section>

          <section class="onboarding-section" x-show="onboardingTab === 'full_commands' && onboardingLocaleData()">
            <template x-for="(group, groupIdx) in (((((onboardingLocaleData() || {}).full_commands) || {}).groups) || [])" :key="group.id || onboardingText(group.title, '') || groupIdx">
              <div class="support-starter-section">
                <div class="support-starter-label" x-text="onboardingText(group.title, '')"></div>
                <p class="support-note" x-show="onboardingText(group.description, '')" x-text="onboardingText(group.description, '')"></p>
                <div class="onboarding-command-list">
                  <template x-for="(item, itemIdx) in (group.items || [])" :key="item.id || item.command || itemIdx">
                    <button type="button" class="onboarding-command-btn" @click="insertOnboardingCommand(item.command)">
                      <strong x-text="onboardingText(item.label, item.command || '')"></strong>
                      <span x-text="onboardingText(item.description, item.command || '')"></span>
                    </button>
                  </template>
                </div>
              </div>
            </template>
          </section>

          <section class="onboarding-section" x-show="onboardingTab === 'troubleshooting' && onboardingLocaleData()">
            <template x-for="(item, idx) in (((((onboardingLocaleData() || {}).troubleshooting) || {}).items) || [])" :key="item.id || onboardingText(item.title, '') || idx">
              <div class="onboarding-step">
                <strong x-text="onboardingText(item.title, '')"></strong>
                <span class="support-note" x-text="onboardingText(item.body, '')"></span>
              </div>
            </template>
          </section>
        </div>
      </aside>
    </div>
  </template>

</div>
