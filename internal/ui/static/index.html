      this._supportFocusRefreshHandler = async () => {
        if (document.visibilityState === 'visible') {
          await this.pollSystemStatus();
        }
      };
      window.addEventListener('focus', this._supportFocusRefreshHandler);
      document.addEventListener('visibilitychange', this._supportFocusRefreshHandler);

      this.$nextTick(() => {
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      });
    },

    destroy() {
      this._timers.forEach(t => clearInterval(t));
      this._timers = [];
      if (this._deployTimer) clearInterval(this._deployTimer);
      if (this._supportFocusRefreshHandler) {
        window.removeEventListener('focus', this._supportFocusRefreshHandler);
        document.removeEventListener('visibilitychange', this._supportFocusRefreshHandler);
        this._supportFocusRefreshHandler = null;
      }
      this.stopExplorerPolling();
      this.wizCleanup();
    },

    // ── API helpers ──

    async callToolRaw(name, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/tools/' + encodeURIComponent(name), {
          method: 'POST',
          headers,
          body: JSON.stringify(params || {})
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        return await resp.json();
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async callTool(name, params) {
      const raw = await this.callToolRaw(name, params);
      if (raw == null) return {};
      if (raw._err) return { _err: raw._err };
      if (raw.error && typeof raw.error === 'string') return { _err: raw.error };
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        const text = raw.content[0].text || '';
        if (raw.isError) return { _err: text };
        try { return JSON.parse(text); } catch { return { _raw: text }; }
      }
      return raw;
    },

    async callCLI(command) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/cli/exec', {
          method: 'POST',
          headers,
          body: JSON.stringify({ command: command || '' })
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        const data = await resp.json();
        if (!resp.ok) {
          const msg = data && data.error && data.error.message ? data.error.message : ('HTTP ' + resp.status);
          return { _err: msg };
        }
        return data;
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async loadSupportManifest(force) {
      if (this.supportManifestLoading) return this.supportManifest;
      if (this.supportManifest && !force) return this.supportManifest;

      this.supportManifestLoading = true;
      this.supportManifestError = '';
      const headers = {};
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/ui/api/support-manifest', { headers });
        if (!resp.ok) throw new Error('support manifest unavailable');
        const data = await resp.json();
        if (!data || typeof data !== 'object') throw new Error('invalid support manifest');
        this.supportManifest = data;
        return data;
      } catch (e) {
        this.supportManifestError = e.message || 'support manifest unavailable';
        return null;
      } finally {
        this.supportManifestLoading = false;
      }
    },

    async loadOnboardingManifest(force) {
      if (this.onboardingLoading) return this.onboardingManifest;
      if (this.onboardingManifest && !force) return this.onboardingManifest;

      this.onboardingLoading = true;
      this.onboardingError = '';
      this.onboardingLoadFailed = false;
      try {
        const headers = {};
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        const resp = await fetch('/ui/api/onboarding-manifest', { headers });
        if (!resp.ok) throw new Error('onboarding manifest unavailable');
        const data = await resp.json();
        if (!data || typeof data !== 'object' || Array.isArray(data) || !data.locales || typeof data.locales !== 'object' || Array.isArray(data.locales)) {
          throw new Error('invalid onboarding manifest');
        }
        this.onboardingManifest = data;
        this.onboardingLoadFailed = false;
        return data;
      } catch (e) {
        this.onboardingError = (e && e.message) ? e.message : 'onboarding manifest unavailable';
        this.onboardingLoadFailed = true;
        return null;
      } finally {
        this.onboardingLoading = false;
      }
    },

    onboardingLocaleKey() {
      const manifest = this.resolvedOnboardingManifest();
      if (manifest && manifest.locales && typeof manifest.locales === 'object') {
        if (manifest.locales[this.lang]) return this.lang;
        if (manifest.default_locale && manifest.locales[manifest.default_locale]) return manifest.default_locale;
        if (manifest.locales.zh) return 'zh';
        if (manifest.locales.en) return 'en';
        const localeKeys = Object.keys(manifest.locales);
        if (localeKeys.length) return localeKeys[0];
      }
      return this.lang === 'zh' ? 'zh' : 'en';
    },

    onboardingText(value, fallback) {
      if (!value) return fallback || '';
      if (typeof value === 'string') return value || fallback || '';
      const locale = this.onboardingLocaleKey();
      return value[locale] || value.zh || value.en || fallback || '';
    },

    onboardingFirstRecommendation(start) {
      const recommendations = (((start || {}).recommend || {}).recommendations || []);
      if (!Array.isArray(recommendations) || recommendations.length === 0) return null;
      const nextModel = String((start || {}).next_model || '').toLowerCase();
      if (!nextModel) return recommendations[0];
      return recommendations.find((rec) => String(rec.model_name || rec.model || rec.name || '').toLowerCase() === nextModel) || recommendations[0];
    },

    async runRecommendedFromOnboarding() {
      if (this.onboardingStartLoading) return;
      this.onboardingStartLoading = true;
      this.onboardingStartError = '';
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        const resp = await fetch('/ui/api/onboarding-start', {
          method: 'POST',
          headers,
          body: JSON.stringify({ locale: this.onboardingLocaleKey() })
        });
        if (!resp.ok) {
          let message = 'onboarding start ' + resp.status;
          try {
            const err = await resp.json();
            if (err && err.error) message = err.error;
          } catch (e) {}
          throw new Error(message);
        }

        const data = await resp.json();
        this.onboardingStartResult = data;
        if (data && data.status) this.onboardingData = data.status;
        if (data && data.scan) {
          this.onboardingScanResults = {
            engines: data.scan.engines || [],
            models: data.scan.models || [],
            centralConnected: !!data.scan.central_connected
          };
          this.onboardingScanDone = true;
        }
        this.onboardingRecommendations = (((data || {}).recommend || {}).recommendations || []);

        if (data && data.status && data.status.stack_status && data.status.stack_status.needs_init) {
          this.closeOnboardingDrawer();
          this.onboardingPhase = 'detecting';
          return;
        }

        const rec = this.onboardingFirstRecommendation(data);
        if (!rec) throw new Error(this.t('onboarding_no_recommended_model'));
        this.closeOnboardingDrawer();
        this.wizDeploy(rec);
      } catch (e) {
        this.onboardingStartError = (e && e.message) ? e.message : this.t('onboarding_run_recommended_failed');
      } finally {
        this.onboardingStartLoading = false;
      }
    },

    resolvedOnboardingManifest() {
      if (this.onboardingManifest) return this.onboardingManifest;
      if (this.onboardingLoadFailed) return this.defaultOnboardingManifest();
      return null;
    },

    onboardingLocaleData() {
      const manifest = this.resolvedOnboardingManifest();
      if (!manifest || !manifest.locales || typeof manifest.locales !== 'object') return null;
      const locale = this.onboardingLocaleKey();
      return manifest.locales[locale] || manifest.locales.zh || manifest.locales.en || null;
    },

    onboardingFocusableElements() {
      if (!this.$refs.onboardingDrawer) return [];
      return Array.from(this.$refs.onboardingDrawer.querySelectorAll('button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'))
        .filter((el) => el && typeof el.focus === 'function' && !el.hasAttribute('disabled') && el.getAttribute('aria-hidden') !== 'true' && el.offsetParent !== null);
    },

    focusOnboardingDrawer() {
      this.$nextTick(() => {
        const focusables = this.onboardingFocusableElements();
        const target = this.$refs.onboardingCloseBtn || focusables[0] || this.$refs.onboardingDrawer;
        if (target && typeof target.focus === 'function') target.focus();
      });
    },

    cycleOnboardingFocus(e) {
      const focusables = this.onboardingFocusableElements();
      if (!focusables.length) {
        if (this.$refs.onboardingDrawer) this.$refs.onboardingDrawer.focus();
        return;
      }
      const current = document.activeElement;
      let idx = focusables.indexOf(current);
      if (idx === -1) {
        idx = e.shiftKey ? 0 : -1;
      }
      const nextIdx = e.shiftKey
        ? (idx <= 0 ? focusables.length - 1 : idx - 1)
        : (idx >= focusables.length - 1 ? 0 : idx + 1);
      focusables[nextIdx].focus();
    },

    restoreOnboardingFocus() {
      const restoreTarget = this._onboardingReturnFocus;
      this._onboardingReturnFocus = null;
      this.$nextTick(() => {
        if (restoreTarget && restoreTarget.isConnected && typeof restoreTarget.focus === 'function') {
          restoreTarget.focus();
          return;
        }
        if (this.$refs.onboardingTrigger && typeof this.$refs.onboardingTrigger.focus === 'function') {
          this.$refs.onboardingTrigger.focus();
        }
      });
    },

    insertOnboardingCommand(command) {
      if (!command) return;
      this.currentView = 'chat';
      this.mobileTab = 'chat';
      this.input = command;
      this.closeOnboardingDrawer();
      this.$nextTick(() => {
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      });

    openOnboardingDrawer() {
      this._onboardingReturnFocus = document.activeElement && typeof document.activeElement.focus === 'function'
        ? document.activeElement
        : null;
      this.showOnboardingDrawer = true;
      this.onboardingTab = 'quick_start';
      this.loadOnboardingManifest();
      this.focusOnboardingDrawer();
    },

    closeOnboardingDrawer() {
      if (!this.showOnboardingDrawer) return;
      this.showOnboardingDrawer = false;
      this.restoreOnboardingFocus();

    // ── Onboarding Wizard ──

    wizActive() {
      return this.onboardingPhase !== 'complete' && this.onboardingPhase !== '';
    },

    wizDotPhases() {
      if (this.wizNeedsInit()) {
        return ['detecting', 'init', 'scanning', 'choosing', 'deploying'];
      }
      return ['detecting', 'scanning', 'choosing', 'recommend', 'deploying'];
    },
    wizPhaseIndex(ph) {
      var phases = ['loading', 'detecting', 'init', 'scanning', 'choosing', 'recommend', 'local', 'deploying', 'done', 'complete'];
      var idx = phases.indexOf(ph);
      return idx >= 0 ? idx : -1;
    },
    wizDotIndex(ph) {
      return this.wizDotPhases().indexOf(ph);
    },
    wizPhaseToDot(ph) {
      // Map sub-phases to their parent dot
      if (ph === 'local') return this.wizNeedsInit() ? 'choosing' : 'recommend';
      if (ph === 'recommend' && this.wizNeedsInit()) return 'choosing';
      if (ph === 'done' || ph === 'complete') return 'deploying';
      if (ph === 'loading') return 'detecting';
      return ph;
    },
    wizDotActive(dotPh) {
      return this.wizPhaseToDot(this.onboardingPhase) === dotPh;
    },
    wizDotDone(dotPh) {
      var curIdx = this.wizDotIndex(this.wizPhaseToDot(this.onboardingPhase));
      var dotIdx = this.wizDotIndex(dotPh);
      return dotIdx >= 0 && curIdx > dotIdx;
    },
    wizGoToPhase(ph) {
      // Navigate back to a completed phase
      if (ph === 'detecting') {
        this.onboardingPhase = 'detecting';
        // Refresh GPU occupancy data when going back to detecting
        this.wizRefreshGpuOccupancy();
      }
      else if (ph === 'init') { this.onboardingPhase = 'init'; }
      else if (ph === 'scanning') { this.wizStartScan(); }
      else if (ph === 'choosing') { this.onboardingPhase = 'choosing'; }
      else if (ph === 'recommend') { this.onboardingPhase = 'choosing'; }
    },

    wizRefreshGpuOccupancy() {
      var self = this;
      var headers = {};
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      fetch('/ui/api/onboarding-status', { headers: headers }).then(function(resp) {
        if (resp.ok) return resp.json();
      }).then(function(data) {
        if (data && self.onboardingData) {
          self.onboardingData.gpu_occupancy = data.gpu_occupancy || [];
        }
      }).catch(function() {});
    },

    async initOnboarding() {
      this.onboardingPhase = 'loading';
      try {
        var headers = {};
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        var resp = await fetch('/ui/api/onboarding-status', { headers: headers });
        if (!resp.ok) throw new Error('status ' + resp.status);
        this.onboardingData = await resp.json();
        if (this.onboardingData.onboarding_completed) {
          this.onboardingPhase = 'complete';
          return;
        }
        this.onboardingPhase = 'detecting';
      } catch (e) {
        // Fail open: if the endpoint is unavailable, skip the wizard
        this.onboardingPhase = 'complete';
      }
    },

    // Hardware data helpers — backend returns:
    // hardware.gpu: [{name, vram_mib, count, arch}], hardware.cpu: {model, cores},
    // hardware.ram_mib, hardware.os, hardware.arch, hardware.profile_match
    wizHwGpu() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      var gpus = this.onboardingData.hardware.gpu;
      if (!gpus || !gpus.length) return 'No discrete GPU';
      var g = gpus[0];
      var txt = g.name || 'GPU';
      if (g.count && g.count > 1) txt = g.count + 'x ' + txt;
      return txt;
    },
    wizHwUnifiedMemory() {
      if (!this.onboardingData || !this.onboardingData.hardware) return false;
      var hw = this.onboardingData.hardware;
      if (hw.unified_memory) return true;
      var gpus = hw.gpu;
      return !!(gpus && gpus.length && gpus[0] && gpus[0].unified_memory);
    },
    wizHwVramLabel() {
      if (!this.wizHwUnifiedMemory()) return this.t('wiz_vram');
      return this.lang === 'zh' ? '统一内存' : 'Unified Memory';
    },
    hwGpuLabel() {
      if (!(this.hw && this.hw.gpu && this.hw.gpu.unifiedMemory)) return 'VRAM';
      return this.lang === 'zh' ? '统一内存' : 'Unified Memory';
    },
    hwHostMemoryLabel() {
      if (this.hw && this.hw.gpu && this.hw.gpu.unifiedMemory) {
        return this.lang === 'zh' ? '统一内存' : 'Unified Memory';
      }
      return 'RAM';
    },
    hideAcceleratorPanel() {
      if (!(this.hw && this.hw.gpu && this.hw.gpu.unifiedMemory)) return false;
      const marker = [
        this.hw.gpu.name,
        this.hw.gpu.arch,
        this.hw.gpu.computeId
      ].filter(Boolean).join(' ').toLowerCase();
      return /m1000|musa|moore threads|摩尔/.test(marker);
    },
    smoothGaugeValue(prev, next) {
      if (typeof next !== 'number' || Number.isNaN(next)) return typeof prev === 'number' ? prev : 0;
      if (typeof prev !== 'number' || Number.isNaN(prev)) return Math.round(next);
      return Math.round(prev * 0.72 + next * 0.28);
    },
    normalizeInstalledMemoryMiB(mib) {
      if (!mib || mib <= 0) return 0;
      const gib = mib / 1024;
      const candidates = [4, 8, 12, 16, 24, 32, 48, 64, 96, 128, 192, 256, 384, 512];
      for (const candidate of candidates) {
        if (gib >= candidate * 0.9 && gib <= candidate * 1.05) {
          return candidate * 1024;
        }
      }
      return mib;
    },
    hwShowSeparateRam() {
      return !this.hw || !this.hw.gpu || !this.hw.gpu.unifiedMemory || this.hideAcceleratorPanel();
    },
    componentSectionToggleLabel() {
      if (this.lang === 'zh') return this.componentSectionExpanded ? '收起' : '展开';
      return this.componentSectionExpanded ? 'Collapse' : 'Expand';
    },
    currentHardwareProfile() {
      const direct = String(this.hardwareProfile || '').trim();
      if (direct) return direct;
      const hw = this.onboardingData && this.onboardingData.hardware ? this.onboardingData.hardware : null;
      return hw && hw.profile_match ? String(hw.profile_match).trim() : '';
    },
    displayDeviceName(name) {
      const profile = this.currentHardwareProfile();
      if (profile === 'moore-threads-m1000-soc-arm64') return 'MTT AIBOOK-ABA141';
      const raw = String(name || '').trim();
      if (!raw) return raw;
      return raw
        .replace(/^(?:mt|mtt|aibook)-AIBOOK-ABA141\d*$/i, 'MTT AIBOOK-ABA141')
        .replace(/\bAIBOOK-ABA141\d*\b/g, 'AIBOOK-ABA141');
    },
    displayFleetDeviceName(device) {
      const raw = String((device && (device.name || device.id)) || '').trim();
      if (/^(?:mt|mtt|aibook)-AIBOOK-ABA141\d*$/i.test(raw)) return 'MTT AIBOOK-ABA141';
      return raw || 'unknown';
    },
    wizHwVram() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      var gpus = this.onboardingData.hardware.gpu;
      if (!gpus || !gpus.length) return '-';
      var hw = this.onboardingData.hardware;
      var mib = this.wizHwUnifiedMemory()
        ? this.normalizeInstalledMemoryMiB(hw.ram_mib || gpus[0].vram_mib || 0)
        : (gpus[0].vram_mib || 0);
      if (mib <= 0) return '-';
      return (mib / 1024).toFixed(1) + ' GB';
    },
    wizHwCpu() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      var cpu = this.onboardingData.hardware.cpu;
      if (!cpu) return '-';
      var txt = cpu.model || '';
      if (cpu.cores) txt += ' (' + cpu.cores + ' cores)';
      return txt || '-';
    },
    wizHwRam() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      var mib = this.onboardingData.hardware.ram_mib || 0;
      if (mib <= 0) return '-';
      return (mib / 1024).toFixed(1) + ' GB';
    },
    wizHwOs() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      var hw = this.onboardingData.hardware;
      return (hw.os || '') + ' / ' + (hw.arch || '');
    },
    wizHwProfile() {
      if (!this.onboardingData || !this.onboardingData.hardware) return '-';
      const profile = this.onboardingData.hardware.profile_match || '';
      if (profile === 'moore-threads-m1000-soc-arm64') return 'MTT AIBOOK-ABA141';
      return profile || '-';
    },
    wizStackReady(key) {
      if (!this.onboardingData || !this.onboardingData.stack_status) return false;
      return this.onboardingData.stack_status[key] === 'ready';
    },
    wizNeedsInit() {
      if (!this.onboardingData || !this.onboardingData.stack_status) return false;
      return !!this.onboardingData.stack_status.needs_init;
    },
    wizCanAutoInit() {
      if (!this.onboardingData || !this.onboardingData.stack_status) return false;
      return !!this.onboardingData.stack_status.can_auto_init;
    },
    wizInitTier() {
      if (!this.onboardingData || !this.onboardingData.stack_status) return 'docker';
      return this.onboardingData.stack_status.init_tier_recommendation || 'docker';
    },
    wizInitCommand() {
      return this.wizInitTier() === 'k3s'
        ? 'sudo $(command -v aima) onboarding init --tier k3s'
        : 'sudo $(command -v aima) onboarding init --tier docker';
    },
    wizInitBlockedReason() {
      if (!this.onboardingData || !this.onboardingData.stack_status) return '';
      return this.onboardingData.stack_status.init_blocked_reason || '';
    },
    wizPlatform() {
      if (!this.onboardingData || !this.onboardingData.hardware) return 'linux';
      var os = (this.onboardingData.hardware.os || '').toLowerCase();
      if (os.indexOf('darwin') >= 0 || os.indexOf('macos') >= 0) return 'darwin';
      if (os.indexOf('windows') >= 0) return 'windows';
      return 'linux';
    },

    wizSkip() {
      this.wizCleanup();
      this.onboardingPhase = 'complete';
    },

    wizCleanup() {
      if (this.onboardingInitPolling) {
        clearInterval(this.onboardingInitPolling);
        this.onboardingInitPolling = null;
      }
      if (this._wizInitAbort) {
        this._wizInitAbort.abort();
        this._wizInitAbort = null;
      }
      if (this._wizScanAbort) {
        this._wizScanAbort.abort();
        this._wizScanAbort = null;
      }
      if (this._wizDeployAbort) {
        this._wizDeployAbort.abort();
        this._wizDeployAbort = null;
      }
    },

    wizEnterInit() {
      this.onboardingPhase = 'init';
      this.onboardingInitLog = [];
      this.onboardingInitError = '';
      if (this.wizCanAutoInit()) {
        this.wizStartInit();
        return;
      }
      this.wizStartInitPolling();
    },

    // INIT phase: start polling
    wizStartInitPolling() {
      var self = this;
      var startTime = Date.now();
      this.onboardingInitTimeout = false;
      this.onboardingInitPolling = setInterval(async function() {
        try {
          var headers = {};
          if (self.apiKey) headers['Authorization'] = 'Bearer ' + self.apiKey;
          var resp = await fetch('/ui/api/onboarding-status', { headers: headers });
          if (resp.ok) {
            var data = await resp.json();
            self.onboardingData = data;
            if (data.stack_status && (data.stack_status.docker === 'ready' || data.stack_status.k3s === 'ready')) {
              clearInterval(self.onboardingInitPolling);
              self.onboardingInitPolling = null;
              self.wizStartScan();
              return;
            }
          }
        } catch (e) { /* ignore poll errors */ }
        // 5 minute timeout
        if (Date.now() - startTime > 300000) {
          self.onboardingInitTimeout = true;
        }
      }, 3000);
    },

    async wizStartInit() {
      this.onboardingInitLog = [];
      this.onboardingInitError = '';
      this.onboardingInitRunning = true;
      this.onboardingInitTimeout = false;
      var self = this;
      try {
        var abort = new AbortController();
        this._wizInitAbort = abort;
        var headers = { 'Content-Type': 'application/json' };
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        var resp = await fetch('/ui/api/onboarding-init', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ tier: this.wizInitTier(), allow_download: true }),
          signal: abort.signal
        });
        if (!resp.ok) throw new Error('init ' + resp.status);
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var currentEvent = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var li = 0; li < lines.length; li++) {
            var line = lines[li];
            if (line.indexOf('event: ') === 0) {
              currentEvent = line.slice(7).trim();
            } else if (line.indexOf('data: ') === 0 && currentEvent) {
              try {
                var eventData = JSON.parse(line.slice(6));
                self.wizHandleInitEvent(currentEvent, eventData);
              } catch (e) { /* ignore */ }
              currentEvent = '';
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          this.onboardingInitError = (e && e.message) ? e.message : 'init failed';
        }
      } finally {
        this.onboardingInitRunning = false;
        this._wizInitAbort = null;
      }
    },

    async wizHandleInitEvent(event, data) {
      if (event === 'init_phase') {
        this.onboardingInitLog.push({ type: 'phase', name: data.message || data.phase || 'init' });
      } else if (event === 'init_preflight') {
        var count = data.download_count || 0;
        var tier = data.tier || this.wizInitTier();
        this.onboardingInitLog.push({ type: 'preflight', name: count > 0 ? ('Preparing ' + tier + ' stack (' + count + ' downloads)') : ('Preparing ' + tier + ' stack') });
      } else if (event === 'init_component') {
        var label = data.name || 'component';
        if (data.ready) label += ' ready';
        else if (data.skipped) label += ' skipped';
        else if (data.message) label += ': ' + data.message;
        this.onboardingInitLog.push({ type: 'component', name: label });
      } else if (event === 'init_complete') {
        if (data.stack_status) {
          if (!this.onboardingData) this.onboardingData = {};
          this.onboardingData.stack_status = data.stack_status;
        }
        var headers = {};
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        try {
          var resp = await fetch('/ui/api/onboarding-status', { headers: headers });
          if (resp.ok) {
            this.onboardingData = await resp.json();
          }
        } catch (e) { /* ignore */ }
        if (this.onboardingData && this.onboardingData.stack_status &&
            (this.onboardingData.stack_status.docker === 'ready' || this.onboardingData.stack_status.k3s === 'ready')) {
          this.wizStartScan();
        } else if (!this.onboardingInitError) {
          this.onboardingInitError = 'init finished but stack is not ready yet';
        }
      } else if (event === 'error') {
        this.onboardingInitError = data.message || 'init failed';
      }
    },

    wizSkipInit() {
      if (this._wizInitAbort) {
        this._wizInitAbort.abort();
        this._wizInitAbort = null;
      }
      if (this.onboardingInitPolling) {
        clearInterval(this.onboardingInitPolling);
        this.onboardingInitPolling = null;
      }
      this.onboardingInitRunning = false;
      this.wizStartScan();
    },

    wizCancelInit() {
      if (this._wizInitAbort) {
        this._wizInitAbort.abort();
        this._wizInitAbort = null;
      }
      this.onboardingInitRunning = false;
      this.onboardingPhase = 'detecting';
    },

    wizStopContainer(proc, index) {
      if (proc._stopping) return;
      var self = this;
      // Use direct property set for Alpine reactivity
      self.onboardingData.gpu_occupancy[index]._stopping = true;
      var headers = { 'Content-Type': 'application/json' };
      if (self.apiKey) headers['Authorization'] = 'Bearer ' + self.apiKey;
      fetch('/ui/api/onboarding-stop-container', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ name: proc.name })
      }).then(function(resp) {
        if (resp.ok) {
          self.onboardingData.gpu_occupancy.splice(index, 1);
        } else {
          return resp.json().catch(function() { return {}; }).then(function(err) {
            alert(err.error || 'Failed to stop container');
            self.onboardingData.gpu_occupancy[index]._stopping = false;
          });
        }
      }).catch(function(e) {
        alert('Failed to stop: ' + e.message);
        if (self.onboardingData && self.onboardingData.gpu_occupancy && self.onboardingData.gpu_occupancy[index]) {
          self.onboardingData.gpu_occupancy[index]._stopping = false;
        }
      });
    },

    wizRetryDeploy() {
      // Re-run the same deploy with the current model
      if (this._lastDeployRequest) {
        this.wizDeploy(this._lastDeployRequest);
      } else {
        this.onboardingPhase = 'choosing';
      }
    },

    // SCANNING phase: SSE connection
    async wizStartScan() {
      this.onboardingPhase = 'scanning';
      this.onboardingScanLog = [];
      this.onboardingScanDone = false;
      this.onboardingScanResults = { engines: [], models: [], centralConnected: false };
      var self = this;
      try {
        var abort = new AbortController();
        this._wizScanAbort = abort;
        var headers = { 'Content-Type': 'application/json' };
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        var resp = await fetch('/ui/api/onboarding-scan', {
          method: 'POST',
          headers: headers,
          body: '{}',
          signal: abort.signal
        });
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var currentEvent = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var li = 0; li < lines.length; li++) {
            var line = lines[li];
            if (line.indexOf('event: ') === 0) {
              currentEvent = line.slice(7).trim();
            } else if (line.indexOf('data: ') === 0 && currentEvent) {
              try {
                var eventData = JSON.parse(line.slice(6));
                self.wizHandleScanEvent(currentEvent, eventData);
              } catch (e) { /* ignore parse errors */ }
              currentEvent = '';
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          // On error, still advance to choosing (graceful degradation)
        }
      }
      this._wizScanAbort = null;
      // Mark scan as done (user clicks continue to advance)
      if (this.onboardingPhase === 'scanning') {
        this.onboardingScanDone = true;
      }
    },

    wizHandleScanEvent(event, data) {
      if (event === 'engine_found') {
        this.onboardingScanResults.engines.push(data);
        // Backend sends scanEngineResult with field "type" (e.g. "vllm"), not "name"
        this.onboardingScanLog.push({ type: 'engine', name: data.type || data.name || 'engine' });
      } else if (event === 'model_found') {
        this.onboardingScanResults.models.push(data);
        this.onboardingScanLog.push({ type: 'model', name: data.name || data.model || 'model' });
      } else if (event === 'central_synced') {
        // Backend sends "central_synced" (not "central_status")
        this.onboardingScanResults.centralConnected = !!(data.connected);
        this.onboardingScanLog.push({ type: 'central', name: data.connected ? this.t('wiz_scan_central_connected') : this.t('wiz_scan_central_offline') });
      } else if (event === 'scan_complete') {
        // Backend sends integer counts {engines: N, models: N}, not arrays.
        // Don't overwrite the arrays we built incrementally from engine_found/model_found events.
        if (data.central_connected !== undefined) this.onboardingScanResults.centralConnected = data.central_connected;
        this.onboardingScanLog.push({ type: 'done', name: this.t('wiz_scan_complete') });
        this.onboardingScanDone = true;
      }
    },

    // RECOMMEND phase
    async wizGoRecommend() {
      this.onboardingPhase = 'recommend';
      this.onboardingRecommendLoading = true;
      this.onboardingRecommendations = [];
      try {
        var headers = { 'Content-Type': 'application/json' };
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        var resp = await fetch('/ui/api/onboarding-recommend', {
          method: 'POST',
          headers: headers,
          body: '{}'
        });
        if (resp.ok) {
          var data = await resp.json();
          this.onboardingRecommendations = data.recommendations || data || [];
          if (!Array.isArray(this.onboardingRecommendations)) this.onboardingRecommendations = [];
        }
      } catch (e) { /* ignore */ }
      this.onboardingRecommendLoading = false;
    },

    // DEPLOY phase (from recommend or local)
    async wizDeploy(rec) {
      this._lastDeployRequest = rec;
      this.onboardingPhase = 'deploying';
      this.onboardingDeployModel = rec.model_name || rec.model || rec.name || '';
      this.onboardingDeployEndpoint = '';
      this.onboardingDeployProgress = {
        steps: [
          { label: this.t('wiz_step_engine'), status: 'pending', detail: '', progress: -1 },
          { label: this.t('wiz_step_model'), status: 'pending', detail: '', progress: -1 },
          { label: this.t('wiz_step_deploy'), status: 'pending', detail: '', progress: -1 }
        ],
        error: ''
      };
      var self = this;
      try {
        var abort = new AbortController();
        this._wizDeployAbort = abort;
        var headers = { 'Content-Type': 'application/json' };
        if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
        var engineStr = (rec.engine && typeof rec.engine === 'object')
          ? (rec.engine.name || rec.engine.type || '')
          : (rec.engine || '');
        var body = { model: rec.model || rec.model_name || rec.name || '', engine: engineStr };
        var resp = await fetch('/ui/api/onboarding-deploy', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(body),
          signal: abort.signal
        });
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var currentEvent = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var li = 0; li < lines.length; li++) {
            var line = lines[li];
            if (line.indexOf('event: ') === 0) {
              currentEvent = line.slice(7).trim();
            } else if (line.indexOf('data: ') === 0 && currentEvent) {
              try {
                var eventData = JSON.parse(line.slice(6));
                self.wizHandleDeployEvent(currentEvent, eventData);
              } catch (e) { /* ignore */ }
              currentEvent = '';
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          this.onboardingDeployProgress.error = this.t('wiz_deploy_error');
        }
      }
      this._wizDeployAbort = null;
    },

    wizDeployLocal(m) {
      this.wizDeploy({ model: m.name || m.model, engine: m.engine || '', model_local: true, engine_installed: true });
    },

    wizHandleDeployEvent(event, data) {
      var steps = this.onboardingDeployProgress.steps;
      if (event === 'step') {
        // Backend sends unified "step" events: {step: 1-3, name, status, message, progress, ...}
        var idx = (data.step || 1) - 1; // step is 1-indexed, array is 0-indexed
        if (idx < 0 || idx >= steps.length) return;
        var s = data.status || '';
        if (s === 'resolved' || s === 'complete' || s === 'skipped' || s === 'ready' || s === 'reusing') {
          steps[idx].status = 'done';
          steps[idx].progress = 100;
        } else if (s === 'downloading' || s === 'resolving' || s === 'starting' || s === 'waiting') {
          steps[idx].status = 'active';
        } else if (s === 'warning') {
          steps[idx].status = 'active';
        }
        if (data.message) steps[idx].detail = data.message;
        if (data.endpoint) steps[idx].detail = data.endpoint;
        if (typeof data.progress === 'number') {
          steps[idx].progress = Math.round(data.progress * 100);
        }
        // If step has "ready" status in deploy phase, it means service is ready
        if (s === 'ready' && data.endpoint) {
          this.onboardingDeployEndpoint = data.endpoint;
        }
      } else if (event === 'deploy_complete') {
        if (data.status && data.status !== 'ready') {
          this.onboardingDeployProgress.error = data.message || this.t('wiz_deploy_error');
          steps[2].status = 'error';
          return;
        }
        steps[2].status = 'done';
        steps[2].progress = 100;
        if (data.endpoint) this.onboardingDeployEndpoint = data.endpoint;
        this.onboardingPhase = 'done';
      } else if (event === 'error') {
        var msg = data.message || this.t('wiz_deploy_error');
        // Make GPU memory errors actionable
        if (msg.toLowerCase().includes('gpu memory insufficient') || msg.toLowerCase().includes('gpu memory')) {
          msg = this.t('wiz_gpu_busy');
        }
        // Make engine blocked / incompatible errors clearer
        if (msg.toLowerCase().includes('is blocked') || msg.toLowerCase().includes('no compatible engine')) {
          msg = this.t('wiz_engine_blocked') + ' (' + msg + ')';
        }
        this.onboardingDeployProgress.error = msg;
        // Mark current active step as error
        for (var i = 0; i < steps.length; i++) {
          if (steps[i].status === 'active') { steps[i].status = 'error'; break; }
        }
      }
    },

    wizCancelDeploy() {
      if (this._wizDeployAbort) {
        this._wizDeployAbort.abort();
        this._wizDeployAbort = null;
      }
      this.onboardingPhase = 'choosing';
    },

    wizFinish() {
      this.wizCleanup();
      this.onboardingPhase = 'complete';
      // Refresh deployments
      this.pollDeployments();
      this.$nextTick(function() {
        if (this.$refs && this.$refs.chatInput) this.$refs.chatInput.focus();
      }.bind(this));
    },

    async wizCopyText(text, event) {
      try {
        await navigator.clipboard.writeText(text);
        var btn = event && event.target;
        if (btn) {
          var orig = btn.textContent;
          btn.textContent = this.t('wiz_copied');
          setTimeout(function() { btn.textContent = orig; }, 1500);
        }
      } catch (e) {
        // Fallback for non-secure contexts
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    },

    // Helper to get a single config value (returns string or null)
    async getConfig(key) {
      const raw = await this.callToolRaw('system.config', { key: key });
      if (raw._err) return null;
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        var text = raw.content[0].text || '';
        if (raw.isError) return null;
        // system.config get returns plain text like the value, or JSON with a value field
        try {
          var parsed = JSON.parse(text);
          return parsed.value !== undefined ? String(parsed.value) : text;
        } catch {
          return text;
        }
      }
      return null;
    },

    // ── Polling functions ──

    async pollSystemStatus() {
      const data = await this.callTool('system.status');
      if (!data || data._err) return;
      this.systemOnline = true;

      // Capture hostname from backend
      if (data.hostname) {
        this.hostname = data.hostname;
      }
      // Get IP from browser's location (what user used to access this device)
      if (!this.selfIp) {
        const h = window.location.host || '';
        this.selfIp = h.split(':')[0];  // strip port
      }

      const hw = data.hardware;
      const met = data.metrics;
      this.hardwareProfile = hw && hw.profile_match ? hw.profile_match : '';

      if (hw && hw.gpu) {
        const g = hw.gpu;
        const gm = (met && met.gpu) || {};
        const count = g.count || 1;
        const rawUtil = gm.utilization_percent || 0;
        const prevGpu = this.hw && this.hw.gpu ? this.hw.gpu : null;
        const smoothUtil = this.smoothGaugeValue(prevGpu ? prevGpu.util : null, rawUtil);
        // Metrics now report aggregated totals across all cards
        const totalVram = gm.memory_total_mib || (g.vram_mib * count) || 0;
        const totalUsed = gm.memory_used_mib || 0;
        const unifiedMemory = !!(hw.unified_memory || g.unified_memory);
        const unifiedTotalMiB = this.normalizeInstalledMemoryMiB(hw.ram_total_mib || hw.ram_mib || totalVram || g.vram_mib || 0);
        const displayTotalVram = unifiedMemory ? unifiedTotalMiB : totalVram;
        const memPct = displayTotalVram > 0 ? Math.round(totalUsed / displayTotalVram * 100) : 0;
        const perCardVram = g.vram_mib || (count > 0 ? Math.round(totalVram / count) : 0);
        const countLabel = count > 1 ? (count + '\u00D7') : '';
        const vramSummary = unifiedMemory
          ? this.fmtMiB(unifiedTotalMiB)
          : (count > 1 ? ('(' + this.fmtMiB(perCardVram) + ' \u00D7 ' + count + ')') : this.fmtMiB(perCardVram));
        // Build per-card array from metrics.gpu.cards
        const rawCards = (gm.cards || []);
        const cards = rawCards.map((c, i) => ({
          index: c.index != null ? c.index : i,
          util: c.utilization_percent || 0,
          memUsed: this.fmtMiB(c.memory_used_mib || 0),
          memTotal: this.fmtMiB(c.memory_total_mib || 0),
          memPct: c.memory_total_mib > 0 ? Math.round((c.memory_used_mib || 0) / c.memory_total_mib * 100) : 0,
          temp: c.temperature_celsius || 0,
          power: c.power_draw_watts || 0
        }));
        this.hw.gpu = {
          name: (g.name || 'GPU') + ((hw.unified_memory || g.unified_memory) && !/\bSoC\b/i.test(g.name || 'GPU') ? ' SoC' : ''),
          count: count,
          countLabel: countLabel,
          unifiedMemory: unifiedMemory,
          arch: g.arch || '',
          vramSummary: vramSummary,
          computeId: g.compute_id || '',
          util: smoothUtil,
          utilRaw: rawUtil,
          memTotal: this.fmtMiB(unifiedMemory ? unifiedTotalMiB : displayTotalVram),
          memUsed: this.fmtMiB(totalUsed),
          memPct: memPct,
          temp: gm.temperature_celsius || g.temperature_celsius || 0,
          power: gm.power_draw_watts || g.power_draw_watts || 0,
          cards: cards
        };
      } else {
        this.hw.gpu = null;
      }

      if (hw && hw.cpu) {
        const c = hw.cpu;
        this.hw.cpu.model = c.model || '';
        this.hw.cpu.label = 'SoC';
        this.hw.cpu.coreInfo = '';
      }
      if (met && met.cpu) {
        this.hw.cpu.pct = Math.round(met.cpu.usage_percent || 0);
      }

      if (met && met.ram) {
        const mt = met.ram.total_mib || 0;
        const mu = met.ram.used_mib || 0;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(this.normalizeInstalledMemoryMiB(mt))
        };
      } else if (hw && hw.ram) {
        const mt = hw.ram.total_mib || 0;
        const avail = hw.ram.available_mib || 0;
        const mu = mt - avail;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(this.normalizeInstalledMemoryMiB(mt))
        };
      }
      this.handleSupportStatus(data.support);
      this.handleOpenClawStatus(data.openclaw);
    },

    handleSupportStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.supportState = this.mergeSupportState(data);
      this.supportConnected = data.enabled === true && data.registered === true;
      if (this.supportConnected && !this.supportState.needsBrowserConfirmation && this.supportBrowserConfirmation) {
        this.supportBrowserConfirmation = null;
        this.supportPageConnecting = false;
      }
      if (this.supportWaitingBrowserConfirmation()) {
        this.startSupportBrowserWaitTimer();
      } else {
        this.clearSupportBrowserWaitTimer();
      }
      // On first poll, seed _supportSeen with current state so stale data
      // doesn't appear as new chat messages.
      if (!this._supportSeen.initialized) {
        this._supportSeen.initialized = true;
        if (data.device_id) this._supportSeen.connection = data.device_id;
        if (this.supportState.activeTask) this._supportSeen.activeTask = this.supportTaskSignature(this.supportState.activeTask);
        if (this.supportState.lastTask) this._supportSeen.lastTask = this.supportTaskSignature(this.supportState.lastTask);
        const msgs = this.supportState.messages || [];
        if (msgs.length > 0) this._supportSeen.msgSeq = msgs[msgs.length - 1].seq || 0;
        return;
      }
      this.syncSupportPageUpdates();
    },

    handleOpenClawStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.openclaw = {
        connected: data.connected === true,
        gatewayLive: data.gateway_live === true,
        gatewayURL: data.gateway_url || '',
        configPath: data.config_path || '',
        aimaConfigured: data.aima_configured === true,
        claimNeeded: data.claim_needed === true,
        syncReady: data.sync_ready === true,
        issues: Array.isArray(data.issues) ? data.issues : []
      };
      if (!this.openclaw.claimNeeded) {
        this.openclawClaimError = '';
      }
    },

    openClawDotClass() {
      if (this.openclaw.connected) return 'online';
      if (this.openclaw.gatewayLive || this.openclaw.aimaConfigured || this.openclaw.claimNeeded) return 'warn';
      return 'offline';
    },

    openClawStatusText() {
      if (this.openclaw.connected) return this.t('openclaw_connected');
      if (!this.openclaw.gatewayLive && (this.openclaw.gatewayURL || this.openclaw.configPath)) return this.t('openclaw_offline');
      if (this.openclaw.claimNeeded) return this.t('openclaw_claim_needed');
      if (this.openclaw.gatewayLive && this.openclaw.aimaConfigured) return this.t('openclaw_sync_needed');
      return this.t('openclaw_unconfigured');
    },

    openClawStatusTitle() {
      const parts = [];
      if (Array.isArray(this.openclaw.issues) && this.openclaw.issues.length > 0) {
        parts.push(this.openclaw.issues.join(' | '));
      }
      if (this.openclaw.gatewayURL) parts.push(this.openclaw.gatewayURL);
      if (this.openclaw.configPath) parts.push(this.openclaw.configPath);
      return parts.join(' | ');
    },

    openClawSummaryCount(summary) {
      if (!summary || typeof summary !== 'object') return 0;
      const chat = Array.isArray(summary.chat_models) ? summary.chat_models.length : 0;
      const vision = Array.isArray(summary.vision_models) ? summary.vision_models.length : 0;
      const asr = Array.isArray(summary.asr_models) ? summary.asr_models.length : 0;
      const imageGen = Array.isArray(summary.image_gen_models) ? summary.image_gen_models.length : 0;
      const tts = summary.tts_model ? 1 : 0;
      return chat + vision + asr + imageGen + tts;
    },

    async claimOpenClaw() {
      if (this.openclawClaiming) return;
      this.openclawClaiming = true;
      this.openclawClaimError = '';
      try {
        const claim = await this.callTool('openclaw', { action: 'claim' });
        if (claim._err) {
          this.openclawClaimError = claim._err;
          return;
        }
        const claimedCount = this.openClawSummaryCount(claim.claimed);
        if (claimedCount === 0) {
          const issues = Array.isArray(claim.issues) ? claim.issues : [];
          this.openclawClaimError = issues.join(' | ') || 'openclaw claim failed';
          return;
        }
        const sync = await this.callTool('openclaw', { action: 'sync' });
        if (sync._err) {
          this.openclawClaimError = sync._err;
          return;
        }
        await this.pollSystemStatus();
      } finally {
        this.openclawClaiming = false;
      }
    },

    mergeSupportState(data) {
      const next = Object.assign({}, this.supportState || {});
      if (data.enabled !== undefined) next.enabled = data.enabled === true;
      if (data.endpoint !== undefined) next.endpoint = data.endpoint || '';
      if (data.registered !== undefined) next.registered = data.registered === true;
      if (data.device_id !== undefined) next.deviceId = data.device_id || '';
      if (data.referral_code !== undefined) next.referralCode = data.referral_code || '';
      if (data.share_text !== undefined) next.shareText = data.share_text || '';
      if (data.max_tasks !== undefined) next.maxTasks = Number(data.max_tasks || 0);
      if (data.used_tasks !== undefined) next.usedTasks = Number(data.used_tasks || 0);
      if (data.budget_usd !== undefined) next.budgetUSD = Number(data.budget_usd || 0);
      if (data.spent_usd !== undefined) next.spentUSD = Number(data.spent_usd || 0);
      if (data.budget_status !== undefined) next.budgetStatus = data.budget_status || '';
      if (data.is_bound !== undefined) next.isBound = data.is_bound === true;
      if (data.referral_count !== undefined) next.referralCount = Number(data.referral_count || 0);
      if (data.needs_browser_confirmation !== undefined) next.needsBrowserConfirmation = data.needs_browser_confirmation === true;
      if (data.reauth_method !== undefined) next.reauthMethod = data.reauth_method || '';
      if (data.detail !== undefined) next.browserConfirmDetail = data.detail || '';
      if (data.user_code !== undefined) next.browserConfirmUserCode = data.user_code || '';
      if (data.device_code !== undefined) next.browserConfirmDeviceCode = data.device_code || '';
      if (data.verification_uri !== undefined) next.verificationURI = data.verification_uri || '';
      if (data.verification_uri_complete !== undefined) next.verificationURIComplete = data.verification_uri_complete || '';
      if (data.expires_in !== undefined) next.browserExpiresIn = Number(data.expires_in || 0);
      if (data.interval !== undefined) next.browserInterval = Number(data.interval || 0);
      if (data.active_task !== undefined) {
        next.activeTask = data.active_task || null;
      } else if (data.task_id || data.task_status || data.task_target) {
        next.activeTask = {
          task_id: data.task_id || '',
          status: data.task_status || '',
          target: data.task_target || ''
        };
      }
      if (data.last_task !== undefined) next.lastTask = data.last_task || null;
      if (data.last_message !== undefined) next.lastMessage = data.last_message || null;
      if (data.messages !== undefined) next.messages = Array.isArray(data.messages) ? data.messages : [];
      if ((next.registered || next.deviceId) && !next.needsBrowserConfirmation) {
        next.needsBrowserConfirmation = false;
        next.reauthMethod = '';
        next.browserConfirmDetail = '';
        next.browserConfirmUserCode = '';
        next.browserConfirmDeviceCode = '';
        next.verificationURI = '';
        next.verificationURIComplete = '';
        next.browserExpiresIn = 0;
        next.browserInterval = 0;
      }
      return next;
    },

    supportTaskSignature(task) {
      if (!task) return '';
      return [
        task.task_id || '',
        task.status || '',
        task.target || ''
      ].join('|');
    },

    rememberSupportResult(data) {
      if (!data || typeof data !== 'object') return;
      this.supportState = this.mergeSupportState(data);
      if (data.needs_browser_confirmation) {
        this.supportBrowserConfirmation = {
          detail: data.detail || '',
          userCode: data.user_code || '',
          deviceCode: data.device_code || '',
          verificationURI: data.verification_uri || '',
          verificationURIComplete: data.verification_uri_complete || '',
          expiresIn: Number(data.expires_in || 0),
          interval: Number(data.interval || 0)
        };
        this.startSupportBrowserWaitTimer();
      } else if (data.registered || this.supportState.registered) {
        this.supportBrowserConfirmation = null;
        this.supportPagePrompt = null;
        this.supportPageConnecting = false;
        this.clearSupportBrowserWaitTimer();
      }
      if (data.enabled !== undefined || data.registered !== undefined) {
        this.supportConnected = data.enabled === true && data.registered === true;
      }
      if (data.registered === true && data.device_id) {
        this._supportSeen.connection = data.device_id;
        this._supportPageSeen.connection = data.device_id;
      }
      if (data.task_id || data.task_status || data.task_target) {
        const taskSig = this.supportTaskSignature({
          task_id: data.task_id || '',
          status: data.task_status || '',
          target: data.task_target || ''
        });
        this._supportSeen.activeTask = taskSig;
        this._supportPageSeen.activeTask = taskSig;
      }
    },

    supportBrowserConfirmationText() {
      const data = this.supportBrowserConfirmation || this.supportState;
      if (!data) return '';
      const lines = [
        '这台设备需要先在浏览器里确认恢复已有凭据。',
        '请打开下面的确认链接，登录后完成确认。',
      ];
      if (data.userCode || data.browserConfirmUserCode) {
        lines.push('用户码: ' + (data.userCode || data.browserConfirmUserCode));
      }
      if (data.deviceCode || data.browserConfirmDeviceCode) {
        lines.push('设备流 ID: ' + (data.deviceCode || data.browserConfirmDeviceCode));
      }
      lines.push('确认完成后，本页面会自动继续。');
      return lines.join('\n');
    },

    supportBrowserConfirmationURL() {
      const data = this.supportBrowserConfirmation || this.supportState || {};
      return data.verificationURIComplete || data.verification_uri_complete || '';
    },

    clearSupportBrowserWaitTimer() {
      if (this.supportBrowserWaitTimer) {
        clearInterval(this.supportBrowserWaitTimer);
        this.supportBrowserWaitTimer = null;
      }
    },

    startSupportBrowserWaitTimer() {
      if (this.supportBrowserWaitTimer) return;
      this.supportBrowserWaitTimer = setInterval(async () => {
        if (!this.supportWaitingBrowserConfirmation()) {
          this.clearSupportBrowserWaitTimer();
          return;
        }
        await this.pollSystemStatus();
      }, 1000);
    },

    async openSupportBrowserConfirmation() {
      const url = this.supportBrowserConfirmationURL();
      if (!url) return;
      this.startSupportBrowserWaitTimer();
      window.open(url, '_blank', 'noopener');
    },

    supportWaitingBrowserConfirmation() {
      if (this.supportConnected || (this.supportState && this.supportState.registered)) {
        return false;
      }
      return !!(this.supportBrowserConfirmation && this.supportBrowserConfirmation.deviceCode) ||
        !!(this.supportState && this.supportState.needsBrowserConfirmation);
    },

    syncSupportMessages() {
      const support = this.supportState || {};
      let changed = false;

      // Process in-memory message log (seq-based, no messages lost)
      const msgs = support.messages || [];
      const seenSeq = this._supportSeen.msgSeq || 0;
      for (const m of msgs) {
        if (!m.seq || m.seq <= seenSeq) continue;
        this._supportSeen.msgSeq = m.seq;
        const msg = (m.message || '').trim();
        if (!msg) continue;

        // Format based on type
        let prefix = '[support] ';
        if (m.type === 'command_intent') prefix = '[running] ';
        else if (m.type === 'notification') prefix = '';
        else if (m.type === 'task_completion') prefix = '[task] ';
        else if (m.type === 'info_request') prefix = '[question] ';
        else if (m.type === 'choice') prefix = '[choice] ';
        else if (m.type === 'approval') prefix = '[approval] ';

        this.messages.push({ role: 'ai', text: prefix + msg });
        changed = true;
      }

      // Track active task changes (for task status updates not covered by message log)
      const activeSig = this.supportTaskSignature(support.activeTask);
      if (activeSig && activeSig !== this._supportSeen.activeTask) {
        const task = support.activeTask;
        let text = 'Support task active: ' + (task.task_id || 'pending');
        if (task.status) text += ' (' + task.status + ')';
        if (task.target) text += ' - ' + task.target;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.activeTask = activeSig;
        changed = true;
      } else if (!activeSig) {
        this._supportSeen.activeTask = '';
      }

      // Track task completion
      const lastTaskSig = this.supportTaskSignature(support.lastTask);
      if (lastTaskSig && lastTaskSig !== this._supportSeen.lastTask) {
        const task = support.lastTask;
        let text = 'Support task ' + (task.task_id || 'pending') + ' finished';
        if (task.status) text += ': ' + task.status;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.lastTask = lastTaskSig;
        changed = true;
      }

      // Track initial connection (only if no messages from log yet)
      const connectionSig = support.enabled && support.registered && support.deviceId ? support.deviceId : '';
      if (connectionSig && connectionSig !== this._supportSeen.connection && !activeSig && !lastTaskSig && msgs.length === 0) {
        this.messages.push({ role: 'ai', text: '灵机云已连接：' + support.deviceId });
        this._supportSeen.connection = connectionSig;
        changed = true;
      }

      if (changed) {
        this.scrollChat();
      }
    },

    primeSupportPageSeen() {
      if (this._supportPageSeen.initialized) return;
      this._supportPageSeen.initialized = true;
      if (this.supportState.deviceId) this._supportPageSeen.connection = this.supportState.deviceId;
      if (this.supportState.activeTask) this._supportPageSeen.activeTask = this.supportTaskSignature(this.supportState.activeTask);
      if (this.supportState.lastTask) this._supportPageSeen.lastTask = this.supportTaskSignature(this.supportState.lastTask);
      const msgs = this.supportState.messages || [];
      if (msgs.length > 0) this._supportPageSeen.msgSeq = msgs[msgs.length - 1].seq || 0;
    },

    appendSupportPageMessage(text, type) {
      const msg = String(text || '').trim();
      if (!msg) return;
      const kind = type || 'info';
      if (kind === 'browser_confirmation') {
        this.removeSupportPageMessagesByType('browser_confirmation');
      }
      const tail = this.supportPageFeed[this.supportPageFeed.length - 1];
      if (tail && tail.type === kind && tail.text === msg) {
        this.scrollSupportPage();
        return;
      }
      this._supportPageLocalSeq += 1;
      this.supportPageFeed.push({
        id: 'support-local-' + this._supportPageLocalSeq,
        text: msg,
        type: kind
      });
      this.scrollSupportPage();
    },

    removeSupportPageMessagesByType(type) {
      this.supportPageFeed = this.supportPageFeed.filter(entry => entry.type !== type);
    },

    scrollSupportPage() {
      this.$nextTick(() => {
        const el = this.$refs.supportMsgList;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    syncSupportPageUpdates() {
      if (!this._supportPageSeen.initialized) return;

      const support = this.supportState || {};
      const msgs = support.messages || [];
      const seenSeq = this._supportPageSeen.msgSeq || 0;
      for (const m of msgs) {
        if (!m.seq || m.seq <= seenSeq) continue;
        this._supportPageSeen.msgSeq = m.seq;
        const msg = (m.message || m.content || '').trim();
        if (!msg) continue;
        this.appendSupportPageMessage(msg, m.type || 'info');
      }

      const activeSig = this.supportTaskSignature(support.activeTask);
      if (activeSig && activeSig !== this._supportPageSeen.activeTask) {
        const task = support.activeTask;
        let text = 'Support task active: ' + (task.task_id || 'pending');
        if (task.status) text += ' (' + task.status + ')';
        if (task.target) text += ' - ' + task.target;
        this.appendSupportPageMessage(text, 'command_intent');
        this._supportPageSeen.activeTask = activeSig;
        this.supportPageAwaitingDescription = false;
      } else if (!activeSig) {
        this._supportPageSeen.activeTask = '';
      }

      const lastTaskSig = this.supportTaskSignature(support.lastTask);
      if (lastTaskSig && lastTaskSig !== this._supportPageSeen.lastTask) {
        const task = support.lastTask;
        let text = 'Support task ' + (task.task_id || 'pending') + ' finished';
        if (task.status) text += ': ' + task.status;
        this.appendSupportPageMessage(text, 'task_completion');
        this._supportPageSeen.lastTask = lastTaskSig;
      }

      const connectionSig = support.enabled && support.registered && support.deviceId
        ? support.deviceId + '|' + (support.isBound ? 'bound' : 'unbound')
        : '';
      if (connectionSig && connectionSig !== this._supportPageSeen.connection) {
        this.appendSupportPageMessage(this.formatSupportLinkedMessage({
          device_id: support.deviceId,
          budget_usd: support.budgetUSD,
          spent_usd: support.spentUSD,
          max_tasks: support.maxTasks,
          used_tasks: support.usedTasks,
          is_bound: support.isBound,
          referral_code: support.referralCode
        }), 'complete');
        if (!support.activeTask) {
          this.supportPageAwaitingDescription = true;
        }
        this._supportPageSeen.connection = connectionSig;
      }
    },

    supportPageTypeClass(type) {
      switch (type) {
        case 'command_intent':
          return 'command';
        case 'task_completion':
          return 'complete';
        case 'info_request':
          return 'question';
        case 'browser_confirmation':
          return 'question';
        case 'choice':
          return 'info';
        case 'approval':
          return 'approval';
        case 'error':
          return 'error';
        default:
          return 'info';
      }
    },

    supportPageTypeLabel(type) {
      switch (type) {
        case 'command_intent':
          return 'run';
        case 'task_completion':
          return 'task';
        case 'info_request':
          return 'ask';
        case 'browser_confirmation':
          return 'confirm';
        case 'choice':
          return 'you';
        case 'approval':
          return 'approval';
        case 'error':
          return 'error';
        default:
          return 'info';
      }
    },

    supportManifestLocale() {
      return this.lang === 'zh' ? 'zh_cn' : 'en_us';
    },

    supportManifestText(value, fallback) {
      if (!value) return fallback || '';
      if (typeof value === 'string') return value || fallback || '';
      const locale = this.supportManifestLocale();
      return value[locale] || value.text || value.en_us || value.zh_cn || fallback || '';
    },

    supportManifestBlock(id) {
      const blocks = this.supportManifest && this.supportManifest.blocks;
      if (!blocks || typeof blocks !== 'object') return null;
      return blocks[id] || null;
    },

    supportManifestOnboarding(key) {
      const onboarding = this.supportManifest && this.supportManifest.onboarding;
      if (!onboarding || typeof onboarding !== 'object') return null;
      return onboarding[key] || null;
    },

    supportTaskMenuBlock() {
      return this.supportManifestBlock('task_menu');
    },

    supportTaskMenuTitle() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.title, this.t('support_connect'));
    },

    supportTaskMenuSubtitle() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.subtitle, this.t('support_desc'));
    },

    supportTaskMenuPrompt() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.prompt, this.t('support_enter_desc'));
    },

    supportTaskMenuFooter() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.footer, '');
    },

    supportTaskMenuFreeformHint() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.freeform_hint, 'Examples');
    },

    supportTaskMenuSecretWarning() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.secret_warning, '');
    },

    supportTaskMenuOptions() {
      const block = this.supportTaskMenuBlock();
      return Array.isArray(block && block.options) ? block.options : [];
    },

    supportTaskMenuExamples() {
      const block = this.supportTaskMenuBlock();
      return Array.isArray(block && block.context && block.context.freeform_examples) ? block.context.freeform_examples : [];
    },

    supportTaskMenuGuidedFlow(key) {
      if (!key) return null;
      const block = this.supportTaskMenuBlock();
      const flows = block && block.context && block.context.guided_flows;
      if (!flows || typeof flows !== 'object') return null;
      return flows[key] || null;
    },

    supportInvitePromptText() {
      return this.supportManifestText(this.supportManifestOnboarding('invite_prompt'), this.t('support_enter_invite'));
    },

    supportRecoveryPromptText() {
      const manifestText = this.supportManifestText(this.supportManifestOnboarding('recovery_prompt'), '');
      const localText = this.t('support_enter_recovery');
      if (manifestText) return manifestText + '\n\n' + localText;
      return localText;
    },

    supportDisconnectLabel() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.disconnect_option_label, this.t('support_disconnect'));
    },

    supportEntryLabel() {
      return this.t('support_entry');
    },

    supportTaskCompletionBlock() {
      return this.supportManifestBlock('task_completion');
    },

    supportTaskCompletionText(key, fallback) {
      const block = this.supportTaskCompletionBlock();
      return this.supportManifestText(block && block.context && block.context[key], fallback || '');
    },

    supportSummaryVisible() {
      return !!(this.supportState.deviceId || this.supportState.referralCode || this.supportState.shareText || this.supportState.maxTasks > 0 || this.supportState.budgetUSD > 0 || this.supportConnected);
    },

    supportBindActionLabel() {
      if (this.supportState.isBound) return this.t('support_open_workspace');
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.bind_option_label, this.t('support_bind'));
    },

    supportBindSummaryText() {
      if (!this.supportState.deviceId && !this.supportConnected) return this.t('support_connecting');
      if (this.supportState.isBound) return this.t('support_bound');
      return this.t('support_unbound');
    },

    supportBudgetTasksLabel() {
      return this.supportTaskCompletionText('budget_tasks_label', this.t('support_task_budget'));
    },

    supportBudgetAmountLabel() {
      return this.supportTaskCompletionText('budget_amount_label', this.t('support_amount_budget'));
    },

    supportBudgetRemainingLabel() {
      return this.supportTaskCompletionText('budget_remaining_label', this.t('support_tasks_remaining'));
    },

    supportTaskBudgetValue() {
      if (this.supportState.maxTasks > 0) return this.supportState.usedTasks + ' / ' + this.supportState.maxTasks;
      return this.t('support_budget_pending');
    },

    supportBudgetAmountSummary() {
      const parts = [];
      if (this.supportState.budgetUSD > 0) {
        parts.push(this.supportBudgetAmountLabel() + ': ' + this.fmtUSD(this.supportState.spentUSD) + ' / ' + this.fmtUSD(this.supportState.budgetUSD));
      }
      if (this.supportState.maxTasks > 0) {
        parts.push(this.supportBudgetRemainingLabel() + ': ' + Math.max(this.supportState.maxTasks - this.supportState.usedTasks, 0));
      }
      return parts.join(' · ') || this.t('support_budget_pending');
    },

    supportShareHeading() {
      return this.supportTaskCompletionText('share_heading', this.t('support_share_heading'));
    },

    supportShareURL() {
      const text = String(this.supportState.shareText || '').trim();
      if (!text) return '';
      const match = text.match(/https?:\/\/[^\s'"`]+/);
      return match ? match[0] : '';
    },

    supportSharePrimaryValue() {
      const shareURL = this.supportShareURL();
      if (shareURL) return shareURL;
      if (this.supportState.referralCode) return this.supportState.referralCode;
      if (this.supportState.shareText) return this.t('support_share_ready');
      return '—';
    },

    supportShareMetaText() {
      const parts = [];
      if (this.supportState.referralCode) parts.push(this.t('support_referral_code') + ': ' + this.supportState.referralCode);
      if (this.supportState.referralCount > 0) parts.push(this.t('support_referrals') + ': ' + this.supportState.referralCount);
      if (this.supportState.shareText) parts.push(this.t('support_share_ready'));
      return parts.join(' · ') || this.t('support_share_empty');
    },

    supportCopyShareLabel() {
      return this.t('support_share_copy');
    },

    supportCanBind() {
      return !!this.supportBindingURL();
    },

    supportPublicBaseURL() {
      const context = this.supportManifest && this.supportManifest.context;
      let base = context && context.public_base_url ? String(context.public_base_url) : '';
      if (!base) base = String(this.supportState.endpoint || '');
      if (!base) return '';
      return base
        .replace(/\/+$/, '')
        .replace(/\/platform\/api\/v1$/, '')
        .replace(/\/api\/v1$/, '')
        .replace(/\/platform$/, '');
    },

    supportBindingURL() {
      const base = this.supportPublicBaseURL();
      return base ? base + '/link' : '';
    },

    openSupportBinding() {
      const url = this.supportBindingURL();
      if (!url) return;
      window.open(url, '_blank', 'noopener');
    },

    async copySupportShareText() {
      const text = String(this.supportState.shareText || this.supportShareURL() || this.supportState.referralCode || '').trim();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        this.appendSupportPageMessage(this.supportTaskCompletionText('copied_notice', this.t('support_share_copied')), 'info');
      } catch (e) {
        this.supportPageError = (e && e.message) ? e.message : 'clipboard unavailable';
      }
    },

    supportPageShowTaskMenu() {
      return !this.supportPagePrompt && !this.supportState.activeTask && !this.supportWaitingBrowserConfirmation();
    },

    supportPageEmptyStateText() {
      if (this.supportPageConnecting) return this.t('support_connecting');
      if (this.supportWaitingBrowserConfirmation()) return '等待浏览器确认中...';
      return this.supportTaskMenuSubtitle() || this.t('support_desc');
    },

    applySupportTaskOption(option) {
      const key = option && (option.value || option.id);
      const guided = this.supportTaskMenuGuidedFlow(key);
      const step = guided && Array.isArray(guided.steps) && guided.steps.length > 0 ? guided.steps[0] : null;
      const defaultAnswer = this.supportManifestText(step && step.default_answer, '');
      const optionLabel = this.supportManifestText(option && option.label, '');

      this.supportPageGuidedHint = this.supportManifestText(step && step.prompt, '');
      if (defaultAnswer) {
        this.supportPageDesc = defaultAnswer;
      } else if (!step) {
        this.supportPageDesc = optionLabel;
      } else {
        this.supportPageDesc = '';
      }
      if (this.supportConnected && !this.supportState.activeTask) {
        this.supportPageAwaitingDescription = true;
      }
      this.focusSupportInput();
    },

    applySupportExample(example) {
      this.supportPageDesc = this.supportManifestText(example, '');
      this.supportPageGuidedHint = '';
      if (this.supportConnected && !this.supportState.activeTask) {
        this.supportPageAwaitingDescription = true;
      }
      this.focusSupportInput();
    },

    formatSupportLinkedMessage(result) {
      const lines = ['灵机云已连接'];
      if (result && result.device_id) {
        lines.push('设备 ID: ' + result.device_id);
      }
      if (result && result.budget_usd > 0) {

    isDeployableModel(model) {
      if (!model || !model.name) return false;
      const type = String(model.type || '').toLowerCase();
      const format = String(model.format || '').toLowerCase();
      const modelClass = String(model.model_class || '').toLowerCase();
      if (type === 'llm' || type === 'embedding') return true;
      if ((type === 'asr' || type === 'tts') && modelClass === 'pipeline') return true;
      if (format === 'gguf') return true;
      if (format === 'safetensors' && (modelClass === 'dense' || modelClass === 'moe' || modelClass === 'hybrid')) return true;
      if (format === 'onnx' && modelClass === 'pipeline') return true;
      if (format === 'mnn' && modelClass === 'pipeline') return true;
      return false;
    },

    deployableModels() {
      return this.models.filter(m => this.isDeployableModel(m));
    },

    componentModels() {
      return this.models.filter(m => !this.isDeployableModel(m));

      if (type === 'vad') return this.lang === 'zh' ? '语音活动检测组件，用于语音流水线' : 'VAD component used by speech pipelines';

    modelDeployButtonDisabled(modelName) {

    async deployModel(modelName) {
      if (!modelName || this.modelDeployButtonDisabled(modelName)) return;

      this.modelDeploying = { ...this.modelDeploying, [modelName]: true };
      this.messages.push({ role: 'system', text: 'Deploying ' + modelName + ' with local assets only...' });
      this.scrollChat();

      try {
        const data = await this.callTool('deploy.run', { model: modelName, no_pull: true });
        if (!data || data._err) {
          const errMsg = data && data._err ? data._err : 'tool returned no data';
          this.messages.push({ role: 'error', text: 'Deploy ' + modelName + ' failed: ' + errMsg });
          return;
        }
        const address = data && data.address ? data.address : '';
        this.messages.push({
          role: 'system',
          text: address ? ('Deploy ' + modelName + ' ready at ' + address + '.') : ('Deploy ' + modelName + ' started.')
        });
      } finally {
        const next = { ...this.modelDeploying };
        delete next[modelName];
        this.modelDeploying = next;
        await this.pollDeployments();
        this.scrollChat();
      }
    },

    async stopDeployment(deploymentName) {
      if (!deploymentName || this.deploymentStopping[deploymentName]) return;

      this.deploymentStopping = { ...this.deploymentStopping, [deploymentName]: true };
      this.messages.push({ role: 'system', text: (this.lang === 'zh' ? '正在停止部署 ' : 'Stopping deployment ') + deploymentName + '...' });
      this.scrollChat();

      try {
        const data = await this.callTool('deploy.delete', { name: deploymentName });
        if (data && data._err) {
          this.messages.push({ role: 'error', text: (this.lang === 'zh' ? '停止 ' : 'Stop ') + deploymentName + (this.lang === 'zh' ? ' 失败: ' : ' failed: ') + data._err });
          return;
        }
        this.messages.push({ role: 'system', text: (this.lang === 'zh' ? '已停止部署 ' : 'Stopped deployment ') + deploymentName + '.' });
      } finally {
        const next = { ...this.deploymentStopping };
        delete next[deploymentName];
        this.deploymentStopping = next;
        await this.pollDeployments();
        this.scrollChat();
      }
    },

    async pollDeployments() {
      const data = await this.callTool('deploy.list');
      if (!data || data._err) return;
      const list = Array.isArray(data) ? data : [];
      const hasStarting = list.some(d => d.phase === 'starting' || (d.phase === 'running' && !d.ready));
      const nextDeployments = list.map(d => {
        let eta = '';
        if (d.estimated_total_s && d.startup_progress > 0 && d.startup_progress < 100) {
          const elapsed = d.estimated_total_s * d.startup_progress / 100;
          const remaining = Math.max(0, d.estimated_total_s - elapsed);
          eta = remaining >= 60 ? Math.ceil(remaining / 60) + 'm' : Math.ceil(remaining) + 's';
        }
        return {
          name: d.name || 'unknown',
          model: (d.labels && d.labels['aima.dev/model']) || '',
          phase: d.phase || 'unknown',
          ready: d.ready || false,
          address: d.address || '',
          detail: [d.runtime, d.ready ? d.address : d.phase].filter(Boolean).join(' '),
          startup_phase: d.startup_phase || '',
          startup_progress: d.startup_progress || 0,
          startup_message: d.startup_message || '',
          error_lines: d.error_lines || '',
          failure_detail: this.summarizeDeploymentFailure(d),
          eta
        };
      });
      nextDeployments.sort((a, b) => {
        const rank = dep => {
          if (dep.phase === 'running' && dep.ready) return 0;
          if (dep.phase === 'starting' || (dep.phase === 'running' && !dep.ready)) return 1;
          if (dep.phase === 'failed') return 2;
          return 3;
        };
        const rankDiff = rank(a) - rank(b);
        if (rankDiff !== 0) return rankDiff;
        const nameA = (a.name || a.model || '').toLowerCase();
        const nameB = (b.name || b.model || '').toLowerCase();
        if (nameA !== nameB) return nameA.localeCompare(nameB);
        const addrA = (a.address || '').toLowerCase();
        const addrB = (b.address || '').toLowerCase();
        return addrA.localeCompare(addrB);
      });
      this.deployments = nextDeployments;
      // Adaptive polling: surface externally-triggered deploys quickly enough to show startup.
      this._adjustDeployPoll(hasStarting);
    },

    async scanDeployments() {
      if (this.deploymentScanning) return;
      this.deploymentScanning = true;
      this.messages.push({ role: 'system', text: this.lang === 'zh' ? '正在刷新运行中部署...' : 'Refreshing deployments...' });
      this.scrollChat();
      try {
        await Promise.all([
          this.pollDeployments(),
          this.pollSystemStatus()
        ]);
        this.messages.push({ role: 'system', text: this.lang === 'zh' ? '运行中部署已刷新。' : 'Deployments refreshed.' });
      } finally {
        this.deploymentScanning = false;
        this.scrollChat();
      }
    },

    _adjustDeployPoll(fast) {
      const want = fast ? 500 : 1000;
      if (this._deployPollMs === want) return;
      this._deployPollMs = want;
      if (this._deployTimer) clearInterval(this._deployTimer);
      this._deployTimer = setInterval(() => this.pollDeployments(), want);
