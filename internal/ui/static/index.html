<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AIMA</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
/* ===== CSS Variables (Apple-inspired Design System) ===== */
:root {
  /* Background - Elegant dark gradients */
  --bg-primary: #1d1d1f;
  --bg-secondary: #2d2d2d;
  --bg-tertiary: #3a3a3c;
  --bg-panel: rgba(45, 45, 45, 0.72);
  --bg-input: rgba(58, 58, 60, 0.85);
  --bg-deep: linear-gradient(180deg, #1d1d1f 0%, #0d0d0d 100%);

  /* Accent - Apple System Blue */
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --accent-dim: rgba(10, 132, 255, 0.25);
  --accent-glow: rgba(10, 132, 255, 0.12);
  --cyan: var(--accent);
  --cyan-bright: var(--accent-hover);
  --cyan-dim: var(--accent-dim);
  --cyan-glow: var(--accent-glow);

  /* Status Colors - Apple HIG */
  --success: #30d158;
  --warning: #ff9f0a;
  --error: #ff453a;
  --green: var(--success);
  --orange: var(--warning);
  --red: var(--error);

  /* Text - High contrast */
  --text: #f5f5f7;
  --text-dim: rgba(245, 245, 247, 0.55);
  --text-tertiary: rgba(245, 245, 247, 0.35);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --panel-radius: var(--radius-md);

  /* Animation */
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;

  /* Panel Styles */
  --panel-border: 1px solid var(--border-light);
  --panel-shadow:
    0 4px 24px rgba(0, 0, 0, 0.4),
    0 1px 2px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}
:root[data-theme="light"] {
  /* Use Apple's pure window background and soft page background */
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e5e5ea;
  --bg-panel: rgba(255,255,255,0.85);
  --bg-input: rgba(0, 0, 0, 0.04);
  --bg-deep: #f5f5f7;

  --accent: #007aff;
  --accent-hover: #0056b3;
  --accent-dim: rgba(0, 122, 255, 0.15);
  --accent-glow: rgba(0, 122, 255, 0.08);

  --text: #1d1d1f;
  --text-dim: rgba(29, 29, 31, 0.65);
  --text-tertiary: rgba(29, 29, 31, 0.45);

  --panel-border: 0.5px solid rgba(0, 0, 0, 0.1);
  --panel-shadow: 0 2px 10px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);

  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(0, 0, 0, 0.08);
  
  --btn-icon-hover: rgba(0, 0, 0, 0.05);
  --border-light: rgba(0, 0, 0, 0.06);
  --border-medium: rgba(0, 0, 0, 0.1);
  
  --sidebar-bg: transparent;
  
  --msg-user-bg: transparent;
  --msg-tool-bg: #f5f5f7;
  --msg-tool-hover: #e5e5ea;
  --msg-tool-content-bg: #f9f9f9;
  
  --gauge-bg: rgba(0, 0, 0, 0.06);
  --modal-bg: rgba(255, 255, 255, 0.95);
  --input-bg: rgba(0, 0, 0, 0.03);
  --input-focus-bg: #ffffff;
  --input-border-focus: #007aff;
}

:root {
  --glass-bg: rgba(29, 29, 31, 0.72);
  --glass-border: rgba(255, 255, 255, 0.15);
  --btn-icon-hover: rgba(255, 255, 255, 0.1);
  --border-light: rgba(255, 255, 255, 0.05);
  --border-medium: rgba(255, 255, 255, 0.1);
  --sidebar-bg: transparent;
  --msg-tool-bg: rgba(255, 255, 255, 0.04);
  --msg-tool-hover: rgba(255, 255, 255, 0.08);
  --msg-tool-content-bg: var(--bg-secondary);
  --gauge-bg: rgba(255, 255, 255, 0.08);
  --modal-bg: rgba(28, 28, 30, 0.85);
  --panel-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
  --input-bg: rgba(255, 255, 255, 0.05);
  --input-focus-bg: rgba(255, 255, 255, 0.08);
}


/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[x-cloak] { display: none !important; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text);
  font-size: 14px;
  letter-spacing: -0.01em;
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Layout ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: transparent;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  min-height: 52px;
  z-index: 100;
}
.topbar-logo {
  display: flex;
  align-items: center;
}
.topbar-logo-img {
  display: block;
  height: 20px;
  width: auto;
  object-fit: contain;
  border-radius: 4px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(48, 209, 88, 0.5); }
.status-dot.warn { background: var(--warning); box-shadow: 0 0 6px rgba(255, 159, 10, 0.45); }
.status-dot.offline { background: var(--error); box-shadow: 0 0 6px rgba(255, 69, 58, 0.5); }
.status-text { font-size: 12px; color: var(--text-tertiary); }
.btn-icon {
  background: var(--input-bg);
  border: none;
  color: var(--text-dim);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.btn-icon:hover {
  background: var(--btn-icon-hover);
  color: var(--text);
}

/* Language selector */
.lang-select {
  background: var(--input-bg);
  border: none;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.lang-select:hover { background: var(--btn-icon-hover); color: var(--text); }
.lang-select option {
  background: var(--bg-secondary);
  color: var(--text);
}

/* Main content area */
.main {
  display: grid;
  grid-template-columns: minmax(280px, 320px) minmax(0, 1fr) minmax(296px, 336px);
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* Side panels */
.sidebar-left, .sidebar-right {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-left {
  border-right: 0.5px solid var(--border-medium);
  background: transparent;
  padding: 16px;
  gap: 16px;
}
.sidebar-right {
  border-left: 0.5px solid var(--border-medium);
  background: transparent;
  padding: 16px;
  gap: 16px;
}

/* Panel card - subtle style */
.panel {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-medium);
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--panel-shadow, 0 4px 24px rgba(0, 0, 0, 0.2));
}
.fleet-panel {
  display: flex;
  flex-direction: column;
}
.panel-title {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Device identity in hardware panel */
.device-identity {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--border-medium);
}
.device-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.device-ip {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

.hardware-group {
  margin-top: 14px;
}
.hardware-group:first-of-type {
  margin-top: 0;
}
.hardware-group-title {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

/* Gauge bars */
.gauge { margin-bottom: 8px; }
.gauge-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.gauge-bar {
  height: 6px;
  background: var(--msg-tool-hover);
  border-radius: 3px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width var(--duration-slow) var(--ease-smooth);
}
.gauge-fill.warn {
  background: var(--warning);
}
.gauge-fill.crit {
  background: var(--error);
}

/* List items in panels */
.panel-list { list-style: none; }
.panel-list li {
  padding: 8px 0;
  font-size: 13px;
  font-family: var(--font-sans);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border-light);
}
.panel-list li:last-child { border-bottom: none; }
.panel-list .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green { background: var(--success); }
.dot-orange { background: var(--warning); }
.dot-red { background: var(--error); }
.dot-dim { background: var(--text-tertiary); }
.panel-list .item-detail {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: auto;
}
.model-list-item {
  display: flex;
  align-items: flex-start;
  min-width: 0;
  padding: 10px 0;
}
.model-list-item .dot {
  margin-top: 6px;
}
.model-entry {
  display: flex;
  flex: 1;
  min-width: 0;
  flex-direction: column;
  gap: 8px;
}
.model-entry-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  min-width: 0;
}
.model-entry-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.model-status-note {
  flex: 1;
  min-width: 0;
  font-size: 11px;
  line-height: 1.4;
  color: var(--text-dim);
}
.model-name {
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  overflow: hidden;
  white-space: normal;
  word-break: break-word;
  line-height: 1.35;
  font-weight: 500;
}
.model-size {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: right;
}
.model-deploy-btn {
  position: static;
  border: 0.5px solid var(--border-medium);
  background: var(--input-bg);
  color: var(--text);
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 11px;
  line-height: 1;
  font-family: var(--font-sans);
  cursor: pointer;
  flex-shrink: 0;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.model-deploy-btn:hover {
  background: var(--btn-icon-hover);
  border-color: var(--accent);
}
.model-deploy-btn:disabled {
  cursor: default;
  opacity: 0.55;
}
.panel-title-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.panel-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  height: 24px;
  padding: 0 10px;
  border: 0.5px solid var(--border-medium);
  border-radius: 999px;
  background: var(--input-bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.panel-action-btn:hover {
  background: var(--btn-icon-hover);
  border-color: var(--accent);
}
.panel-action-btn:disabled {
  cursor: default;
  opacity: 0.55;
}

/* Fleet device card */
.fleet-device {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.fleet-device:last-child { border-bottom: none; }
.fleet-device .name { font-family: var(--font-sans); font-weight: 500; }
.fleet-device .meta { font-size: 11px; color: var(--text-tertiary); }
.fleet-device.clickable {
  cursor: pointer;
  border-radius: 6px;
  padding: 8px;
  margin: 0 -8px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover {
  background: var(--btn-icon-hover);
}
.fleet-link-hint {
  font-size: 14px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover .fleet-link-hint {
  opacity: 1;
  color: var(--accent);
}
.fleet-scroll {
  max-height: clamp(160px, 34vh, 320px);
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-width: none;
  scrollbar-color: transparent transparent;
  padding-right: 4px;
  margin-right: -4px;
  min-height: 0;
}
.fleet-scroll::-webkit-scrollbar {
  width: 0;
}
.fleet-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.fleet-scroll::-webkit-scrollbar-thumb {
  background: transparent;
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.fleet-panel:hover .fleet-scroll,
.fleet-panel:focus-within .fleet-scroll {
  scrollbar-width: thin;
  scrollbar-color: var(--border-light) transparent;
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar {
  width: 8px;
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar-thumb,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar-thumb {
  background: var(--border-light);
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar-thumb:hover,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}

/* Agent info rows */
.agent-info-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 0.5px solid var(--border-light);
}
.agent-info-row:last-child { border-bottom: none; }
.agent-info-label {
  color: var(--text-tertiary);
  flex-shrink: 0;
  padding-top: 1px;
}
.agent-info-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  max-width: 176px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}
.agent-info-value.wrap {
  font-family: var(--font-sans);
  font-size: 12px;
  line-height: 1.45;
  white-space: normal;
  word-break: break-word;
  overflow: visible;
  text-overflow: clip;
}
.agent-info-value.wrap-mono {
  line-height: 1.45;
  white-space: normal;
  word-break: break-word;
  overflow: visible;
  text-overflow: clip;
}
.agent-info-value.clickable {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: transparent;
  transition: text-decoration-color var(--duration-fast) var(--ease-smooth);
}
.agent-info-value.clickable:hover { text-decoration-color: var(--accent); }
.agent-status-note {
  margin-top: 12px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-dim);
}

/* ===== Center: Agent Chat ===== */
.center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: transparent;
  min-width: 0;
  min-height: 0;
}

.chat-view {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* Agent header - minimal Claude Code style */
.agent-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--border-medium);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  z-index: 10;
}
.agent-header-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.agent-avatar {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  display: block;
  object-fit: contain;
  border-radius: 8px;
  opacity: 1;
}
.agent-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.agent-name {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.agent-mode {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 5px;
}
.agent-header-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.agent-onboarding-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 7px 11px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border-medium);
  border-radius: 999px;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.agent-onboarding-btn:hover,
.agent-onboarding-btn:focus-visible {
  color: var(--text);
  border-color: var(--text-tertiary);
  background: var(--input-bg);
}
.agent-support-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-sans);
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(10, 132, 255, 0.35);
  border-radius: 999px;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.agent-support-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.agent-support-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.agent-support-btn.connected {
  color: var(--success);
  border-color: rgba(48, 209, 88, 0.45);
  background: rgba(48, 209, 88, 0.12);
}
.agent-support-btn.connected:hover,
.agent-support-btn.connected.active {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}
.agent-support-btn .support-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.onboarding-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 140;
}
.onboarding-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(440px, 100vw);
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-medium);
  box-shadow: -20px 0 36px rgba(0, 0, 0, 0.28);
  display: flex;
  flex-direction: column;
  z-index: 141;
}
.onboarding-drawer-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  padding: 18px 20px 12px;
  border-bottom: 0.5px solid var(--border-medium);
}
.onboarding-drawer-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.onboarding-drawer-subtitle {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-dim);
}
.onboarding-close-btn {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border-medium);
  background: transparent;
  color: var(--text-dim);
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
}
.onboarding-close-btn:hover {
  color: var(--text);
  background: var(--input-bg);
}
.onboarding-tabs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 6px;
  padding: 12px 20px;
  border-bottom: 0.5px solid var(--border-medium);
}
.onboarding-tabs button {
  border: 1px solid var(--border-medium);
  background: transparent;
  color: var(--text-dim);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
}
.onboarding-tabs button.active {
  color: var(--text);
  border-color: var(--accent);
  background: var(--accent-dim);
}
.onboarding-drawer-body {
  padding: 16px 20px 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.onboarding-loading {
  font-size: 13px;
  color: var(--text-dim);
}
.onboarding-error {
  font-size: 13px;
  color: var(--error);
}
.onboarding-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.onboarding-steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.onboarding-step {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: var(--panel-border);
  background: var(--bg-panel);
}
.onboarding-command-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.onboarding-command-btn {
  width: 100%;
  border: var(--panel-border);
  background: var(--bg-panel);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.onboarding-command-btn:hover {
  border-color: rgba(10, 132, 255, 0.35);
  background: var(--input-bg);
}
.onboarding-command-btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}
.onboarding-run-btn {
  border-color: rgba(10, 132, 255, 0.45);
}
.onboarding-command-btn strong {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.onboarding-command-btn span {
  font-size: 12px;
  color: var(--text-dim);
}

/* Chat messages - refined typography */
.chat-messages {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding: 24px 32px;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
}
.chat-messages::-webkit-scrollbar { width: 8px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.chat-messages::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}

.msg {
  display: flex;
  align-items: flex-start;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 800px;
  margin-bottom: 12px;
}
.msg:last-child {
  margin-bottom: 0;
}
.msg-prefix {
  font-weight: 500;
  margin-right: 6px;
  user-select: none;
  flex-shrink: 0;
}
.msg-text {
  flex: 1;
}
.msg-user .msg-prefix { color: var(--accent); opacity: 0.5; }
.msg-user .msg-text { color: var(--text); }
.msg-ai .msg-prefix { color: var(--success); opacity: 0.6; }
.msg-ai .msg-text { color: var(--text); }
.msg-error .msg-text { color: var(--error); }
.msg-system .msg-text { color: var(--text-tertiary); font-style: italic; font-size: 12px; }

/* Tool call display - Claude Code style indicator lights */
.msg-tool {
  margin: 4px 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.msg-tool-header {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 4px;
  background: var(--msg-tool-bg);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.msg-tool-header:hover {
  background: var(--msg-tool-hover);
}
.msg-tool-indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  flex-shrink: 0;
}
.msg-tool-indicator.running {
  background: rgba(10, 132, 255, 0.2);
  color: var(--accent);
  animation: indicatorPulse 1.2s ease-in-out infinite;
}
.msg-tool-indicator.running::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: indicatorDot 1.2s ease-in-out infinite;
}
.msg-tool-indicator.success {
  background: rgba(48, 209, 88, 0.2);
  color: var(--success);
}
.msg-tool-indicator.success::after {
  content: '✓';
}
.msg-tool-indicator.error {
  background: rgba(255, 69, 58, 0.2);
  color: var(--error);
}
.msg-tool-indicator.error::after {
  content: '✗';
}
@keyframes indicatorPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.95); }
}
@keyframes indicatorDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.msg-tool-name {
  color: var(--text);
  font-weight: 500;
  font-family: var(--font-mono);
}
.msg-tool-duration {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-left: 4px;
}
.msg-tool-expand {
  font-size: 10px;
  color: var(--text-tertiary);
  transition: transform var(--duration-fast) var(--ease-smooth);
  margin-left: auto;
}
.msg-tool.expanded .msg-tool-expand {
  transform: rotate(90deg);
}
.msg-tool-content {
  display: none;
  margin-top: 8px;
  margin-left: 28px;
  padding: 12px 16px;
  background: var(--msg-tool-content-bg);
  border-radius: 12px;
  border: 0.5px solid var(--border-medium);
  font-size: 12px;
  color: var(--text-dim);
  overflow-x: auto;
  max-width: 100%;
}
.msg-tool.expanded .msg-tool-content {
  display: block;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
.msg-tool-args {
  margin-bottom: 6px;
}
.msg-tool-args strong {
  color: var(--text-tertiary);
  font-weight: 500;
}
.msg-tool-result {
  border-top: 1px solid var(--border-light);
  padding-top: 6px;
  margin-top: 6px;
}
.msg-tool-result.success {
  color: var(--success);
  opacity: 0.9;
}
.msg-tool-result.error {
  color: var(--error);
}
.msg-tool pre {
  margin: 4px 0 0 0;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Welcome/empty state */
.chat-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 24px;
  text-align: center;
}
.chat-welcome-icon {
  font-size: 32px;
  margin-bottom: 16px;
  opacity: 0.6;
}
.chat-welcome-title {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  color: var(--text);
  margin-bottom: 8px;
}
.chat-welcome-hint {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.4;
  max-width: 320px;
}

/* Thinking indicator */
.thinking {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 12px;
  animation: thinkingPulse 1.5s ease-in-out infinite;
  margin-bottom: 16px;
  letter-spacing: 2px;
}
@keyframes thinkingPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* Chat input - clean minimal style */
.chat-mode-strip {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 24px 0;
  flex-shrink: 0;
}
.chat-mode-note {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-dim);
}
.chat-mode-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}
.chat-shortcut-btn {
  border: 0.5px solid var(--border-medium);
  background: var(--input-bg);
  color: var(--text-dim);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.chat-shortcut-btn:hover,
.chat-shortcut-btn:focus-visible {
  color: var(--text);
  background: var(--btn-icon-hover);
  border-color: var(--accent);
}
.chat-input-wrap {
  display: flex;
  align-items: center;
  padding: 16px 24px;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  gap: 12px;
}
.chat-prompt {
  color: var(--accent);
  opacity: 0.6;
  font-family: var(--font-mono);
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}
.chat-hint {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.chat-hint-btn {
  width: 18px;
  height: 18px;
  padding: 0;
  border-radius: 50%;
  border: 1.5px solid var(--text-tertiary);
  background: transparent;
  appearance: none;
  -webkit-appearance: none;
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-sans);
  line-height: 1;
  text-align: center;
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.chat-hint-btn:hover,
.chat-hint-btn[aria-expanded="true"] {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}
.chat-hint-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.chat-hint-popup {
  display: block;
  position: absolute;
  bottom: calc(100% + 10px);
  left: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-medium);
  border-radius: 10px;
  padding: 12px 16px;
  width: 280px;
  max-width: calc(100vw - 48px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  z-index: 100;
  text-align: left;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  white-space: normal;
}
.chat-hint-popup::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 9px;
  border: 6px solid transparent;
  border-top-color: var(--border-medium);
}
.chat-hint-popup code {
  background: var(--msg-tool-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.chat-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border-medium);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  outline: none;
  padding: 10px 16px;
  line-height: 1.5;
  transition: all 0.2s ease;
}
.chat-input:focus {
  background: var(--msg-tool-hover);
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-send {
  background: var(--accent);
  border: none;
  color: white;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    opacity var(--duration-fast) var(--ease-smooth),
    transform var(--duration-fast) var(--ease-spring);
}
.chat-send:hover:not(:disabled) {
  background: var(--accent-hover);
}
.chat-send:active:not(:disabled) {
  transform: scale(0.96);
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ===== Bottom bar ===== */
.bottombar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 24px;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  font-size: 11px;
  min-height: 36px;
}
.bottom-gauge {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 280px;
}
.bottom-gauge-label {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}
.bottom-gauge-bar {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 2px;
  overflow: hidden;
}
.bottom-gauge-fill {
  height: 100%;
  border-radius: 2px;
  transition: width var(--duration-slow) var(--ease-smooth);
}
.bottom-temp {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}

/* ===== Settings Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--modal-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
  padding: 32px;
  width: 440px;
  max-height: 85vh;
  overflow-y: auto;
  animation: modalIn var(--duration-normal) var(--ease-smooth);
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.96) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.modal h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 24px;
  font-family: var(--font-sans);
  letter-spacing: -0.3px;
}
.modal-section {
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-light);
}
.modal-section:last-of-type { border-bottom: none; margin-bottom: 12px; padding-bottom: 0; }
.modal-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.modal-field { margin-bottom: 12px; }
.modal-field:last-child { margin-bottom: 0; }
.modal-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.modal input[type="text"],
.modal input[type="password"],
.modal input[type="url"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.modal input:focus {
  border-color: var(--accent);
  background: var(--msg-tool-hover);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-btn {
  background: var(--msg-tool-hover);
  border: 0.5px solid var(--border-medium);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  cursor: pointer;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.modal-btn:hover {
  background: var(--btn-icon-hover);
  border-color: var(--border-medium);
}
.modal-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.modal-btn.primary:hover {
  background: var(--accent-hover);
}
.modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.modal-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.modal-feedback {
  font-size: 12px;
  font-family: var(--font-mono);
  margin-bottom: 14px;
  padding: 8px 10px;
  border-radius: 6px;
}
.modal-feedback.success { color: var(--success); background: rgba(48, 209, 88, 0.1); }
.modal-feedback.error { color: var(--error); background: rgba(255, 69, 58, 0.1); }

/* Settings tabs */
.settings-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 0;
}
.settings-tab {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  letter-spacing: 0.2px;
  border-bottom: 2px solid transparent;
  transition: color var(--duration-fast) var(--ease-smooth), border-color var(--duration-fast) var(--ease-smooth);
}
.settings-tab:hover { color: var(--text-dim); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Toggle switch */
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-row label { margin-bottom: 0; }
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border-medium);
  border-radius: 20px;
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  bottom: 2px;
  background: white;
  border-radius: 50%;
  transition: transform var(--duration-fast) var(--ease-smooth);
}
.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

/* Number input for settings */
.modal input[type="number"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color var(--duration-fast) var(--ease-smooth), background var(--duration-fast) var(--ease-smooth);
}
.modal input[type="number"]:focus { border-color: var(--accent); background: var(--msg-tool-hover); }

/* Textarea for settings */
.modal textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  resize: vertical;
  min-height: 60px;
  transition: border-color var(--duration-fast) var(--ease-smooth), background var(--duration-fast) var(--ease-smooth);
}
.modal textarea:focus { border-color: var(--accent); background: var(--msg-tool-hover); }

/* ===== Explorer view ===== */
.agent-explorer-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 0.5px solid var(--border-medium);
  border-radius: 999px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: color var(--duration-fast) var(--ease-smooth),
              border-color var(--duration-fast) var(--ease-smooth),
              background var(--duration-fast) var(--ease-smooth);
}
.agent-explorer-btn:hover { color: var(--text); border-color: var(--border-light); }
.agent-explorer-btn.active {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(10, 132, 255, 0.12);
}
.agent-explorer-btn .explorer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-tertiary);
  transition: background var(--duration-fast) var(--ease-smooth),
              box-shadow var(--duration-fast) var(--ease-smooth);
}
.agent-explorer-btn.running .explorer-dot {
  background: var(--success);
  box-shadow: 0 0 6px rgba(48, 209, 88, 0.5);
}
.agent-explorer-btn.blocked .explorer-dot {
  background: var(--warning);
  box-shadow: 0 0 6px rgba(255, 159, 10, 0.45);
}

.explorer-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.explorer-tabbar {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  border-bottom: 0.5px solid var(--border-medium);
  flex-shrink: 0;
}
.explorer-tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  padding: 12px 14px;
  cursor: pointer;
  transition: color var(--duration-fast) var(--ease-smooth),
              border-color var(--duration-fast) var(--ease-smooth);
}
.explorer-tab:hover { color: var(--text-dim); }
.explorer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.explorer-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.explorer-section {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-medium);
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--panel-shadow, 0 4px 24px rgba(0, 0, 0, 0.2));
}
.explorer-section-title {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin: 0 0 12px 0;
}

.explorer-status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.explorer-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border: 0.5px solid var(--border-medium);
  color: var(--text-dim);
  background: transparent;
}
.explorer-chip.idle { color: var(--text-tertiary); }
.explorer-chip.running { color: var(--success); border-color: rgba(48, 209, 88, 0.5); background: rgba(48, 209, 88, 0.08); }
.explorer-chip.planning { color: var(--accent); border-color: rgba(10, 132, 255, 0.5); background: rgba(10, 132, 255, 0.08); }
.explorer-chip.blocked { color: var(--warning); border-color: rgba(255, 159, 10, 0.5); background: rgba(255, 159, 10, 0.08); }
.explorer-chip.completed { color: var(--success); border-color: rgba(48, 209, 88, 0.35); }
.explorer-chip.failed { color: var(--error); border-color: rgba(255, 69, 58, 0.5); background: rgba(255, 69, 58, 0.08); }

.explorer-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}
.explorer-meta-primary {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.explorer-meta-secondary {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

.explorer-kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 8px;
}
.explorer-kpi {
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.02));
  border: 0.5px solid var(--border-light);
  border-radius: 10px;
  padding: 10px 12px;
}
.explorer-kpi-label {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.explorer-kpi-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}
.explorer-kpi-value.success { color: var(--success); }
.explorer-kpi-value.failed  { color: var(--error); }
.explorer-kpi-value.skipped { color: var(--warning); }

.explorer-progress {
  margin-top: 12px;
}
.explorer-progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.explorer-progress-bar {
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.explorer-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width var(--duration-fast) var(--ease-smooth);
}

.explorer-task-chips {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.explorer-task-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 0.5px solid var(--border-light);
  color: var(--text-dim);
}
.explorer-task-chip.success { color: var(--success); border-color: rgba(48, 209, 88, 0.35); }
.explorer-task-chip.failed  { color: var(--error);   border-color: rgba(255, 69, 58, 0.35); }
.explorer-task-chip.skipped { color: var(--warning); border-color: rgba(255, 159, 10, 0.35); }

.explorer-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.explorer-btn {
  background: transparent;
  border: 0.5px solid var(--border-medium);
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: color var(--duration-fast) var(--ease-smooth),
              border-color var(--duration-fast) var(--ease-smooth),
              background var(--duration-fast) var(--ease-smooth);
}
.explorer-btn:hover { color: var(--text); border-color: var(--border-light); }
.explorer-btn.primary {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(10, 132, 255, 0.08);
}
.explorer-btn.primary:hover { background: rgba(10, 132, 255, 0.18); }
.explorer-btn.danger {
  color: var(--error);
  border-color: rgba(255, 69, 58, 0.5);
}
.explorer-btn.danger:hover { background: rgba(255, 69, 58, 0.1); }
.explorer-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.explorer-empty {
  text-align: center;
  padding: 24px 12px;
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 12px;
}

.explorer-md {
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.55;
  color: var(--text-dim);
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.02));
  border: 0.5px solid var(--border-light);
  border-radius: 10px;
  padding: 10px 12px;
  margin: 0;
  max-height: 240px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.explorer-feedback {
  margin-top: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 12px;
}
.explorer-feedback.info { color: var(--text-dim); background: rgba(10, 132, 255, 0.08); border: 0.5px solid rgba(10, 132, 255, 0.3); }
.explorer-feedback.error { color: var(--error); background: rgba(255, 69, 58, 0.08); border: 0.5px solid rgba(255, 69, 58, 0.4); }

/* Runs tab + Run Detail drawer (D3) */
.explorer-runs-filterbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.explorer-filter-input {
  padding: 6px 10px;
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.02));
  color: var(--text);
  border: 0.5px solid var(--border-medium);
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 12px;
  color-scheme: dark;
}
.explorer-select {
  width: 100%;
  padding: 8px 10px;
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.02));
  color: var(--text);
  border: 0.5px solid var(--border-medium);
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 13px;
  color-scheme: dark;
}
.explorer-filter-input option,
.explorer-filter-input optgroup,
.explorer-select option,
.explorer-select optgroup {
  background: var(--bg-secondary);
  color: var(--text);
}
.explorer-runs-table {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.explorer-runs-head,
.explorer-runs-row {
  display: grid;
  grid-template-columns: 96px 72px minmax(0, 1fr) 60px 104px 72px 72px 64px;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
}
.explorer-runs-head {
  color: var(--text-tertiary);
  text-transform: uppercase;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.3px;
  border-bottom: 0.5px solid var(--border-medium);
  border-radius: 0;
  padding-bottom: 10px;
}
.explorer-runs-row {
  background: rgba(255, 255, 255, 0.015);
  border: 0.5px solid transparent;
  transition: background var(--duration-fast) var(--ease-smooth),
              border-color var(--duration-fast) var(--ease-smooth);
}
.explorer-runs-row:hover {
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.03));
  border-color: var(--border-light);
}
.explorer-runs-cell-mono {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.explorer-runs-cell-goal {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.explorer-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(520px, 100vw);
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-medium);
  box-shadow: -20px 0 36px rgba(0, 0, 0, 0.28);
  display: flex;
  flex-direction: column;
  z-index: 141;
}
.explorer-drawer-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border-light);
  margin-bottom: 10px;
}

.explorer-events {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.explorer-event {
  border: 0.5px solid var(--border-light);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.015);
}
.explorer-event-summary {
  display: grid;
  grid-template-columns: 40px 110px 1fr 90px 70px;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 11px;
}
.explorer-event-summary:hover {
  background: var(--msg-tool-hover, rgba(255, 255, 255, 0.03));
}
.explorer-event-body {
  padding: 4px 10px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 0.5px dashed var(--border-light);
}
.explorer-event-label {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 2px;
}

@media (max-width: 768px) {
  .explorer-runs-head { display: none; }
  .explorer-runs-row {
    grid-template-columns: auto 1fr auto;
    grid-auto-rows: auto;
    row-gap: 4px;
  }
  .explorer-drawer { width: 100vw; }
  .explorer-event-summary {
    grid-template-columns: 40px 1fr auto;
  }
}

/* ===== Mobile ===== */
.mobile-tabs {
  display: none;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  padding: 12px 8px;
  cursor: pointer;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color var(--duration-fast) var(--ease-smooth);
}
.mobile-tabs button.active {
  color: var(--accent);
}

/* Mobile panel overlay */
.mobile-panel {
  display: none;
  position: fixed;
  bottom: 44px;
  left: 0;
  right: 0;
  max-height: 60vh;
  overflow-y: auto;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  padding: 16px;
  z-index: 50;
  padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
}
.mobile-panel.show {
  display: block;
  animation: slideUp var(--duration-normal) var(--ease-smooth);
}
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
  }
  .sidebar-left, .sidebar-right { display: none; }
  .bottombar { display: none; }
  .mobile-tabs { display: flex; }

  /* Compact metrics bar for mobile */
  .mobile-metrics {
    display: flex;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-light);
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-metrics::-webkit-scrollbar { display: none; }
  .mobile-metrics .mm-item {
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .mobile-metrics .mm-bar {
    width: 40px;
    height: 3px;
    background: var(--msg-tool-hover);
    border-radius: 2px;
    overflow: hidden;
  }
  .mobile-metrics .mm-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width var(--duration-slow) var(--ease-smooth);
  }

  /* Mobile chat adjustments */
  .agent-header {
    padding: 8px 12px;
    gap: 8px;
  }
  .agent-avatar {
    width: 24px;
    height: 24px;
  }
  .agent-name {
    font-size: 13px;
  }
  .agent-mode {
    font-size: 11px;
  }

  .chat-messages {
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg {
    margin-bottom: 16px;
    max-width: 100%;
  }

  .chat-input-wrap {
    padding: 10px 12px;
    gap: 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
  }
  .chat-mode-strip {
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    padding: 10px 12px 0;
  }
  .chat-mode-actions {
    justify-content: flex-start;
  }
  .chat-prompt {
    font-size: 13px;
  }
  .chat-hint-btn {
    width: 16px;
    height: 16px;
    font-size: 11px;
  }
  .chat-input {
    font-size: 13px;
  }
  .chat-send {
    padding: 6px 12px;
    font-size: 11px;
  }

  .topbar {
    padding: 10px 12px;
    min-height: 48px;
  }
  .topbar-logo-img {
    height: 17px;
  }
  .status-text {
    font-size: 12px;
  }
  .btn-icon {
    width: 32px;
    height: 32px;
  }

  .panel {
    padding: 12px;
  }
  .panel-title {
    font-size: 11px;
    margin-bottom: 10px;
  }
  .gauge-label {
    font-size: 12px;
  }
  .panel-list li {
    font-size: 13px;
    padding: 6px 0;
  }
  .model-deploy-btn {
    opacity: 1;
    pointer-events: auto;
  }
  .model-list-item .item-detail {
    opacity: 0;
  }
}

@media (min-width: 769px) {
  .mobile-metrics { display: none !important; }
}

/* Empty state */
.empty {
  color: var(--text-tertiary);
  font-size: 12px;
  padding: 16px 0;
  text-align: center;
}

/* Deploy progress - enhanced startup visualization */
.deploy-progress {
  height: 4px;
  background: var(--msg-tool-hover);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.deploy-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--cyan-bright, #409cff));
  transition: width 0.3s ease;
  position: relative;
}
.deploy-progress-fill.starting {
  background: linear-gradient(90deg, var(--warning), var(--accent));
  animation: progressPulse 1.5s ease-in-out infinite;
}
@keyframes progressPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.deploy-phase-text {
  font-size: 10px;
  color: var(--accent);
  margin-top: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.deploy-phase-icon {
  margin-right: 4px;
  animation: spin 1.5s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.deploy-eta {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.deploy-error-lines {
  font-size: 10px;
  color: var(--error);
  white-space: pre-wrap;
  word-break: break-all;
  margin-top: 4px;
  max-height: 60px;
  overflow: hidden;
  font-family: var(--font-mono);
  background: rgba(255, 69, 58, 0.1);
  padding: 4px 6px;
  border-radius: 4px;
}

/* Starting deployment highlight */
.panel-list li.starting {
  background: var(--gauge-bg);
  border-radius: 6px;
  box-shadow: inset 0 0 0 1px var(--border-medium);
}

/* ===== Support Page ===== */

/* Support page layout (fills .center) */
.support-page {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.support-page-shell {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(100%, 820px);
  margin: 0 auto;
  padding: 18px 24px 18px;
  flex: 1;
  min-height: 0;
}

/* Hero / not-connected state */
.support-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--spacing-md);
  text-align: center;
  max-width: 480px;
  margin: 0 auto;
}
.support-hero-icon {
  font-size: 48px;
  opacity: 0.6;
}
.support-hero h2 {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin: 0;
}
.support-hero p {
  font-size: 14px;
  color: var(--text-dim);
  margin: 0;
  line-height: 1.5;
}
.support-hero textarea {
  width: 100%;
  padding: 12px;
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  resize: vertical;
  min-height: 60px;
}
.support-hero-btn {
  padding: 12px 36px;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.support-hero-btn:hover {
  background: var(--accent-hover);
  transform: scale(1.02);
}
.support-hero-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Prompt input (invite/recovery code) */
.support-hero .support-code-row {
  display: flex;
  gap: 8px;
  width: 100%;
}
.support-hero .support-code-row input {
  flex: 1;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-mono);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}
.support-hero .support-code-row button {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
}

/* Connected panel */
.support-connected {
  display: flex;
  flex-direction: column;
  width: 100%;
  flex: 1;
  min-height: 0;
  gap: 12px;
}
.support-flow {
  flex: 1;
  min-height: 0;
}
.support-content-scroll {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding-right: 4px;
}
.support-content-scroll::-webkit-scrollbar {
  width: 8px;
}
.support-content-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.support-content-scroll::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.support-content-scroll::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}
.support-status-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.support-status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-dim);
}
.support-status-pill strong {
  color: var(--text);
  font-weight: 600;
  font-family: var(--font-mono);
}
.support-summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.support-summary-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
  padding: 12px 14px;
  background: var(--bg-secondary);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.support-confirmation-card {
  border-color: rgba(10, 132, 255, 0.45);
  background: rgba(10, 132, 255, 0.08);
}
.support-summary-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.support-summary-card .value {
  font-size: 14px;
  font-family: var(--font-mono);
  color: var(--text);
  word-break: break-word;
}
.support-summary-card .meta {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-summary-link {
  font-size: 12px;
  line-height: 1.45;
  color: var(--accent);
  font-family: var(--font-mono);
  word-break: break-all;
}
.support-summary-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.support-summary-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  cursor: pointer;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.support-summary-btn:hover {
  border-color: rgba(10, 132, 255, 0.35);
  color: var(--accent);
}
.support-summary-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.support-intake {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.02);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.support-intake-header {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.support-intake-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}
.support-intake-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-starter-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.support-starter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.support-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.support-chip {
  padding: 7px 10px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  cursor: pointer;
  text-align: left;
}
.support-chip:hover {
  border-color: rgba(10, 132, 255, 0.35);
  color: var(--text);
}
.support-note {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-helper {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.4;
}
.support-status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-sm);
}
.support-status-card {
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.support-status-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.support-status-card .value {
  font-size: 14px;
  font-family: var(--font-mono);
  color: var(--text);
  word-break: break-all;
}
.support-msg-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--spacing-sm);
  background: var(--bg-secondary);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  min-height: 96px;
  max-height: clamp(120px, 22vh, 260px);
  overflow-y: auto;
  overscroll-behavior: contain;
}
.support-msg {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: start;
  column-gap: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg-panel);
  border-radius: 6px;
  line-height: 1.45;
  min-height: 0;
}
.support-msg-body {
  display: block;
  min-width: 0;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  line-height: 1.45;
}
.support-msg .msg-time {
  font-size: 11px;
  color: var(--text-tertiary);
  margin: 1px 0 0;
}
.support-msg .msg-type {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: start;
  font-size: 10px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  margin: 1px 0 0;
  line-height: 1.4;
  white-space: nowrap;
}
.support-msg .msg-type.info { color: var(--accent); background: var(--accent-dim); }
.support-msg .msg-type.command { color: var(--warning); background: rgba(255, 159, 10, 0.15); }
.support-msg .msg-type.error { color: var(--error); background: rgba(255, 69, 58, 0.15); }
.support-msg .msg-type.complete { color: var(--success); background: rgba(48, 209, 88, 0.15); }
.support-msg .msg-type.question { color: var(--accent); background: rgba(10, 132, 255, 0.18); }
.support-msg .msg-type.approval { color: var(--warning); background: rgba(255, 159, 10, 0.15); }
.support-msg-list + .support-intake {
  margin-top: 12px;
}
.support-feedback {
  font-size: 13px;
  color: var(--error);
  background: rgba(255, 69, 58, 0.1);
  border: 1px solid rgba(255, 69, 58, 0.25);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.support-input-row {
  display: flex;
  gap: 8px;
}
.support-footer {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  padding-top: 4px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(29, 29, 31, 0.18) 100%);
}
.support-input-row input {
  flex: 1;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}
.support-input-row input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.support-input-row button {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.support-input-row button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.support-skip-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
  white-space: nowrap;
}
.support-skip-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.support-disconnect-btn {
  align-self: center;
  padding: 8px 24px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--error);
  background: rgba(255, 69, 58, 0.1);
  border: 1px solid var(--error);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.support-disconnect-btn:hover {
  background: var(--error);
  color: #fff;
}

/* Support empty messages */
.support-msg-empty {
  color: var(--text-tertiary);
  font-size: 13px;
  text-align: center;
  padding: 24px;
}

@media (max-width: 768px) {
  .support-page {
    padding: 0;
  }
  .support-page-shell {
    width: 100%;
    padding: 12px;
  }
  .support-content-scroll {
    padding-right: 0;
  }
  .support-hero h2 {
    font-size: 18px;
  }
  .support-summary-grid,
  .support-status-grid {
    grid-template-columns: 1fr;
  }
  .agent-header {
    padding: 12px 16px;
    gap: 12px;
  }
  .agent-header-actions {
    gap: 6px;
  }
  .agent-onboarding-btn {
    padding: 6px 9px;
    font-size: 11px;
  }
  .agent-support-btn {
    padding: 7px 10px;
    font-size: 12px;
  }
  .onboarding-drawer {
    width: 100vw;
    border-left: none;
    box-shadow: none;
  }
  .onboarding-tabs {
    padding: 10px 14px;
  }
  .onboarding-drawer-body {
    padding: 14px;
  }
}

/* ===== Onboarding Wizard (Full-Screen Overlay) ===== */
.wiz-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg-primary);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: var(--spacing-lg);
}
.wiz-container {
  width: 100%;
  max-width: 800px;
  margin: auto 0;
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg);
  animation: modalIn var(--duration-normal) var(--ease-smooth);
}
.wiz-header {
  text-align: center;
}
.wiz-header h2 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: var(--spacing-xs);
}
.wiz-header p {
  font-size: 14px;
  color: var(--text-dim);
}
.wiz-phase-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.wiz-phase-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  transition: background var(--duration-normal) var(--ease-smooth);
}
.wiz-phase-dot.active {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-dim);
}
.wiz-phase-dot.done {
  background: var(--success);
}
.wiz-card {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-medium);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  box-shadow: var(--panel-shadow);
}
.wiz-card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: var(--spacing-md);
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}
.wiz-card-title .wiz-icon {
  font-size: 18px;
}

/* Hardware info grid */
.wiz-hw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-sm);
}
.wiz-hw-item {
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.wiz-hw-item .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.wiz-hw-item .value {
  font-size: 14px;
  color: var(--text);
  font-family: var(--font-mono);
  word-break: break-word;
}
.wiz-hw-item .value.success { color: var(--success); }
.wiz-hw-item .value.warning { color: var(--warning); }
.wiz-hw-item .value.error { color: var(--error); }

/* Stack status badges */
.wiz-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 4px;
  text-transform: uppercase;
}
.wiz-badge.ready {
  color: var(--success);
  background: rgba(48, 209, 88, 0.12);
}
.wiz-badge.missing {
  color: var(--text-tertiary);
  background: var(--bg-tertiary);
}

/* Buttons */
.wiz-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.wiz-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.wiz-btn-primary {
  color: #fff;
  background: var(--accent);
}
.wiz-btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}
.wiz-btn-secondary {
  color: var(--text-dim);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-medium);
}
.wiz-btn-secondary:hover:not(:disabled) {
  color: var(--text);
  background: var(--bg-input);
}
.wiz-btn-lg {
  width: 100%;
  padding: 18px;
  font-size: 15px;
  border-radius: var(--radius-md);
}
.wiz-actions {
  display: flex;
  gap: var(--spacing-md);
  justify-content: center;
  flex-wrap: wrap;
}

/* Init phase: command copy box */
.wiz-cmd-box {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text);
}
.wiz-cmd-box code {
  flex: 1;
  word-break: break-all;
}
.wiz-cmd-box .wiz-copy-btn {
  background: var(--accent-dim);
  border: none;
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--duration-fast);
  white-space: nowrap;
}
.wiz-cmd-box .wiz-copy-btn:hover {
  background: var(--accent);
  color: #fff;
}
.wiz-hint {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
}
.wiz-polling-note {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.wiz-spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-medium);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: wizSpin 0.8s linear infinite;
}
@keyframes wizSpin {
  to { transform: rotate(360deg); }
}

/* Scan progress list */
.wiz-scan-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
  padding: var(--spacing-sm);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.wiz-scan-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  padding: 6px 8px;
  font-size: 13px;
  color: var(--text);
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.02);
}
.wiz-scan-item .wiz-scan-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.wiz-scan-item .wiz-scan-type {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-tertiary);
  width: 50px;
  flex-shrink: 0;
}

/* Choosing phase: big choice cards */
.wiz-choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-md);
}
.wiz-choice-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-md);
  padding: var(--spacing-lg);
  cursor: pointer;
  text-align: center;
  transition: all var(--duration-fast) var(--ease-smooth);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--spacing-sm);
}
.wiz-choice-card:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.wiz-choice-card.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.wiz-choice-card .wiz-choice-icon {
  font-size: 32px;
  margin-bottom: var(--spacing-xs);
}
.wiz-choice-card .wiz-choice-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.wiz-choice-card .wiz-choice-desc {
  font-size: 12px;
  color: var(--text-dim);
}

/* Recommend / local model cards */
.wiz-model-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--spacing-md);
}
.wiz-model-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-md);
  padding: var(--spacing-md);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
  transition: border-color var(--duration-fast) var(--ease-smooth);
}
.wiz-model-card:hover {
  border-color: var(--accent);
}
.wiz-model-card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  word-break: break-word;
}
.wiz-model-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.wiz-model-card-meta .wiz-tag {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-tertiary);
  color: var(--text-dim);
}
.wiz-model-card-perf {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.wiz-model-card-actions {
  margin-top: auto;
  padding-top: var(--spacing-sm);
}
.wiz-model-card-actions .wiz-btn {
  width: 100%;
  padding: 10px;
  font-size: 13px;
}

/* Deploy progress */
.wiz-deploy-steps {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}
.wiz-deploy-step {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
  padding: var(--spacing-md);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.wiz-deploy-step .wiz-step-icon {
  font-size: 20px;
  width: 32px;
  text-align: center;
  flex-shrink: 0;
}
.wiz-deploy-step .wiz-step-body {
  flex: 1;
  min-width: 0;
}
.wiz-deploy-step .wiz-step-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.wiz-deploy-step .wiz-step-detail {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
/* Progress bar */
.wiz-progress {
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.wiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s var(--ease-smooth);
}
.wiz-progress-fill.indeterminate {
  width: 30% !important;
  animation: wizIndeterminate 1.2s ease-in-out infinite;
}
@keyframes wizIndeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* Complete phase */
.wiz-complete {
  text-align: center;
  padding: var(--spacing-xl) 0;
}
.wiz-complete-icon {
  font-size: 56px;
  margin-bottom: var(--spacing-md);
}
.wiz-complete h3 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: var(--spacing-sm);
}
.wiz-complete p {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: var(--spacing-lg);
}
.wiz-complete .wiz-endpoint {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 6px 12px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: var(--spacing-lg);
}

/* Error display */
.wiz-error {
  background: rgba(255, 69, 58, 0.08);
  border: 1px solid rgba(255, 69, 58, 0.25);
  border-radius: var(--radius-sm);
  padding: var(--spacing-md);
  color: var(--error);
  font-size: 13px;
  text-align: center;
}

/* Wizard responsive */
@media (max-width: 640px) {
  .wiz-overlay {
    padding: var(--spacing-md);
  }
  .wiz-header h2 {
    font-size: 22px;
  }
  .wiz-hw-grid {
    grid-template-columns: 1fr;
  }
  .wiz-choice-grid {
    grid-template-columns: 1fr;
  }
  .wiz-model-grid {
    grid-template-columns: 1fr;
  }
  .wiz-actions {
    flex-direction: column;
  }
  .wiz-btn-lg {
    padding: 14px;
  }
}
</style>

<script>
  (function() {
    var theme = localStorage.getItem('aima_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
</head>

<body>
<div id="app" x-data="aimaApp()" x-init="init()" @keydown.window="handleGlobalKey($event)">

  <!-- ===== Onboarding Wizard Overlay ===== -->
  <template x-if="wizActive()">
    <div class="wiz-overlay" @keydown.escape.prevent="wizSkip()">
      <div class="wiz-container">

        <!-- Header -->
        <div class="wiz-header">
          <h2 x-text="t('wiz_title')"></h2>
          <p x-text="t('wiz_subtitle')"></p>
          <!-- Phase dots — dynamic: hide init when not needed -->
          <div class="wiz-phase-indicator" style="margin-top:12px">
            <template x-for="ph in wizDotPhases()" :key="ph">
              <div class="wiz-phase-dot"
                :class="{
                  active: wizDotActive(ph),
                  done: wizDotDone(ph)
                }"
                :style="wizDotDone(ph) ? 'cursor:pointer' : ''"
                @click="wizDotDone(ph) && wizGoToPhase(ph)"></div>
            </template>
          </div>
        </div>

        <!-- LOADING phase -->
        <div x-show="onboardingPhase === 'loading'" class="wiz-card" style="text-align:center;padding:48px">
          <div class="wiz-spinner" style="width:24px;height:24px;margin:0 auto 16px"></div>
          <p style="color:var(--text-dim)" x-text="t('wiz_loading')"></p>
        </div>

        <!-- DETECTING phase -->
        <div x-show="onboardingPhase === 'detecting'" x-cloak>
          <div class="wiz-card">
            <div class="wiz-card-title"><span class="wiz-icon">&#x1F4BB;</span> <span x-text="t('wiz_detecting')"></span></div>
            <div class="wiz-hw-grid">
              <!-- GPU -->
              <div class="wiz-hw-item">
                <div class="label" x-text="t('wiz_gpu')"></div>
                <div class="value" x-text="wizHwGpu()"></div>
              </div>
              <!-- VRAM / Unified Memory -->
              <div class="wiz-hw-item">
                <div class="label" x-text="wizHwVramLabel()"></div>
                <div class="value" x-text="wizHwVram()"></div>
              </div>
              <!-- RAM -->
              <div class="wiz-hw-item" x-show="!wizHwUnifiedMemory()">
                <div class="label" x-text="t('wiz_ram')"></div>
                <div class="value" x-text="wizHwRam()"></div>
              </div>
              <!-- OS -->
              <div class="wiz-hw-item">
                <div class="label" x-text="t('wiz_os')"></div>
                <div class="value" x-text="wizHwOs()"></div>
              </div>
              <!-- Profile -->
              <div class="wiz-hw-item">
                <div class="label" x-text="t('wiz_profile')"></div>
